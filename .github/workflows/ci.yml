name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: openlucid
          POSTGRES_PASSWORD: openlucid
          POSTGRES_DB: openlucid
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U openlucid"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://openlucid:openlucid@localhost:5432/openlucid
      SECRET_KEY: ci-test-secret-not-for-production
      DISABLE_AUTH: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v
        env:
          PYTHONPATH: ${{ github.workspace }}
