<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenLucid</title>
  <script>
    document.documentElement.style.display='none';
    fetch('/api/v1/auth/me').then(r=>{
      if(!r.ok) fetch('/api/v1/auth/setup-status').then(r=>r.json()).then(s=>{
        location.href=s.needs_setup?'/install.html':'/signin.html';
      });
      else document.documentElement.style.display='';
    });
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: {
        sidebar: { DEFAULT: '#1C1C28', hover: '#2A2A3C' },
        accent: { DEFAULT: '#155EEF', light: '#EFF4FF', hover: '#1849C6' },
      }}}
    }
  </script>
  <script src="/js/i18n.js"></script>
  <script src="/js/pinned-apps.js"></script>
  <script src="/js/avatar.js"></script>
  <script src="/js/feedback.js"></script>
  <script src="/js/apps-shared.js"></script>
  <script src="/js/shared.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
  <style>
    [x-cloak]{display:none!important}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',sans-serif}
    .sidebar-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;color:#A0A0B0;font-size:14px;cursor:pointer;transition:all .15s}
    .sidebar-item:hover{background:#2A2A3C;color:#E0E0EE}
    .sidebar-item.active{background:#2D2D40;color:#fff}
    .content-output{white-space:pre-wrap;line-height:1.8;font-size:14px}
  </style>
</head>
<body class="bg-gray-50 h-screen flex overflow-hidden" x-data="contentStudioPage()" x-init="init()">

  <!-- Sidebar -->
  <aside class="w-56 bg-sidebar flex flex-col shrink-0">
    <div class="px-4 py-5 flex items-center gap-2.5">
      <img src="/images/logo.png" alt="OpenLucid" class="w-8 h-8 rounded-lg">
      <span class="text-white font-semibold text-base">OpenLucid</span>
    </div>
    <nav class="flex-1 px-3 space-y-1 mt-2">
      <a href="/" class="sidebar-item">
        <svg class="w-[18px] h-[18px]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
        <span x-text="t('sidebar_offers')"></span>
      </a>
      <a href="/brandkit-list.html" class="sidebar-item">
        <svg class="w-[18px] h-[18px]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.657-1.657a2 2 0 012.828 0l2.829 2.829a2 2 0 010 2.828l-8.486 8.485M7 17h.01"/></svg>
        <span x-text="t('sidebar_brandkit')"></span>
      </a>
      <a href="/creations.html" class="sidebar-item">
        <svg class="w-[18px] h-[18px]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>
        <span x-text="t('sidebar_creations')"></span>
      </a>
      <a href="/video-studio.html" class="sidebar-item">
        <svg class="w-[18px] h-[18px]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
        <span x-text="t('sidebar_videos')"></span>
      </a>
    </nav>
    <div class="px-3 pb-3 mt-auto">
      <div class="text-[10px] text-white/25 text-center">Powered by <a href="https://openlucid.ai/?ref=app" target="_blank" class="hover:text-white/40 transition-colors">OpenLucid</a></div>
    </div>
  </aside>

  <!-- Main -->
  <div class="flex-1 flex flex-col overflow-hidden">
    <header class="bg-white border-b px-6 shrink-0">
      <div class="h-14 flex items-center gap-2">
        <a href="/" class="text-sm text-gray-400 hover:text-accent" x-text="t('breadcrumb_home')"></a>
        <svg class="w-4 h-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
        <span class="text-sm font-medium text-gray-800" x-text="'📝 ' + t('content_studio_title')"></span>
        <span class="text-xs text-gray-400 ml-1" x-text="'· ' + t('content_studio_subtitle')"></span>
        <div class="flex-1"></div>
        <div class="flex items-center gap-3">
          <a href="/setting.html?section=mcp" class="inline-flex items-center gap-1.5 text-xs font-medium text-gray-500 hover:text-gray-700 border border-gray-200 hover:border-gray-300 px-2.5 py-1.5 rounded-lg transition-colors">
            <span class="w-1.5 h-1.5 bg-green-400 rounded-full"></span>
            MCP
          </a>
          <div id="avatar-mount"></div>
        </div>
      </div>
      <!-- Selectors row -->
      <div class="pb-4 flex items-center gap-4 flex-wrap">
        <!-- Offer -->
        <div class="flex items-center gap-2">
          <label class="text-sm text-gray-500 shrink-0" x-text="t('offer_label')"></label>
          <select x-model="offerId" @change="onOfferChange()"
                  class="border border-gray-200 rounded-lg px-3 py-1.5 text-sm text-gray-700 bg-white focus:outline-none focus:ring-2 focus:ring-accent/20 focus:border-accent min-w-[14rem]">
            <option value="" x-text="t('offer_placeholder')"></option>
            <template x-for="o in offers" :key="o.id">
              <option :value="o.id" x-text="o.name"></option>
            </template>
          </select>
        </div>
        <!-- Strategy Unit -->
        <div class="flex items-center gap-2" x-show="offerId && strategyUnits.length > 0" x-cloak>
          <label class="text-sm text-gray-500 shrink-0" x-text="t('strategy_label')"></label>
          <select x-model="strategyUnitId" @change="onStrategyChange()"
                  class="border border-gray-200 rounded-lg px-3 py-1.5 text-sm text-gray-700 bg-white focus:outline-none focus:ring-2 focus:ring-accent/20 focus:border-accent min-w-[10rem]">
            <option value="" x-text="t('strategy_none')"></option>
            <template x-for="su in strategyUnits" :key="su.id">
              <option :value="su.id" x-text="su.name"></option>
            </template>
          </select>
        </div>
        <!-- LLM model -->
        <div class="flex items-center gap-2" x-show="llmConfigs.length > 0" x-cloak>
          <label class="text-sm text-gray-500 shrink-0" x-text="t('model_label')"></label>
          <select x-model="configId"
                  class="border border-gray-200 rounded-lg px-3 py-1.5 text-sm text-gray-700 bg-white focus:outline-none focus:ring-2 focus:ring-accent/20 focus:border-accent min-w-[10rem]">
            <option value="" x-text="t('model_default')"></option>
            <template x-for="c in llmConfigs" :key="c.id">
              <option :value="c.id" x-text="c.label + ' (' + c.model_name + ')'"></option>
            </template>
          </select>
        </div>
      </div>
    </header>

    <main class="flex-1 overflow-y-auto p-6">
      <!-- Two-column: Context panel + Composer/Result -->
      <div class="flex gap-5 max-w-5xl mx-auto">
        <!-- Left: Context Panel -->
        <div x-show="offerId" class="w-64 shrink-0 flex flex-col gap-4">
          <div class="bg-white rounded-xl border p-5 sticky top-0">
            <h3 class="font-semibold text-gray-800 mb-4 flex items-center gap-2">
              <span x-text="t('context_title')"></span>
              <span x-show="loadingCtx" class="text-xs text-gray-400 font-normal" x-text="t('loading')"></span>
            </h3>
            <div x-show="contextData" class="space-y-3">
              <div>
                <div class="text-xs text-gray-400 mb-0.5" x-text="t('offer_name_label')"></div>
                <div class="text-sm font-medium text-gray-800" x-text="contextData?.offer_name || '-'"></div>
              </div>
              <div x-show="selectedUnit">
                <div class="text-xs text-gray-400 mb-0.5" x-text="t('strategy_name_label')"></div>
                <div class="text-sm font-medium text-gray-800" x-text="selectedUnit?.name || '-'"></div>
                <div x-show="selectedUnit?.audience_segment" class="text-xs text-gray-400 mt-1" x-text="selectedUnit?.audience_segment"></div>
                <div x-show="selectedUnit?.scenario" class="text-xs text-gray-400" x-text="selectedUnit?.scenario"></div>
              </div>
              <div class="pt-2 border-t border-gray-50">
                <div class="flex items-center justify-between text-xs">
                  <span class="text-gray-500" x-text="t('kb_count_label')"></span>
                  <span class="text-gray-700 font-medium" x-text="contextData?.knowledge_count ?? 0"></span>
                </div>
              </div>
              <div class="pt-2 border-t border-gray-50 flex items-center gap-2">
                <div :class="(contextData?.knowledge_count ?? 0) > 0 ? 'bg-green-500' : 'bg-orange-400'" class="w-2 h-2 rounded-full shrink-0"></div>
                <span class="text-xs" :class="(contextData?.knowledge_count ?? 0) > 0 ? 'text-green-600' : 'text-orange-500'"
                      x-text="(contextData?.knowledge_count ?? 0) > 0 ? t('kb_ready') : t('kb_empty_hint')"></span>
              </div>
            </div>
          </div>
        </div>

        <!-- Right: Composer + Result -->
        <div class="flex-1 min-w-0">

        <!-- No offers warning -->
        <div x-show="!loading && offers.length === 0" class="bg-amber-50 border border-amber-200 rounded-xl p-4 mb-4 flex items-center justify-between">
          <div class="flex items-center gap-2 text-sm text-amber-800">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            <span x-text="t('cs_no_offer_hint')"></span>
          </div>
          <a href="/" class="text-xs font-medium text-amber-700 hover:text-amber-900 underline" x-text="t('cs_go_create_offer')"></a>
        </div>

        <!-- Composer -->
        <div class="bg-white rounded-xl border p-5 mb-4">
          <div class="mb-4">
            <div class="flex items-center justify-between mb-1.5">
              <label class="text-xs font-medium text-gray-600" x-text="t('topic_label')"></label>
              <button @click="suggestTopic()"
                      :disabled="!offerId || suggestingTopic"
                      class="text-xs text-accent hover:text-accent-hover disabled:opacity-40 transition flex items-center gap-1">
                <svg x-show="!suggestingTopic" class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
                <svg x-show="suggestingTopic" class="w-3 h-3 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"/></svg>
                <span x-text="t('suggest_topic')"></span>
              </button>
            </div>
            <textarea x-model="topic"
                      :placeholder="t('cs_topic_placeholder')"
                      rows="2"
                      class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm text-gray-700 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-accent/20 focus:border-accent resize-none"></textarea>
          </div>

          <div class="mb-4 grid grid-cols-3 gap-3">
            <div>
              <label class="text-[11px] text-gray-400 mb-1 block" x-text="t('platform_label')"></label>
              <select x-model="platformId"
                      class="w-full border border-gray-200 rounded-lg px-2.5 py-1.5 text-sm text-gray-700 bg-white focus:outline-none focus:ring-2 focus:ring-accent/20 focus:border-accent">
                <template x-for="p in platforms" :key="p.id">
                  <option :value="p.id" x-text="p.emoji + ' ' + p.name"></option>
                </template>
              </select>
            </div>
            <div>
              <label class="text-[11px] text-gray-400 mb-1 block" x-text="t('goal_label')"></label>
              <select x-model="goalId"
                      class="w-full border border-gray-200 rounded-lg px-2.5 py-1.5 text-sm text-gray-700 bg-white focus:outline-none focus:ring-2 focus:ring-accent/20 focus:border-accent">
                <template x-for="g in goalOptions" :key="g.id">
                  <option :value="g.id" x-text="g.emoji + ' ' + g.name"></option>
                </template>
              </select>
            </div>
            <div>
              <label class="text-[11px] text-gray-400 mb-1 block" x-text="t('persona_label')"></label>
              <select x-model="personaId"
                      class="w-full border border-gray-200 rounded-lg px-2.5 py-1.5 text-sm text-gray-700 bg-white focus:outline-none focus:ring-2 focus:ring-accent/20 focus:border-accent">
                <option value="" x-text="t('persona_any')"></option>
                <template x-for="p in personas" :key="p.id">
                  <option :value="p.id" x-text="p.emoji + ' ' + p.name"></option>
                </template>
              </select>
            </div>
          </div>

          <div class="flex justify-end">
            <button @click="doGenerate()"
                    :disabled="loading || !offerId"
                    class="bg-gradient-to-r from-purple-600 to-accent text-white px-6 py-2.5 rounded-lg text-[13px] font-medium hover:opacity-90 disabled:opacity-50 transition flex items-center gap-2">
              <svg x-show="loading" class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"/></svg>
              <svg x-show="!loading" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
              <span x-show="loading" x-text="t('generating')"></span>
              <span x-show="!loading && !scriptResult" x-text="t('generate_btn')"></span>
              <span x-show="!loading && scriptResult" x-text="t('cs_generate_again')"></span>
            </button>
          </div>
        </div>

        <!-- Result -->
        <div x-show="scriptResult || structuredContent" x-cloak class="bg-white rounded-xl border p-6">
          <!-- Metadata: title + hashtags (text_post / article / thread) -->
          <template x-if="structuredContent?.metadata">
            <div class="mb-4 pb-4 border-b border-gray-100">
              <h2 x-show="structuredContent.metadata.title" class="text-lg font-semibold text-gray-800 mb-2" x-text="structuredContent.metadata.title"></h2>
              <div x-show="structuredContent.metadata.hashtags?.length" class="flex flex-wrap gap-1.5">
                <template x-for="tag in (structuredContent.metadata.hashtags || [])" :key="tag">
                  <span class="od-tag od-tag-primary" x-text="tag"></span>
                </template>
              </div>
            </div>
          </template>

          <!-- Sections -->
          <div x-show="structuredContent?.sections" class="space-y-4">
            <template x-for="[sid, sec] in Object.entries(structuredContent?.sections || {})" :key="sid">
              <div>
                <div class="text-[11px] font-semibold text-gray-400 uppercase tracking-wider mb-1.5" x-text="sid"></div>
                <p class="text-sm text-gray-700 content-output" x-text="sec.text"></p>
              </div>
            </template>
          </div>

          <!-- Plain text fallback -->
          <div x-show="!structuredContent" class="content-output text-sm text-gray-700" x-text="scriptResult"></div>

          <!-- Actions -->
          <div class="mt-5 pt-4 border-t border-gray-100 flex items-center gap-3 flex-wrap">
            <span class="text-xs text-gray-400" x-text="t('word_count_label') + '：' + (scriptResult || '').length"></span>
            <span x-show="creationId" class="od-chip od-chip-success flex items-center gap-1">
              <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
              <span x-text="t('auto_saved')"></span>
            </span>
            <div class="flex-1"></div>
            <a x-show="creationId" :href="'/creations.html?highlight=' + creationId"
               class="text-xs text-gray-500 hover:text-accent transition-colors flex items-center gap-1">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
              <span x-text="t('view_in_library')"></span>
            </a>
            <button @click="copyAll()" class="text-xs text-accent hover:text-accent-hover transition-colors flex items-center gap-1">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
              <span x-text="copied ? t('copied') : t('copy_btn')"></span>
            </button>
          </div>
        </div>

        <!-- Empty state -->
        <div x-show="!scriptResult && !loading" class="text-center py-12 text-gray-400 text-sm">
          <div class="text-4xl mb-2">📝</div>
          <p x-text="t('cs_empty_hint')"></p>
          <a x-show="offerId" :href="'/topic-studio.html?offer_id=' + offerId"
             class="inline-block mt-3 text-xs text-accent hover:underline">
            <span x-text="t('cs_pick_topic')"></span> →
          </a>
        </div>
        </div><!-- /right col -->
      </div><!-- /two-col wrapper -->
    </main>
  </div>

  <script>
    function contentStudioPage() {
      return {
        offers: [],
        offerId: '',
        strategyUnits: [],
        strategyUnitId: '',
        selectedUnit: null,
        llmConfigs: [],
        configId: '',
        platforms: [],
        platformId: '',
        personas: [],
        personaId: '',
        goalOptions: [],
        goalId: 'seeding',
        topic: '',
        loading: false,
        suggestingTopic: false,
        scriptResult: null,
        structuredContent: null,
        creationId: null,
        copied: false,
        contextData: null,
        loadingCtx: false,

        async init() {
          document.title = t('content_studio_title') + ' - OpenLucid';
          const lang = getApiLang().slice(0, 2);
          const API = '/api/v1';
          try {
            const [offersRes, llmRes, platformsRes, personasRes, goalsRes] = await Promise.all([
              fetch(`${API}/offers?page_size=100`),
              fetch(`${API}/settings/llm`),
              fetch(`${API}/apps/script-writer/platforms?lang=${lang}`),
              fetch(`${API}/apps/script-writer/personas?lang=${lang}`),
              fetch(`${API}/apps/script-writer/goals?lang=${lang}`),
            ]);
            if (offersRes.ok) this.offers = (await offersRes.json()).items || [];
            if (llmRes.ok) this.llmConfigs = await llmRes.json();
            if (platformsRes.ok) {
              const all = await platformsRes.json();
              this.platforms = all.filter(p => p.content_type !== 'video');
              if (this.platforms.length) this.platformId = this.platforms[0].id;
            }
            if (personasRes.ok) this.personas = await personasRes.json();
            if (goalsRes.ok) {
              this.goalOptions = await goalsRes.json();
              if (this.goalOptions.length && !this.goalOptions.find(g => g.id === this.goalId)) {
                this.goalId = this.goalOptions[0].id;
              }
            }
          } catch(e) { console.error(e); }

          // Priority: URL param > last used > first offer
          const params = new URLSearchParams(location.search);
          const urlOffer = params.get('offer_id');
          const urlTopic = params.get('topic');
          if (urlTopic && !this.topic) this.topic = urlTopic;

          // When arriving from "Open in Creator" in Creations, pre-fill topic from the reference.
          const refCreationId = params.get('ref_creation_id');
          if (refCreationId) {
            try {
              const refRes = await fetch(`/api/v1/creations/${refCreationId}`);
              if (refRes.ok) {
                const ref = await refRes.json();
                if (!this.topic) this.topic = (ref.title || '').slice(0, 200);
                toast.info(t('ref_loaded_hint') + ' ' + (ref.title || ''));
              }
            } catch {}
          }
          const lastOffer = localStorage.getItem('od_last_cs_offer') || '';
          let targetOffer = '';
          if (urlOffer && this.offers.find(o => o.id === urlOffer)) {
            targetOffer = urlOffer;
          } else if (lastOffer && this.offers.find(o => o.id === lastOffer)) {
            targetOffer = lastOffer;
          } else if (this.offers.length) {
            targetOffer = this.offers[0].id;
          }
          const urlUnit = params.get('strategy_unit_id') || '';
          if (targetOffer) {
            // Wait for <option> elements to render before assigning x-model value
            await this.$nextTick();
            this.offerId = targetOffer;
            await this.loadStrategyUnits();
            if (urlUnit && this.strategyUnits.find(u => u.id === urlUnit)) {
              await this.$nextTick();
              this.strategyUnitId = urlUnit;
              this.selectedUnit = this.strategyUnits.find(u => u.id === urlUnit) || null;
            }
            await this.fetchContext();
          }
        },

        async onOfferChange() {
          this.scriptResult = null;
          this.structuredContent = null;
          this.creationId = null;
          this.strategyUnitId = '';
          this.selectedUnit = null;
          this.strategyUnits = [];
          this.contextData = null;
          if (this.offerId) {
            localStorage.setItem('od_last_cs_offer', this.offerId);
            await this.loadStrategyUnits();
            await this.fetchContext();
          }
        },

        async loadStrategyUnits() {
          if (!this.offerId) return;
          try {
            const res = await fetch(`/api/v1/strategy-units?offer_id=${this.offerId}&page_size=50`);
            if (res.ok) {
              const data = await res.json();
              this.strategyUnits = data.items || [];
            }
          } catch(e) { console.error(e); }
        },

        onStrategyChange() {
          this.selectedUnit = this.strategyUnits.find(u => u.id === this.strategyUnitId) || null;
          this.fetchContext();
        },

        async fetchContext() {
          if (!this.offerId) return;
          this.loadingCtx = true;
          try {
            let url = `/api/v1/apps/topic-studio/context-preview?offer_id=${this.offerId}`;
            if (this.strategyUnitId) url += `&strategy_unit_id=${this.strategyUnitId}`;
            const res = await fetch(url);
            if (res.ok) this.contextData = await res.json();
          } catch(e) { console.error(e); }
          finally { this.loadingCtx = false; }
        },

        async suggestTopic() {
          if (!this.offerId || this.suggestingTopic) return;
          this.suggestingTopic = true;
          try {
            this.topic = await window.odSuggestTopic({
              offer_id: this.offerId,
              goal: this.goalId,
              config_id: this.configId || undefined,
            });
          } catch(e) { console.error(e); toast.error(e.message); }
          this.suggestingTopic = false;
        },

        async doGenerate() {
          if (!this.offerId) return;
          this.loading = true;
          this.scriptResult = null;
          this.structuredContent = null;
          this.creationId = null;
          this.copied = false;

          try {
            const res = await fetch('/api/v1/apps/script-writer/generate/stream', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                offer_id: this.offerId,
                strategy_unit_id: this.strategyUnitId || undefined,
                topic: this.topic.trim(),
                goal: this.goalId,
                language: getApiLang(),
                config_id: this.configId || undefined,
                platform_id: this.platformId || undefined,
                persona_id: this.personaId || undefined,
                goal_id: this.goalId,
              }),
            });
            if (!res.ok) {
              const err = await res.json().catch(() => ({}));
              toast.error(t('generate_failed') + (err.detail || ''));
              this.loading = false;
              return;
            }
            const reader = res.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';
            let content = '';
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              buffer += decoder.decode(value, { stream: true });
              const parts = buffer.split('\n\n');
              buffer = parts.pop();
              for (const part of parts) {
                if (!part.trim()) continue;
                const lines = part.trim().split('\n');
                let eventType = 'message', data = '';
                for (const line of lines) {
                  if (line.startsWith('event: ')) eventType = line.slice(7);
                  else if (line.startsWith('data: ')) data = line.slice(6);
                }
                if (eventType === 'token') {
                  content += JSON.parse(data);
                  this.scriptResult = content;
                } else if (eventType === 'done') {
                  const result = JSON.parse(data);
                  if (result.script) this.scriptResult = result.script;
                  if (result.structured_content) this.structuredContent = result.structured_content;
                  if (result.creation_id) this.creationId = result.creation_id;
                }
              }
            }
          } catch(e) { console.error(e); toast.error(e.message); }
          this.loading = false;
        },

        async copyAll() {
          let text = '';
          if (this.structuredContent?.metadata?.title) text += this.structuredContent.metadata.title + '\n\n';
          text += this.scriptResult || '';
          if (this.structuredContent?.metadata?.hashtags?.length) {
            text += '\n\n' + this.structuredContent.metadata.hashtags.join(' ');
          }
          const ok = await window.odCopyText(text);
          if (ok) {
            this.copied = true;
            setTimeout(() => this.copied = false, 2000);
          }
        },
      };
    }
  </script>
</body>
</html>
