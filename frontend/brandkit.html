<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenLucid</title>
  <script>
    document.documentElement.style.display='none';
    fetch('/api/v1/auth/me').then(r=>{
      if(!r.ok) fetch('/api/v1/auth/setup-status').then(r=>r.json()).then(s=>{
        location.href=s.needs_setup?'/install.html':'/signin.html';
      });
      else document.documentElement.style.display='';
    });
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: {
        sidebar: { DEFAULT: '#1C1C28', hover: '#2A2A3C' },
        accent: { DEFAULT: '#155EEF', light: '#EFF4FF', hover: '#1849C6' },
      }}}
    }
  </script>
  <script src="/js/i18n.js"></script>
  <script src="/js/pinned-apps.js"></script>
  <script src="/js/avatar.js"></script>
  <script src="/js/feedback.js"></script>
  <script src="/js/shared.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
  <!-- Curated Google Fonts for the brand-kit font picker. Loaded upfront so
       each option in the dropdown renders in its own typeface. -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Alice&family=Playfair+Display:wght@400;600&family=Libre+Baskerville&family=Cormorant+Garamond:wght@400;600&family=Prata&family=DM+Serif+Display&family=Bodoni+Moda:wght@400;600&family=Merriweather:wght@400;700&family=PT+Serif&family=Roboto+Slab:wght@400;600&family=Inter:wght@400;600&family=Poppins:wght@400;600&family=Montserrat:wght@400;600&family=Oswald:wght@400;600&family=Bebas+Neue&family=Lato:wght@400;700&family=Open+Sans:wght@400;600&family=IBM+Plex+Sans:wght@400;600&family=Noto+Sans+SC:wght@400;700&family=Noto+Serif+SC:wght@400;700&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
  <style>
    [x-cloak]{display:none!important}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',sans-serif}
    .sidebar-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;color:#A0A0B0;font-size:14px;cursor:pointer;transition:all .15s}
    .sidebar-item:hover{background:#2A2A3C;color:#E0E0EE}
    .sidebar-item.active{background:#2D2D40;color:#fff}
  </style>
</head>
<body class="bg-gray-50 h-screen flex overflow-hidden" x-data="brandkitApp()" x-init="init()">

  <!-- Sidebar -->
  <aside class="w-56 bg-sidebar flex flex-col shrink-0">
    <div class="px-4 py-5 flex items-center gap-2.5">
      <img src="/images/logo.png" alt="OpenLucid" class="w-8 h-8 rounded-lg">
      <span class="text-white font-semibold text-base">OpenLucid</span>
    </div>
    <nav class="flex-1 px-3 space-y-1 mt-2">
      <a href="/" class="sidebar-item">
        <svg class="w-[18px] h-[18px]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
        <span x-text="t('sidebar_offers')"></span>
      </a>
      <a href="/brandkit-list.html" class="sidebar-item active">
        <svg class="w-[18px] h-[18px]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.657-1.657a2 2 0 012.828 0l2.829 2.829a2 2 0 010 2.828l-8.486 8.485M7 17h.01"/></svg>
        <span x-text="t('sidebar_brandkit')"></span>
      </a>
      <a href="/creations.html" class="sidebar-item">
        <svg class="w-[18px] h-[18px]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>
        <span x-text="t('sidebar_creations')"></span>
      </a>
      <a href="/video-studio.html" class="sidebar-item">
        <svg class="w-[18px] h-[18px]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
        <span x-text="t('sidebar_videos')"></span>
      </a>
    </nav>
    <div class="px-3 pb-3 mt-auto">
      <div class="text-[10px] text-white/25 text-center">Powered by <a href="https://openlucid.ai/?ref=app" target="_blank" class="hover:text-white/40 transition-colors">OpenLucid</a></div>
    </div>
  </aside>

  <!-- Main -->
  <div class="flex-1 flex flex-col overflow-hidden">
    <!-- Header -->
    <header class="h-14 bg-white border-b flex items-center px-6 shrink-0 gap-3">
      <a href="/brandkit-list.html" class="text-gray-400 hover:text-gray-600">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
      </a>
      <span class="text-sm text-gray-400" x-text="t('breadcrumb')"></span>
      <svg class="w-4 h-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
      <h1 class="text-sm font-semibold text-gray-800" x-text="kit?.name || t('page_title')"></h1>
      <span x-show="kit" class="text-[11px] px-2 py-0.5 rounded-full bg-gray-100 text-gray-500"
            x-text="kit?.scope_type === 'merchant' ? t('scope_merchant') : t('scope_offer')"></span>
      <div class="flex-1"></div>
      <div id="avatar-mount"></div>
    </header>

    <main class="flex-1 overflow-y-auto">
      <!-- x-if (not x-show) so kit.foo isn't evaluated while kit is null —
           Alpine reads expressions inside x-show even when hidden, which
           caused "Cannot read properties of null (reading 'brand_voice')". -->
      <template x-if="kit">
      <div class="max-w-4xl mx-auto px-6 py-8 space-y-10" x-cloak>

        <!-- Brand Voice (OpenLucid-specific, top) -->
        <section>
          <div class="flex items-center justify-between mb-2">
            <div class="flex items-center gap-2">
              <h2 class="text-base font-semibold text-gray-800" x-text="t('brand_voice_title')"></h2>
              <button @click="aiFillOpen = true"
                      class="ai-cta text-xs bg-gradient-to-r from-purple-600 to-accent text-white px-3 py-1 rounded-md font-medium flex items-center gap-1">
                <svg class="w-3 h-3 ai-spark" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2l1.8 5.5L19 9l-5.2 1.5L12 16l-1.8-5.5L5 9l5.2-1.5z"/><path d="M18 16l.8 2.2L21 19l-2.2.8L18 22l-.8-2.2L15 19l2.2-.8z"/></svg>
                <span x-text="t('brandkit_ai_fill')"></span>
              </button>
            </div>
            <span class="text-xs text-gray-400" x-text="t('brand_voice_hint')"></span>
          </div>
          <textarea
            x-model="kit.brand_voice"
            @blur="saveVoice()"
            rows="6"
            :placeholder="t('brand_voice_placeholder')"
            class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm text-gray-700 leading-relaxed focus:outline-none focus:ring-2 focus:ring-accent/20 focus:border-accent resize-y"></textarea>
          <div class="mt-2 flex flex-wrap gap-2">
            <template x-for="preset in voicePresets" :key="preset.key">
              <button @click="applyVoicePreset(preset)"
                      class="text-[11px] text-gray-500 bg-gray-50 hover:bg-gray-100 hover:text-gray-700 px-2.5 py-1 rounded-md transition-colors"
                      x-text="preset.label"></button>
            </template>
          </div>
        </section>

        <!-- AI Quick Fill modal -->
        <div x-show="aiFillOpen" x-cloak
             @click.self="closeAiFill()"
             class="fixed inset-0 z-50 bg-black/40 flex items-center justify-center">
          <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg max-h-[85vh] flex flex-col" @click.stop>
            <div class="px-5 py-4 border-b flex items-center justify-between shrink-0">
              <h3 class="font-semibold text-gray-800" x-text="t('brandkit_ai_fill_title')"></h3>
              <button @click="closeAiFill()" class="text-gray-400 hover:text-gray-600">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
              </button>
            </div>
            <div class="p-5 overflow-y-auto flex-1 space-y-4">
              <p class="text-sm text-gray-500" x-text="t('brandkit_ai_fill_hint')"></p>

              <!-- URL input -->
              <div>
                <label class="block text-xs font-medium text-gray-600 mb-1.5" x-text="t('brandkit_ai_fill_url_label')"></label>
                <input x-model="aiFillUrl"
                       type="url"
                       :placeholder="t('brandkit_ai_fill_url_placeholder')"
                       class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-accent/20 focus:border-accent">
              </div>
              <div class="text-center text-xs text-gray-400" x-text="t('brandkit_ai_fill_or')"></div>
              <!-- File upload -->
              <label class="block border-2 border-dashed border-gray-200 rounded-xl py-8 text-center cursor-pointer hover:border-accent hover:text-accent transition-colors">
                <svg class="w-6 h-6 mx-auto mb-1.5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/></svg>
                <div class="text-sm text-gray-500" x-text="aiFillFile ? aiFillFile.name : t('brandkit_ai_fill_file_hint')"></div>
                <input type="file"
                       accept=".pdf,.pptx,.ppt,.docx,.doc,.xlsx,.xls,.txt,.csv"
                       class="hidden"
                       @change="aiFillFile = $event.target.files[0]">
              </label>

              <!-- Suggestion preview -->
              <template x-if="aiFillResult">
                <div class="bg-gray-50 rounded-xl border p-4 space-y-2">
                  <div class="text-xs font-semibold text-gray-500 uppercase tracking-wide" x-text="t('brandkit_ai_fill_result')"></div>
                  <textarea x-model="aiFillResult"
                            rows="8"
                            class="w-full bg-white border border-gray-200 rounded-lg px-3 py-2 text-sm text-gray-700 leading-relaxed focus:outline-none focus:ring-2 focus:ring-accent/20 focus:border-accent resize-y"></textarea>
                </div>
              </template>

              <!-- Error -->
              <template x-if="aiFillError">
                <div class="bg-red-50 border border-red-200 rounded-lg px-3 py-2 text-sm text-red-600" x-text="aiFillError"></div>
              </template>
            </div>
            <div class="px-5 py-3 border-t flex items-center justify-end gap-2 shrink-0">
              <button @click="closeAiFill()"
                      class="px-4 py-2 text-sm text-gray-500 hover:bg-gray-50 rounded-lg"
                      x-text="t('cancel')"></button>
              <button x-show="!aiFillResult"
                      @click="runAiFill()"
                      :disabled="aiFillLoading || (!aiFillUrl && !aiFillFile)"
                      class="ai-cta bg-gradient-to-r from-purple-600 to-accent text-white px-4 py-2 rounded-lg text-sm font-medium disabled:opacity-40 flex items-center gap-2">
                <svg x-show="aiFillLoading" class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"/></svg>
                <span x-text="aiFillLoading ? t('brandkit_ai_fill_running') : t('brandkit_ai_fill_run')"></span>
              </button>
              <button x-show="aiFillResult"
                      @click="applyAiFill()"
                      class="bg-accent hover:bg-accent-hover text-white px-4 py-2 rounded-lg text-sm font-medium"
                      x-text="t('brandkit_ai_fill_apply')"></button>
            </div>
          </div>
        </div>

        <!-- Logos — one Primary hero + alternate thumbnails -->
        <section>
          <div class="flex items-center justify-between mb-3">
            <h2 class="text-base font-semibold text-gray-800" x-text="t('logos')"></h2>
          </div>

          <!-- Primary Logo (hero card) -->
          <template x-if="primaryLogo">
            <div class="group relative bg-gray-50 border rounded-xl p-5 flex items-center gap-5 mb-4">
              <div class="w-20 h-20 bg-gray-200 rounded-lg border border-gray-300 flex items-center justify-center overflow-hidden shrink-0">
                <img :src="`/api/v1/assets/${primaryLogo.asset.id}/file`" class="w-full h-full object-contain p-2" :alt="primaryLogo.asset.file_name">
              </div>
              <div class="flex-1 min-w-0">
                <div class="text-base font-semibold text-gray-800" x-text="t('primary_logo')"></div>
                <div class="text-sm text-gray-400 truncate" x-text="primaryLogo.asset.file_name"></div>
              </div>
              <button @click="removeLink(primaryLogo.id)"
                      class="opacity-0 group-hover:opacity-100 bg-white hover:bg-red-50 hover:text-red-500 border border-gray-200 rounded-md p-1.5 transition-all">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
              </button>
            </div>
          </template>

          <!-- No logo yet → drop target -->
          <template x-if="!primaryLogo">
            <label class="block bg-gray-50 border-2 border-dashed border-gray-200 rounded-xl py-10 text-center text-sm text-gray-400 cursor-pointer hover:border-accent hover:text-accent transition-colors mb-4">
              <svg class="w-5 h-5 mx-auto mb-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
              <span x-text="t('drop_logo')"></span>
              <input type="file" accept="image/*" class="hidden" @change="uploadAsset($event, 'logo')">
            </label>
          </template>

          <!-- Alternate logos — thumbnail grid with upload-more slot -->
          <div class="grid grid-cols-6 gap-3" x-show="primaryLogo">
            <template x-for="link in alternateLogos" :key="link.id">
              <div class="group relative">
                <div class="aspect-square bg-gray-200 border border-gray-300 rounded-lg overflow-hidden cursor-pointer hover:border-accent transition-colors"
                     @click="setPrimaryLogo(link.id)"
                     :title="t('click_set_primary')">
                  <img :src="`/api/v1/assets/${link.asset.id}/file`" class="w-full h-full object-contain p-2" :alt="link.asset.file_name">
                </div>
                <div class="mt-1.5 text-[11px] text-gray-500 truncate" x-text="link.asset.file_name"></div>
                <button @click="removeLink(link.id)"
                        class="absolute top-1 right-1 opacity-0 group-hover:opacity-100 bg-white hover:bg-red-50 hover:text-red-500 border rounded-full p-1 transition-all">
                  <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
              </div>
            </template>
            <label class="aspect-square border-2 border-dashed border-gray-200 rounded-lg flex items-center justify-center cursor-pointer hover:border-accent hover:text-accent text-gray-300 transition-colors"
                   :title="t('add_logo')">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
              <input type="file" accept="image/*" class="hidden" @change="uploadAsset($event, 'logo')">
            </label>
          </div>
        </section>

        <!-- Colors -->
        <section>
          <div class="flex items-center justify-between mb-3">
            <h2 class="text-base font-semibold text-gray-800" x-text="t('colors')"></h2>
            <label class="text-xs text-accent hover:text-accent-hover font-medium flex items-center gap-1 cursor-pointer">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
              <span x-text="t('add_color')"></span>
              <input type="color" class="sr-only" value="#155EEF"
                     @change="addCustomColor($event.target.value); $event.target.value = '#155EEF'">
            </label>
          </div>
          <!-- Named color slots -->
          <div class="grid grid-cols-2 gap-3">
            <template x-for="role in ['primary', 'secondary', 'tertiary', 'accent']" :key="role">
              <div class="bg-white border rounded-xl p-4 flex items-center gap-3">
                <label class="w-10 h-10 rounded-full border shrink-0 cursor-pointer"
                       :style="'background:' + (getNamedColorHex(role) || '#F3F4F6')">
                  <input type="color"
                         class="opacity-0 w-10 h-10 cursor-pointer"
                         :value="getNamedColorHex(role) || '#000000'"
                         @change="setNamedColor(role, $event.target.value)">
                </label>
                <div class="flex-1 min-w-0">
                  <div class="text-sm font-semibold text-gray-800 capitalize" x-text="role"></div>
                  <div class="text-xs text-gray-400 font-mono uppercase" x-text="getNamedColorHex(role) || t('not_set')"></div>
                </div>
                <button x-show="getNamedColorHex(role)"
                        @click="clearNamedColor(role)"
                        class="text-gray-300 hover:text-red-400 p-1">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
              </div>
            </template>
          </div>
          <!-- Custom palette -->
          <div class="mt-4 flex flex-wrap gap-3" x-show="customColors.length > 0">
            <template x-for="c in customColors" :key="c.id">
              <div class="flex flex-col items-center gap-1 group relative">
                <div class="w-12 h-12 rounded-full border shrink-0" :style="'background:' + c.hex"></div>
                <span class="text-[10px] text-gray-400 font-mono uppercase" x-text="c.hex"></span>
                <button @click="removeColor(c.id)"
                        class="absolute -top-1 -right-1 opacity-0 group-hover:opacity-100 bg-white hover:bg-red-50 hover:text-red-500 border rounded-full p-0.5 transition-all">
                  <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
              </div>
            </template>
          </div>
        </section>

        <!-- Fonts -->
        <section>
          <div class="flex items-center justify-between mb-3">
            <h2 class="text-base font-semibold text-gray-800" x-text="t('fonts')"></h2>
          </div>
          <div class="space-y-3">
            <template x-for="role in ['title', 'body']" :key="role">
              <div class="relative bg-white border rounded-xl p-4 flex items-center gap-3 cursor-pointer hover:border-accent transition-colors"
                   @click="openPicker = openPicker === role ? null : role">
                <div class="flex-1 min-w-0">
                  <div class="text-sm font-semibold text-gray-800" x-text="role === 'title' ? t('font_title') : t('font_body')"></div>
                  <div class="mt-0.5 text-sm text-gray-500 truncate"
                       x-text="getNamedFontName(role) || t('font_not_set')"></div>
                </div>
                <div class="w-16 h-16 bg-gray-50 rounded-lg flex items-center justify-center text-gray-700 text-2xl shrink-0"
                     :style="getNamedFontName(role) ? `font-family: &quot;${getNamedFontName(role)}&quot;, sans-serif` : ''">
                  Aa
                </div>
                <svg class="w-4 h-4 text-gray-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
              </div>
            </template>
          </div>

          <!-- Font picker popup -->
          <div x-show="openPicker" x-cloak
               @click.self="openPicker = null"
               class="fixed inset-0 z-50 bg-black/30 flex items-center justify-center">
            <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md max-h-[70vh] flex flex-col overflow-hidden" @click.stop>
              <div class="px-5 py-3 border-b flex items-center justify-between shrink-0">
                <h3 class="font-semibold text-gray-800"
                    x-text="openPicker === 'title' ? t('pick_title_font') : t('pick_body_font')"></h3>
                <button @click="openPicker = null" class="text-gray-400 hover:text-gray-600">
                  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
              </div>
              <div class="overflow-y-auto flex-1">
                <button @click="setNamedFont(openPicker, ''); openPicker = null"
                        class="w-full px-5 py-3 text-left text-sm text-gray-400 italic border-b hover:bg-gray-50"
                        x-text="t('font_clear')"></button>
                <template x-for="font in fontOptions" :key="font">
                  <button @click="setNamedFont(openPicker, font); openPicker = null"
                          class="w-full px-5 py-4 text-left hover:bg-gray-50 border-b border-gray-50 flex items-center justify-between gap-4"
                          :class="getNamedFontName(openPicker) === font ? 'bg-accent-light' : ''">
                    <span class="text-lg text-gray-800" :style="`font-family: &quot;${font}&quot;, sans-serif`" x-text="font"></span>
                    <span class="text-2xl text-gray-500 shrink-0" :style="`font-family: &quot;${font}&quot;, sans-serif`">Aa</span>
                  </button>
                </template>
              </div>
            </div>
          </div>
        </section>

        <!-- Danger -->
        <section class="pt-4 border-t border-gray-100">
          <button @click="deleteKit()"
                  class="text-xs text-red-500 hover:text-red-700" x-text="t('delete_kit')"></button>
        </section>

      </div>
      </template>
    </main>
  </div>

  <script>
    const API = '/api/v1';

    function brandkitApp() {
      const params = new URLSearchParams(location.search);
      return {
        kit: null,
        colors: [],
        fonts: [],
        assetLinks: [],

        // Font picker state — null when closed, 'title' / 'body' when open for that role
        openPicker: null,

        // AI Quick Fill state
        aiFillOpen: false,
        aiFillUrl: '',
        aiFillFile: null,
        aiFillLoading: false,
        aiFillResult: null,
        aiFillError: null,
        // Curated list of web fonts. Must match the family names preloaded
        // in the <head> Google Fonts URL. Order is intentional (display
        // fonts first, then editorial serif, then modern sans, then CJK).
        fontOptions: [
          'Alice', 'Playfair Display', 'DM Serif Display', 'Bodoni Moda',
          'Libre Baskerville', 'Cormorant Garamond', 'Prata',
          'Merriweather', 'PT Serif', 'Roboto Slab',
          'Inter', 'Poppins', 'Montserrat', 'Oswald', 'Bebas Neue',
          'Lato', 'Open Sans', 'IBM Plex Sans',
          'Noto Sans SC', 'Noto Serif SC', 'ZCOOL XiaoWei',
        ],

        get voicePresets() {
          return [
            { key: 'casual',    label: t('brandkit_voice_preset_casual'),    tpl: t('brandkit_voice_tpl_casual') },
            { key: 'authority', label: t('brandkit_voice_preset_authority'), tpl: t('brandkit_voice_tpl_authority') },
            { key: 'humor',     label: t('brandkit_voice_preset_humor'),     tpl: t('brandkit_voice_tpl_humor') },
            { key: 'expert',    label: t('brandkit_voice_preset_expert'),    tpl: t('brandkit_voice_tpl_expert') },
            { key: 'friend',    label: t('brandkit_voice_preset_friend'),    tpl: t('brandkit_voice_tpl_friend') },
          ];
        },

        get logoLinks() {
          // priority asc, then most recent first — primary = priority 0
          return this.assetLinks
            .filter(l => l.role === 'logo')
            .sort((a, b) => (a.priority ?? 999) - (b.priority ?? 999) ||
                             new Date(b.created_at) - new Date(a.created_at));
        },

        get primaryLogo() {
          const logos = this.logoLinks;
          return logos.length > 0 ? logos[0] : null;
        },

        get alternateLogos() {
          return this.logoLinks.slice(1);
        },

        get customColors() {
          return this.colors.filter(c => c.role === 'custom');
        },

        async init() {
          const kitId = params.get('id');
          if (!kitId) { toast.error('Missing brandkit id'); return; }
          await Promise.all([
            this.loadKit(kitId),
            this.loadColors(kitId),
            this.loadFonts(kitId),
            this.loadAssets(kitId),
          ]);
        },

        async loadKit(id) {
          const res = await fetch(`${API}/brandkits/${id}`);
          if (res.ok) this.kit = await res.json();
        },

        async loadColors(id) {
          const res = await fetch(`${API}/brandkits/${id}/colors`);
          if (res.ok) this.colors = await res.json();
        },

        async loadFonts(id) {
          const res = await fetch(`${API}/brandkits/${id}/fonts`);
          if (res.ok) this.fonts = await res.json();
        },

        async loadAssets(id) {
          const res = await fetch(`${API}/brandkits/${id}/asset-links?page_size=100`);
          if (res.ok) {
            const data = await res.json();
            this.assetLinks = data.items || [];
          }
        },

        async saveVoice() {
          if (!this.kit) return;
          await fetch(`${API}/brandkits/${this.kit.id}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ brand_voice: this.kit.brand_voice || '' }),
          });
        },

        applyVoicePreset(preset) {
          const existing = (this.kit?.brand_voice || '').trim();
          if (existing && !confirm(t('brandkit_fill_confirm'))) return;
          this.kit.brand_voice = preset.tpl;
          this.saveVoice();
        },

        // ── AI Quick Fill ─────────────────────────────────────

        closeAiFill() {
          this.aiFillOpen = false;
          this.aiFillUrl = '';
          this.aiFillFile = null;
          this.aiFillResult = null;
          this.aiFillError = null;
          this.aiFillLoading = false;
        },

        async runAiFill() {
          if (this.aiFillLoading) return;
          this.aiFillLoading = true;
          this.aiFillError = null;
          const form = new FormData();
          if (this.aiFillFile) form.append('file', this.aiFillFile);
          if (this.aiFillUrl) form.append('url', this.aiFillUrl);
          try {
            const res = await fetch(`${API}/brandkits/${this.kit.id}/suggest-voice`, {
              method: 'POST', body: form,
            });
            const data = await res.json().catch(() => ({}));
            if (!res.ok) {
              this.aiFillError = data.error || data.detail || t('upload_failed');
            } else {
              this.aiFillResult = data.brand_voice || '';
            }
          } catch (e) {
            this.aiFillError = e.message || t('upload_failed');
          } finally {
            this.aiFillLoading = false;
          }
        },

        applyAiFill() {
          const existing = (this.kit?.brand_voice || '').trim();
          if (existing && !confirm(t('brandkit_fill_confirm'))) return;
          this.kit.brand_voice = this.aiFillResult;
          this.saveVoice();
          this.closeAiFill();
        },

        // ── Colors ─────────────────────────────────────────────

        getNamedColorHex(role) {
          const c = this.colors.find(c => c.role === role);
          return c?.hex;
        },

        async setNamedColor(role, hex) {
          hex = hex.toUpperCase();
          const existing = this.colors.find(c => c.role === role);
          if (existing) {
            const res = await fetch(`${API}/brandkits/${this.kit.id}/colors/${existing.id}`, {
              method: 'PATCH',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ hex }),
            });
            if (res.ok) {
              const updated = await res.json();
              Object.assign(existing, updated);
            }
          } else {
            const res = await fetch(`${API}/brandkits/${this.kit.id}/colors`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ role, hex, priority: 0 }),
            });
            if (res.ok) this.colors.push(await res.json());
          }
        },

        async clearNamedColor(role) {
          const existing = this.colors.find(c => c.role === role);
          if (!existing) return;
          await fetch(`${API}/brandkits/${this.kit.id}/colors/${existing.id}`, { method: 'DELETE' });
          this.colors = this.colors.filter(c => c.id !== existing.id);
        },

        async addCustomColor(hex) {
          if (!hex || !/^#[0-9A-Fa-f]{3,8}$/.test(hex)) return;
          const res = await fetch(`${API}/brandkits/${this.kit.id}/colors`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ role: 'custom', hex: hex.toUpperCase(), priority: this.colors.length }),
          });
          if (res.ok) this.colors.push(await res.json());
        },

        async removeColor(id) {
          await fetch(`${API}/brandkits/${this.kit.id}/colors/${id}`, { method: 'DELETE' });
          this.colors = this.colors.filter(c => c.id !== id);
        },

        // ── Fonts ──────────────────────────────────────────────

        getNamedFontName(role) {
          const f = this.fonts.find(f => f.role === role);
          return f?.font_name;
        },

        async setNamedFont(role, name) {
          name = (name || '').trim();
          const existing = this.fonts.find(f => f.role === role);
          if (!name) {
            if (existing) {
              await fetch(`${API}/brandkits/${this.kit.id}/fonts/${existing.id}`, { method: 'DELETE' });
              this.fonts = this.fonts.filter(f => f.id !== existing.id);
            }
            return;
          }
          if (existing) {
            if (existing.font_name === name) return;
            const res = await fetch(`${API}/brandkits/${this.kit.id}/fonts/${existing.id}`, {
              method: 'PATCH',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ font_name: name }),
            });
            if (res.ok) Object.assign(existing, await res.json());
          } else {
            const res = await fetch(`${API}/brandkits/${this.kit.id}/fonts`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ role, font_name: name, priority: 0 }),
            });
            if (res.ok) this.fonts.push(await res.json());
          }
        },

        // ── Assets ─────────────────────────────────────────────

        async uploadAsset(event, role) {
          const file = event.target.files?.[0];
          if (!file) return;
          const assetType = (file.type || '').startsWith('video/') ? 'video' : 'image';
          const form = new FormData();
          form.append('file', file);
          form.append('scope_type', this.kit.scope_type);
          form.append('scope_id', this.kit.scope_id);
          form.append('asset_type', assetType);
          const up = await fetch(`${API}/assets/upload`, { method: 'POST', body: form });
          if (!up.ok) {
            const err = await up.json().catch(() => ({}));
            toast.error(t('upload_failed') + (err.detail ? `: ${typeof err.detail === 'string' ? err.detail : JSON.stringify(err.detail)}` : ''));
            event.target.value = '';
            return;
          }
          const asset = await up.json();
          const link = await fetch(`${API}/brandkits/${this.kit.id}/asset-links`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ asset_id: asset.id, role }),
          });
          if (link.ok) {
            this.assetLinks.push(await link.json());
            await this.loadAssets(this.kit.id);  // refresh so asset.url is populated
          }
          event.target.value = '';
        },

        async setPrimaryLogo(linkId) {
          const res = await fetch(`${API}/brandkits/${this.kit.id}/asset-links/${linkId}/set-primary`,
                                  { method: 'POST' });
          if (res.ok) {
            await this.loadAssets(this.kit.id);
          }
        },

        async removeLink(linkId) {
          if (!confirm(t('confirm_remove_link'))) return;
          await fetch(`${API}/brandkits/${this.kit.id}/asset-links/${linkId}`, { method: 'DELETE' });
          this.assetLinks = this.assetLinks.filter(l => l.id !== linkId);
        },

        async deleteKit() {
          if (!confirm(t('confirm_delete_kit'))) return;
          await fetch(`${API}/brandkits/${this.kit.id}`, { method: 'DELETE' });
          location.href = '/brandkit-list.html';
        },
      };
    }
  </script>
</body>
</html>
