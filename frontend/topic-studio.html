<!DOCTYPE html>
<html :lang="window._odLang === 'zh' ? 'zh-CN' : 'en'">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Topic Studio - OpenLucid</title>
  <script>
    document.documentElement.style.display='none';
    fetch('/api/v1/auth/me').then(r=>{
      if(!r.ok) fetch('/api/v1/auth/setup-status').then(r=>r.json()).then(s=>{
        location.href=s.needs_setup?'/install.html':'/signin.html';
      });
      else document.documentElement.style.display='';
    });
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: {
        sidebar: { DEFAULT: '#1C1C28', hover: '#2A2A3C' },
        accent: { DEFAULT: '#155EEF', light: '#EFF4FF', hover: '#1849C6' },
      }}}
    }
  </script>
  <script src="/js/i18n.js"></script>
  <script src="/js/pinned-apps.js"></script>
  <script src="/js/avatar.js"></script>
  <script src="/js/feedback.js"></script>
  <script src="/js/apps-shared.js"></script>
  <script src="/js/header-selectors.js"></script>
  <script src="/js/shared.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
  <style>
    [x-cloak]{display:none!important}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',sans-serif}
    .sidebar-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;color:#A0A0B0;font-size:14px;cursor:pointer;transition:all .15s}
    .sidebar-item:hover{background:#2A2A3C;color:#E0E0EE}
    .sidebar-item.active{background:#2D2D40;color:#fff}
  </style>
</head>
<body class="bg-gray-50 h-screen flex overflow-hidden"
      x-data="topicStudio()" x-init="init()">

  <!-- Sidebar -->
  <aside class="w-56 bg-sidebar flex flex-col shrink-0">
    <div class="px-4 py-5 flex items-center gap-2.5">
      <img src="/images/logo.png" alt="OpenLucid" class="w-8 h-8 rounded-lg">
      <span class="text-white font-semibold text-base">OpenLucid</span>
    </div>
    <nav class="flex-1 px-3 space-y-1 mt-2">
      <a href="/" class="sidebar-item">
        <svg class="w-[18px] h-[18px]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
        <span x-text="t('sidebar_offers')"></span>
      </a>
      <a href="/brandkit-list.html" class="sidebar-item">
        <svg class="w-[18px] h-[18px]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.657-1.657a2 2 0 012.828 0l2.829 2.829a2 2 0 010 2.828l-8.486 8.485M7 17h.01"/></svg>
        <span x-text="t('sidebar_brandkit')"></span>
      </a>
      <a href="/creations.html" class="sidebar-item">
        <svg class="w-[18px] h-[18px]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>
        <span x-text="t('sidebar_creations')"></span>
      </a>
      <a href="/video-studio.html" class="sidebar-item">
        <svg class="w-[18px] h-[18px]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
        <span x-text="t('sidebar_videos')"></span>
      </a>
    </nav>
    <div class="px-3 pb-3 mt-auto">
      <div class="text-[10px] text-white/25 text-center">Powered by <a href="https://openlucid.ai/?ref=app" target="_blank" class="hover:text-white/40 transition-colors">OpenLucid</a></div>
    </div>
  </aside>

  <!-- Main -->
  <div class="flex-1 flex flex-col overflow-hidden">
    <!-- Header -->
    <header class="bg-white border-b px-6 shrink-0">
      <div class="h-14 flex items-center gap-2">
        <a href="/" class="text-sm text-gray-400 hover:text-accent" x-text="t('breadcrumb_home')"></a>
        <svg class="w-4 h-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
        <span class="text-sm font-medium text-gray-800">💡 <span x-text="t('page_title')"></span></span>
        <div class="flex-1"></div>
        <div class="flex items-center gap-3">
          <a href="/setting.html?section=mcp" class="inline-flex items-center gap-1.5 text-xs font-medium text-gray-500 hover:text-gray-700 border border-gray-200 hover:border-gray-300 px-2.5 py-1.5 rounded-lg transition-colors">
            <span class="w-1.5 h-1.5 bg-green-400 rounded-full"></span>
            MCP
          </a>
          <div id="avatar-mount"></div>
        </div>
      </div>
      <!-- Offer selector row -->
      <div class="pb-4 flex items-center gap-4 flex-wrap">
        <div class="flex items-center gap-2">
          <label class="text-sm text-gray-500 shrink-0" x-text="t('offer_label')"></label>
          <select x-model="offerId" @change="onOfferChange()"
                  class="border border-gray-200 rounded-lg px-3 py-1.5 text-sm text-gray-700 bg-white focus:outline-none focus:ring-2 focus:ring-accent/20 focus:border-accent min-w-[14rem]">
            <template x-for="o in offers" :key="o.id">
              <option :value="o.id" x-text="o.name"></option>
            </template>
          </select>
        </div>
        <!-- Strategy unit selector (shown once offer is selected) -->
        <div class="flex items-center gap-2" x-show="offerId && strategyUnits.length > 0" x-cloak>
          <label class="text-sm text-gray-500 shrink-0" x-text="t('unit_label')"></label>
          <select x-model="strategyUnitId" @change="onUnitChange()"
                  class="border border-gray-200 rounded-lg px-3 py-1.5 text-sm text-gray-700 bg-white focus:outline-none focus:ring-2 focus:ring-accent/20 focus:border-accent min-w-[12rem]">
            <option value="" x-text="t('unit_default')"></option>
            <template x-for="u in strategyUnits" :key="u.id">
              <option :value="u.id" x-text="u.name"></option>
            </template>
          </select>
        </div>
        <!-- LLM model selector — composite (config_id::model_name) keys
             so users can pick any model the endpoint actually serves,
             not just the saved default. Populated by the shared
             ``expandConfigsToModels`` helper after page load. -->
        <div class="flex items-center gap-2" x-show="modelOptions.length > 0" x-cloak>
          <label class="text-sm text-gray-500 shrink-0" x-text="t('model_label')"></label>
          <select x-model="modelKey" @change="onModelChange()"
                  class="border border-gray-200 rounded-lg px-3 py-1.5 text-sm text-gray-700 bg-white focus:outline-none focus:ring-2 focus:ring-accent/20 focus:border-accent min-w-[10rem]">
            <template x-for="m in modelOptions" :key="m.key">
              <option :value="m.key" x-text="m.label"></option>
            </template>
          </select>
        </div>
      </div>
    </header>

    <main class="flex-1 overflow-y-auto">
      <!-- No offer selected -->
      <div x-show="!offerId" class="flex flex-col items-center justify-center h-full">
        <div class="w-16 h-16 bg-accent/10 rounded-2xl flex items-center justify-center mb-4 text-3xl">💡</div>
        <p class="text-gray-600 text-sm mb-1 font-medium" x-text="t('empty_title')"></p>
        <p class="text-gray-400 text-sm" x-text="t('empty_hint')"></p>
      </div>

      <!-- Has offer -->
      <div x-show="offerId" class="p-6">
        <div class="flex gap-5">

          <!-- Left: Context Panel -->
          <div class="w-72 shrink-0 flex flex-col gap-4">
            <div class="bg-white rounded-xl border p-5 sticky top-0">
              <h3 class="font-semibold text-gray-800 mb-4 flex items-center gap-2">
                <span x-text="t('context_title')"></span>
                <span x-show="loadingCtx" class="text-xs text-gray-400 font-normal" x-text="t('loading')"></span>
              </h3>

              <div x-show="!context && !loadingCtx" class="text-sm text-gray-400 text-center py-4" x-text="t('select_offer_ctx')"></div>

              <div x-show="context" class="space-y-3">
                <div>
                  <div class="text-xs text-gray-400 mb-0.5" x-text="t('ctx_offer')"></div>
                  <div class="text-sm font-medium text-gray-800" x-text="context?.offer_name || '-'"></div>
                </div>
                <div x-show="context?.unit_name">
                  <div class="text-xs text-gray-400 mb-0.5" x-text="t('ctx_unit')"></div>
                  <div class="text-sm font-medium text-gray-800" x-text="context?.unit_name"></div>
                </div>
                <template x-if="context?.unit_name">
                  <div class="grid grid-cols-2 gap-2 pt-1">
                    <div x-show="context?.audience_segment">
                      <div class="text-xs text-gray-400" x-text="t('ctx_audience')"></div>
                      <div class="text-xs text-gray-700 mt-0.5" x-text="context?.audience_segment"></div>
                    </div>
                    <div x-show="context?.scenario">
                      <div class="text-xs text-gray-400" x-text="t('ctx_scenario')"></div>
                      <div class="text-xs text-gray-700 mt-0.5" x-text="context?.scenario"></div>
                    </div>
                    <div x-show="context?.channel">
                      <div class="text-xs text-gray-400" x-text="t('ctx_channel')"></div>
                      <div class="text-xs text-gray-700 mt-0.5" x-text="context?.channel"></div>
                    </div>
                    <div x-show="context?.marketing_objective">
                      <div class="text-xs text-gray-400" x-text="t('ctx_objective')"></div>
                      <div class="text-xs text-gray-700 mt-0.5" x-text="({awareness:t('mo_awareness'),education:t('mo_education'),trust_building:t('mo_trust_building'),lead_generation:t('mo_lead_generation'),conversion:t('mo_conversion'),retention:t('mo_retention'),launch:t('mo_launch'),branding:t('mo_branding')}[context?.marketing_objective] || context?.marketing_objective)"></div>
                    </div>
                  </div>
                </template>
                <div class="pt-2 border-t border-gray-50 space-y-2">
                  <div class="flex items-center justify-between text-xs">
                    <span class="text-gray-500" x-text="t('ctx_knowledge')"></span>
                    <span class="text-gray-700" x-text="context?.knowledge_count ?? 0"></span>
                  </div>
                  <div class="flex items-center justify-between text-xs" x-show="context?.unit_name">
                    <span class="text-gray-500" x-text="t('ctx_linked_knowledge')"></span>
                    <span :class="(context?.linked_knowledge_count ?? 0) > 0 ? 'text-green-600 font-medium' : 'text-orange-500'" x-text="context?.linked_knowledge_count ?? 0"></span>
                  </div>
                  <div class="flex items-center justify-between text-xs">
                    <span class="text-gray-500" x-text="t('ctx_assets')"></span>
                    <span class="text-gray-700" x-text="context?.asset_count ?? 0"></span>
                  </div>
                  <div class="flex items-center justify-between text-xs" x-show="context?.unit_name">
                    <span class="text-gray-500" x-text="t('ctx_linked_assets')"></span>
                    <span :class="(context?.linked_asset_count ?? 0) > 0 ? 'text-green-600 font-medium' : 'text-gray-400'" x-text="context?.linked_asset_count ?? 0"></span>
                  </div>
                </div>
                <div class="pt-2 border-t border-gray-50 flex items-center gap-2">
                  <div :class="context?.is_ready ? 'bg-green-500' : 'bg-orange-400'" class="w-2 h-2 rounded-full shrink-0"></div>
                  <span class="text-xs" :class="context?.is_ready ? 'text-green-600' : 'text-orange-500'"
                        x-text="context?.is_ready ? t('ctx_ready') : t('ctx_suggest_link')"></span>
                </div>
              </div>
            </div>
          </div>

          <!-- Right: Generate + Results + History -->
          <div class="flex-1 min-w-0 flex flex-col gap-5">

            <!-- Generate Card -->
            <div class="bg-white rounded-xl border p-6">
              <!-- Creative brief (free-text instruction) -->
              <div class="mb-4">
                <div class="flex items-center justify-between mb-1.5">
                  <label class="block text-sm font-medium text-gray-700">
                    <span x-text="t('topic_instruction_label')"></span>
                    <span class="text-xs text-gray-400 font-normal" x-text="t('topic_instruction_optional')"></span>
                  </label>
                  <button @click="suggestInstruction()"
                          :disabled="!offerId || suggestingInstruction"
                          class="text-xs text-accent hover:text-accent-hover disabled:opacity-40 transition flex items-center gap-1">
                    <svg x-show="!suggestingInstruction" class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
                    <svg x-show="suggestingInstruction" class="w-3 h-3 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"/></svg>
                    <span x-text="t('suggest_topic')"></span>
                  </button>
                </div>
                <textarea x-model="form.instruction"
                          rows="2"
                          maxlength="1000"
                          :placeholder="t('topic_instruction_placeholder')"
                          class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm text-gray-700 focus:outline-none focus:ring-2 focus:ring-accent/20 focus:border-accent resize-none"></textarea>
                <div class="flex flex-wrap gap-1.5 mt-1.5">
                  <template x-for="ex in instructionExamples" :key="ex">
                    <button type="button"
                            @click="form.instruction = ex"
                            class="text-[11px] text-gray-500 bg-gray-50 hover:bg-gray-100 hover:text-gray-700 px-2 py-0.5 rounded transition-colors"
                            x-text="ex"></button>
                  </template>
                </div>
              </div>

              <!-- Hot-topic / external context panel (per-call, collapsible) -->
              <details class="mb-4 border border-gray-200 rounded-lg overflow-hidden"
                       :open="hotspotPanelOpen"
                       @toggle="hotspotPanelOpen = $event.target.open">
                <summary class="px-3 py-2 text-sm font-medium text-gray-700 cursor-pointer select-none hover:bg-gray-50 transition-colors flex items-center gap-2">
                  <span x-text="t('hotspot_panel_label')"></span>
                  <span class="text-xs text-gray-400 font-normal" x-text="t('hotspot_panel_optional')"></span>
                  <span x-show="form.external_context_text" x-cloak
                        class="ml-auto text-[11px] bg-orange-50 text-orange-600 px-2 py-0.5 rounded-full font-medium"
                        x-text="(form.external_context_text||'').length + ' chars'"></span>
                </summary>
                <div class="px-3 py-3 border-t border-gray-100 space-y-3">
                  <p class="text-xs text-gray-500 leading-relaxed" x-text="t('hotspot_panel_hint')"></p>
                  <!-- URL extract row -->
                  <div>
                    <label class="block text-xs text-gray-500 mb-1" x-text="t('hotspot_url_label')"></label>
                    <div class="flex gap-2">
                      <input x-model="form.external_context_url"
                             type="url"
                             :placeholder="t('hotspot_url_placeholder')"
                             class="flex-1 border border-gray-200 rounded-lg px-3 py-1.5 text-sm text-gray-700 focus:outline-none focus:ring-2 focus:ring-accent/20 focus:border-accent">
                      <button type="button"
                              @click="extractHotspotUrl()"
                              :disabled="!form.external_context_url || hotspotExtracting"
                              class="text-xs font-medium text-accent border border-accent/40 hover:bg-accent/5 disabled:opacity-40 disabled:cursor-not-allowed px-3 py-1.5 rounded-lg transition-colors flex items-center gap-1 shrink-0">
                        <svg x-show="hotspotExtracting" class="w-3 h-3 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"/></svg>
                        <span x-text="hotspotExtracting ? t('hotspot_extracting') : t('hotspot_extract_btn')"></span>
                      </button>
                    </div>
                  </div>
                  <!-- Text area -->
                  <div>
                    <div class="flex items-center justify-between mb-1">
                      <label class="block text-xs text-gray-500" x-text="t('hotspot_text_label')"></label>
                      <button type="button" x-show="form.external_context_text"
                              @click="form.external_context_text=''; form.external_context_url=''"
                              class="text-[11px] text-gray-400 hover:text-gray-600"
                              x-text="t('hotspot_clear')"></button>
                    </div>
                    <textarea x-model="form.external_context_text"
                              rows="6"
                              maxlength="8000"
                              :placeholder="t('hotspot_text_placeholder')"
                              class="w-full border border-gray-200 rounded-lg px-3 py-2 text-xs text-gray-700 font-mono leading-relaxed focus:outline-none focus:ring-2 focus:ring-accent/20 focus:border-accent resize-y"></textarea>
                    <div class="flex items-center justify-between text-[11px] mt-1">
                      <span x-show="(form.external_context_text||'').length > 8000" class="text-red-500" x-text="t('hotspot_text_too_long')"></span>
                      <span class="ml-auto text-gray-400 tabular-nums" x-text="(form.external_context_text||'').length + ' / 8000'"></span>
                    </div>
                  </div>
                </div>
              </details>
              <div class="flex items-end gap-5 flex-wrap">
                <div>
                  <label class="block text-sm font-medium text-gray-700 mb-1.5" x-text="t('count_label')"></label>
                  <div class="flex items-center gap-3">
                    <input x-model.number="form.count" type="range" min="1" max="10" class="w-24 accent-accent">
                    <span class="text-sm text-gray-600 tabular-nums w-4 text-center" x-text="form.count"></span>
                  </div>
                </div>
                <button @click="generate()" :disabled="generating || !offerId"
                        class="ai-cta bg-gradient-to-r from-purple-600 to-accent text-white px-6 py-2 rounded-lg text-[13px] font-medium disabled:opacity-50 flex items-center gap-2 ml-auto shrink-0">
                  <svg x-show="generating" class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"/></svg>
                  <svg x-show="!generating" class="w-4 h-4 ai-spark" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2l1.8 5.5L19 9l-5.2 1.5L12 16l-1.8-5.5L5 9l5.2-1.5z"/><path d="M18 16l.8 2.2L21 19l-2.2.8L18 22l-.8-2.2L15 19l2.2-.8z"/></svg>
                  <span x-text="generating ? t('generating') : t('generate_btn')"></span>
                </button>
              </div>
              <!-- Progress bar -->
              <div x-show="generating" x-cloak class="mt-4 pt-4 border-t border-gray-100">
                <div class="flex items-center justify-between mb-1.5">
                  <span class="text-xs text-gray-500" x-text="genStep"></span>
                  <span class="text-xs text-gray-400 tabular-nums" x-text="Math.round(genProgress) + '%'"></span>
                </div>
                <div class="h-1.5 bg-gray-100 rounded-full overflow-hidden">
                  <div class="h-full rounded-full bg-gradient-to-r from-purple-500 to-accent transition-all duration-300"
                       :style="'width:' + genProgress + '%'"></div>
                </div>
              </div>
            </div>

            <!-- New Plans (just generated) -->
            <div x-show="newPlans.length > 0" x-cloak>
              <!-- Hotspot summary (only when trend-bridge mode produced output) -->
              <template x-if="genHotspot">
                <div class="mb-4 bg-orange-50 border border-orange-200 rounded-lg p-4">
                  <div class="flex items-center gap-2 mb-2">
                    <span class="text-base">🔥</span>
                    <h4 class="text-sm font-semibold text-orange-700" x-text="t('hotspot_summary_title')"></h4>
                  </div>
                  <div class="space-y-1.5 text-xs">
                    <div x-show="genHotspot?.event">
                      <span class="text-orange-600 font-medium" x-text="t('hotspot_event') + ': '"></span>
                      <span class="text-gray-700" x-text="genHotspot?.event"></span>
                    </div>
                    <div x-show="genHotspot?.keywords?.length">
                      <span class="text-orange-600 font-medium" x-text="t('hotspot_keywords') + ': '"></span>
                      <template x-for="(kw, i) in (genHotspot?.keywords || [])" :key="'k'+i">
                        <span class="inline-block bg-white text-orange-600 border border-orange-200 px-1.5 py-0.5 rounded mr-1 text-[11px]" x-text="kw"></span>
                      </template>
                    </div>
                    <div x-show="genHotspot?.public_attention">
                      <span class="text-orange-600 font-medium" x-text="t('hotspot_attention') + ': '"></span>
                      <span class="text-gray-700" x-text="genHotspot?.public_attention"></span>
                    </div>
                    <div x-show="genHotspot?.risk_zones?.length">
                      <span class="text-red-600 font-medium" x-text="t('hotspot_risk') + ': '"></span>
                      <template x-for="(r, i) in (genHotspot?.risk_zones || [])" :key="'r'+i">
                        <span class="inline-block bg-red-50 text-red-600 border border-red-200 px-1.5 py-0.5 rounded mr-1 text-[11px]" x-text="r"></span>
                      </template>
                    </div>
                  </div>
                </div>
              </template>
              <!-- Thinking (collapsible) -->
              <template x-if="genThinking">
                <details class="mb-4 bg-gray-50 border border-gray-200 rounded-lg overflow-hidden">
                  <summary class="px-4 py-2.5 text-xs font-medium text-gray-500 cursor-pointer select-none hover:bg-gray-100 transition-colors flex items-center gap-1.5">
                    <svg class="w-3.5 h-3.5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>

                          <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M12.395 2.553a1 1 0 00-1.45-.385c-.345.23-.614.558-.822.88-.214.33-.403.713-.57 1.116-.334.804-.614 1.768-.84 2.734a31.365 31.365 0 00-.613 3.58 2.64 2.64 0 01-.945-1.067c-.328-.68-.398-1.534-.398-2.654A1 1 0 005.05 6.05 6.981 6.981 0 003 11a7 7 0 1011.95-4.95c-.592-.591-.98-.985-1.348-1.467-.363-.476-.724-1.063-1.207-2.03zM12.12 15.12A3 3 0 017 13s.879.5 2.5.5c0-1 .5-4 1.25-4.5.5 1 .786 1.293 1.371 1.879A2.99 2.99 0 0113 13a2.99 2.99 0 01-.879 2.121z" clip-rule="evenodd"/></svg>
                          <span x-text="t('high_conversion')"></span>
                        </span>
                        <button @click="rateTopic(p, 1)" class="p-1 rounded-md transition-colors" :class="p.user_rating === 1 ? 'text-green-600 bg-green-50' : 'text-gray-300 hover:text-green-500 hover:bg-green-50'" :title="p.user_rating === 1 ? t('rate_liked') : ''">
                          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M14 9V5a3 3 0 00-3-3l-4 9v11h11.28a2 2 0 002-1.7l1.38-9a2 2 0 00-2-2.3H14z M4 21h-1a2 2 0 01-2-2v-7a2 2 0 012-2h1"/></svg>
                        </button>
                        <button @click="rateTopic(p, -1)" class="p-1 rounded-md transition-colors" :class="p.user_rating === -1 ? 'text-red-500 bg-red-50' : 'text-gray-300 hover:text-red-400 hover:bg-red-50'" :title="p.user_rating === -1 ? t('rate_disliked') : ''">
                          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10 15v4a3 3 0 003 3l4-9V2H5.72a2 2 0 00-2 1.7l-1.38 9a2 2 0 002 2.3H10z M20 2h1a2 2 0 012 2v7a2 2 0 01-2 2h-1"/></svg>
                        </button>
                      </div>
                    </div>
                    <!-- Quick actions: write content / make video -->
                    <div class="flex items-center gap-2 mt-3 pt-3 border-t border-gray-50">
                      <a :href="_topicToUrl('/script-writer.html', p)"
                         class="flex-1 inline-flex items-center justify-center gap-1.5 text-xs font-medium text-gray-600 hover:text-accent hover:bg-accent/5 border border-gray-200 hover:border-accent/40 rounded-md px-3 py-1.5 transition-colors">
                        <span>🎬</span>

                         class="flex-1 inline-flex items-center justify-center gap-1.5 text-xs font-medium text-gray-600 hover:text-accent hover:bg-accent/5 border border-gray-200 hover:border-accent/40 rounded-md px-3 py-1.5 transition-colors">
                        <span>📝</span>
                        <span x-text="t('topic_write_post')"></span>
                      </a>

                </template>
              </div>
              <div class="mt-3 text-xs text-gray-400 text-center flex items-center justify-center gap-1">
                <svg class="w-3.5 h-3.5 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                <span x-text="t('auto_saved')"></span>

            <!-- History -->
            <div>
              <h3 class="text-[13px] font-semibold text-gray-500 uppercase tracking-wide mb-3">

              </h3>
              <div x-show="historyPlans.length === 0 && !loadingHistory" class="text-center py-16 bg-white rounded-xl border border-dashed border-gray-200 text-gray-400 text-sm">
                <span x-text="t('no_topics')"></span>
              </div>

                <template x-for="p in historyPlans" :key="p.id">
                  <div class="bg-white rounded-lg border border-gray-100 p-4 hover:shadow-sm transition-shadow group">
                    <div class="flex items-start justify-between">
                      <div class="flex-1 min-w-0">

                        <div class="flex items-center gap-2 mt-1 text-[11px] text-gray-400">
                          <span x-show="p.angle" class="bg-indigo-50 text-indigo-500 px-1.5 py-0.5 rounded-full" x-text="p.angle"></span>
                          <span x-text="({douyin:t('ch_douyin'),xiaohongshu:t('ch_xiaohongshu'),kuaishou:t('ch_kuaishou'),video_account:t('ch_video_account'),bilibili:t('ch_bilibili')}[p.channel] || t('ch_general'))"></span>
                          <span x-show="p.strategy_unit_id" class="bg-green-50 text-green-600 px-1.5 py-0.5 rounded-full" x-text="t('with_unit')"></span>

                        <a :href="_topicToUrl('/script-writer.html', p)"
                           class="p-1 rounded-md text-gray-300 hover:text-accent hover:bg-accent/5 opacity-60 hover:opacity-100 transition-opacity"
                           :title="t('topic_make_video')">
                          <span class="text-[13px]">🎬</span>
                        </a>
                        <a :href="_topicToUrl('/content-studio.html', p)"
                           class="p-1 rounded-md text-gray-300 hover:text-accent hover:bg-accent/5 opacity-60 hover:opacity-100 transition-opacity"
                           :title="t('topic_write_post')">
                          <span class="text-[13px]">📝</span>
                        </a>
                        <button @click="rateTopic(p, 1)" class="p-1 rounded-md transition-colors" :class="p.user_rating === 1 ? 'text-green-600 bg-green-50' : 'text-gray-300 hover:text-green-500 hover:bg-green-50'" :title="p.user_rating === 1 ? t('rate_liked') : ''">
                          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M14 9V5a3 3 0 00-3-3l-4 9v11h11.28a2 2 0 002-1.7l1.38-9a2 2 0 00-2-2.3H14z M4 21h-1a2 2 0 01-2-2v-7a2 2 0 012-2h1"/></svg>
                        </button>
                        <button @click="rateTopic(p, -1)" class="p-1 rounded-md transition-colors" :class="p.user_rating === -1 ? 'text-red-500 bg-red-50' : 'text-gray-300 hover:text-red-400 hover:bg-red-50'" :title="p.user_rating === -1 ? t('rate_disliked') : ''">
                          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10 15v4a3 3 0 003 3l4-9V2H5.72a2 2 0 00-2 1.7l-1.38 9a2 2 0 002 2.3H10z M20 2h1a2 2 0 012 2v7a2 2 0 01-2 2h-1"/></svg>
                        </button>
                        <span class="text-[11px] text-gray-300 tabular-nums" x-text="p.created_at?.slice(0,10)"></span>
                      </div>
                    </div>
                  </div>
                </template>
              </div>
              <div x-show="historyTotal > historyPlans.length" class="text-center mt-4">
                <button @click="historyPage++; fetchHistory(true)" class="text-sm text-accent hover:underline" x-text="t('load_more')"></button>
              </div>
            </div>

          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    const API = '/api/v1';

    function topicStudio() {
      const params = new URLSearchParams(location.search);
      return {
        offers: [],
        offerId: '',
        strategyUnits: [],
        strategyUnitId: '',

        // LLM model selector — see expandConfigsToModels in header-selectors.js
        modelOptions: [],
        modelKey: '',  // composite ``<config_id>::<model_name>``

        // Context panel
        context: null,
        loadingCtx: false,

        // Generate form
        form: { count: 5, instruction: '', external_context_text: '', external_context_url: '' },
        hotspotPanelOpen: false,
        hotspotExtracting: false,
        get instructionExamples() {
          const isEn = (window._odLang || 'zh') === 'en';
          return isEn ? [
            'Tie this to a trending topic on TikTok or Reddit',
            'Riff on the hottest AI tool everyone is talking about',
            'Make a few contrasting before/after angles',
            'Start from a real customer pain point',
            'Use scroll-stopping POV hooks that feel native to short-form',
          ] : [
            '结合最近抖音热门话题做选题',
            '蹭一下当前最火的 AI 工具',
            '做几个反差感强的对比选题',
            '从用户痛点角度切入',
            '做一些有网感的悬念开头',
          ];
        },
        generating: false,
        suggestingInstruction: false,
        genProgress: 0,
        genStep: '',

        // Results
        genThinking: null,
        newPlans: [],
        genHotspot: null,

        // History
        historyPlans: [],
        historyTotal: 0,
        historyPage: 1,
        loadingHistory: false,

        async init() {
          document.title = t('page_title') + ' - OpenLucid';
          const urlOfferId = params.get('offer_id') || '';
          const urlUnitId = params.get('strategy_unit_id') || '';

          let llmConfigs = [];
          try {
            const [res, llmRes] = await Promise.all([
              fetch(`${API}/offers?page_size=100`),
              fetch(`${API}/settings/llm`).catch(() => null),
            ]);
            if (res.ok) this.offers = (await res.json()).items || [];
            llmConfigs = (llmRes?.ok ? await llmRes.json() : []) || [];
          } catch(e) { console.error('Failed to load offers', e); }

          // Standardised header-selector behaviour (v1.2.x).
          // CRITICAL: do NOT await model expansion here. It calls each
          // provider's /v1/models which can take 5-30s on cold caches and
          // would otherwise block offerId selection — the page would sit
          // on the "请选择商品" empty state until every upstream replied.
          // Model dropdown is gated by ``modelOptions.length > 0`` so it
          // simply appears once expansion finishes; page is usable now.
          await this.$nextTick();
          this.offerId = window.odHeaderSelectors.pickInitialOffer(this.offers, "topic", urlOfferId);
          window.odHeaderSelectors.rememberOffer("topic", this.offerId);

          window.odHeaderSelectors.expandConfigsToModels(llmConfigs, API).then(opts => {
            this.modelOptions = opts;
            this.modelKey = window.odHeaderSelectors.pickInitialModelKey(opts, "topic");
            window.odHeaderSelectors.rememberModelKey("topic", this.modelKey);
          }).catch(e => console.error('Model expansion failed', e));

          if (this.offerId) {
            const name = this.offers.find(o => o.id === this.offerId)?.name || '';
            document.title = `${t('page_title')} · ${name} - OpenLucid`;

            await this.loadStrategyUnits();
            if (urlUnitId && this.strategyUnits.find(u => u.id === urlUnitId)) {
              await this.$nextTick();
              this.strategyUnitId = urlUnitId;
            }
            await Promise.all([
              this.fetchContext(),
              this.fetchHistory(false),
            ]);
          }
        },

        onModelChange() {
          window.odHeaderSelectors.rememberModelKey("topic", this.modelKey);
        },

        async onOfferChange() {
          window.odHeaderSelectors.rememberOffer("topic", this.offerId);
          this.newPlans = [];
          this.genThinking = null;
          this.genHotspot = null;
          this.historyPlans = [];
          this.historyPage = 1;
          this.strategyUnitId = '';
          this.strategyUnits = [];
          this.context = null;

          if (this.offerId) {
            history.replaceState(null, '', `?offer_id=${this.offerId}`);
            const name = this.offers.find(o => o.id === this.offerId)?.name || '';
            document.title = `${t('page_title')} · ${name} - OpenLucid`;
            await Promise.all([
              this.loadStrategyUnits(),
              this.fetchContext(),
              this.fetchHistory(false),
            ]);
          } else {
            history.replaceState(null, '', location.pathname);
            document.title = t('page_title') + ' - OpenLucid';
          }
        },

        async loadStrategyUnits() {
          const res = await fetch(`${API}/strategy-units?offer_id=${this.offerId}&page_size=50`);
          if (!res.ok) return;
          const data = await res.json();
          this.strategyUnits = data.items;
        },

        async onUnitChange() {
          await this.fetchContext();
          if (this.offerId) {
            const url = this.strategyUnitId
              ? `?offer_id=${this.offerId}&strategy_unit_id=${this.strategyUnitId}`
              : `?offer_id=${this.offerId}`;
            history.replaceState(null, '', url);
          }
        },

        async fetchContext() {
          if (!this.offerId) return;
          this.loadingCtx = true;
          try {
            let url = `${API}/apps/topic-studio/context-preview?offer_id=${this.offerId}`;
            if (this.strategyUnitId) url += `&strategy_unit_id=${this.strategyUnitId}`;
            const res = await fetch(url);
            if (res.ok) this.context = await res.json();
          } catch(e) { console.error(e); }
          finally { this.loadingCtx = false; }
        },

        async extractHotspotUrl() {
          // Pull text out of an external URL via the existing /ai/extract-text
          // endpoint (already used by the offer-creation wizard). Backfills
          // the textarea so the user can review/trim before generating.
          if (!this.form.external_context_url || this.hotspotExtracting) return;
          this.hotspotExtracting = true;
          try {
            const fd = new FormData();
            fd.append('url', this.form.external_context_url.trim());
            const res = await fetch(`${API}/ai/extract-text`, {
              method: 'POST',
              body: fd,
            });
            if (!res.ok) {
              const err = await res.json().catch(() => ({}));
              toast.error(t('hotspot_extract_failed') + (err.detail ? ': ' + err.detail : ''));
            } else {
              const data = await res.json();
              const text = (data.text || '').slice(0, 8000);
              this.form.external_context_text = text;
            }
          } catch (e) {
            console.error(e);
            toast.error(t('hotspot_extract_failed'));
          }
          this.hotspotExtracting = false;
        },

        async suggestInstruction() {
          // Reuse the shared suggest-topic endpoint (same idea — let the
          // LLM look at KB + offer and propose one concrete angle). The
          // suggestion lands in the creative-brief textarea; user can
          // edit before hitting Generate.
          if (!this.offerId || this.suggestingInstruction) return;
          this.suggestingInstruction = true;
          try {
            const sel = window.odHeaderSelectors.splitModelKey(this.modelKey);
            const suggestion = await window.odSuggestTopic({
              offer_id: this.offerId,
              strategy_unit_id: this.strategyUnitId || undefined,
              config_id: sel.config_id || undefined,
              model_override: sel.model_name || undefined,
            });
            if (suggestion) this.form.instruction = suggestion;
          } catch (e) {
            console.error(e);
            toast.error(e.message || t('save_failed'));
          }
          this.suggestingInstruction = false;
        },

        _topicToUrl(basePath, plan) {
          // Build URL for Script Writer / Content Studio with the topic
          // pre-filled. We pass BOTH:
          //   - ``topic`` (title+hook): visible in the destination's
          //     textarea so the user sees what came through.
          //   - ``topic_plan_id``: lets the destination's backend pull
          //     the plan's full structure from DB (angle + key_points
          //     + target_audience + scenario), enriching the prompt
          //     beyond the headline-only URL string. Without this, the
          //     creation step loses the angle/key_points the topic-gen
          //     LLM specifically chose for this topic.
          const p = new URLSearchParams();
          if (this.offerId) p.set('offer_id', this.offerId);
          if (this.strategyUnitId) p.set('strategy_unit_id', this.strategyUnitId);
          if (plan.id) p.set('topic_plan_id', plan.id);
          const title = (plan.title || '').trim();
          const hook = (plan.hook || '').trim();
          const topicText = hook ? `${title}\n\n${hook}` : title;
          if (topicText) p.set('topic', topicText);
          return `${basePath}?${p.toString()}`;
        },

        async rateTopic(plan, rating) {
          // Toggle: if already rated the same, clear it
          const newRating = plan.user_rating === rating ? null : rating;
          try {
            const res = await fetch(`${API}/topic-plans/${plan.id}/rating`, {
              method: 'PATCH',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ rating: newRating }),
            });
            if (res.ok) plan.user_rating = newRating;
          } catch(e) { console.error('Rating failed', e); }
        },

        async generate() {
          this.generating = true;
          this.genProgress = 5;
          this.genHotspot = null;
          this.genThinking = null;
          this.newPlans = [];
          this.genStep = t('step_analyzing');

          try {
            const ext = (this.form.external_context_text || '').trim();
            const sel = window.odHeaderSelectors.splitModelKey(this.modelKey);
            const body = {
              offer_id: this.offerId,
              count: this.form.count,
              channel: this.context?.channel || 'general',
              strategy_unit_id: this.strategyUnitId || undefined,
              config_id: sel.config_id || undefined,
              model_override: sel.model_name || undefined,
              language: getApiLang(),
              instruction: this.form.instruction?.trim() || undefined,
              external_context_text: ext || undefined,
              external_context_url: (ext && this.form.external_context_url?.trim()) || undefined,
            };
            const res = await fetch(`${API}/apps/topic-studio/run/stream`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(body),
            });
            if (!res.ok) {
              const err = await res.json().catch(() => ({}));
              const msg = err.detail || t('generate_failed_retry');
              toast.error(t('generate_failed') + (msg.length > 120 ? msg.slice(0, 120) + '…' : msg));
              this.generating = false;
              this.genProgress = 0;
              return;
            }

            const reader = res.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';
            const expectedCount = this.form.count;

            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              buffer += decoder.decode(value, { stream: true });
              const parts = buffer.split('\n\n');
              buffer = parts.pop();
              for (const part of parts) {
                if (!part.trim()) continue;
                const lines = part.trim().split('\n');
                let eventType = 'message', data = '';
                for (const line of lines) {
                  if (line.startsWith('event: ')) eventType = line.slice(7);
                  else if (line.startsWith('data: ')) data = line.slice(6);
                }
                try {
                  if (eventType === 'started') {
                    const evt = JSON.parse(data);
                    if (evt.phase === 'preparing') {
                      this.genStep = t('step_reading_kb');
                      this.genProgress = Math.max(this.genProgress, 10);
                    } else if (evt.phase === 'calling_llm') {
                      this.genStep = t('step_planning');
                      this.genProgress = Math.max(this.genProgress, 18);
                    }
                  } else if (eventType === 'thinking') {
                    this.genThinking = (this.genThinking || '') + JSON.parse(data);
                    // Cap displayed thinking at 4000 chars; the LLM's
                    // reasoning can run to 10K+ which makes the panel
                    // unscrollable.
                    if (this.genThinking.length > 4000) {
                      this.genThinking = this.genThinking.slice(-4000);
                    }
                    // First thinking token = LLM is actively producing.
                    // Bump progress so the bar visibly advances even
                    // before the first plan lands.
                    if (this.genProgress < 22) this.genProgress = 22;
                  } else if (eventType === 'hotspot') {
                    this.genHotspot = JSON.parse(data);
                    this.genProgress = Math.max(this.genProgress, 25);
                    this.genStep = t('step_planning');
                  } else if (eventType === 'plan') {
                    this.newPlans.push(JSON.parse(data));
                    // Each plan bumps the bar — gives a tactile "another one
                    // landed" feel even when the LLM is still streaming.
                    const slotProgress = 25 + (this.newPlans.length / expectedCount) * 70;
                    this.genProgress = Math.max(this.genProgress, Math.min(slotProgress, 95));
                    this.genStep = t('step_optimizing');
                  } else if (eventType === 'done') {
                    this.genProgress = 100;
                    this.genStep = t('done');
                  } else if (eventType === 'error') {
                    const errData = JSON.parse(data);
                    const msg = errData.message || t('generate_failed_retry');
                    toast.error(t('generate_failed') + (msg.length > 120 ? msg.slice(0, 120) + '…' : msg));
                  }
                } catch (e) { console.error('SSE parse error', e, part); }
              }
            }

            // Flush any tail event after stream close
            if (buffer.trim()) {
              // best-effort; ignore parse errors
            }

            this.historyPage = 1;
            await this.fetchHistory(false);
          } catch (e) {
            console.error(e);
            toast.error(t('generate_failed_retry'));
          }

          this.generating = false;
          this.genProgress = 0;
          this.genStep = '';
        },

        async fetchHistory(append) {
          if (!this.offerId) return;
          this.loadingHistory = true;
          try {
            let url = `${API}/topic-plans?offer_id=${this.offerId}&page=${this.historyPage}&page_size=20`;
            if (this.strategyUnitId) url += `&strategy_unit_id=${this.strategyUnitId}`;
            const res = await fetch(url);
            const data = await res.json();
            this.historyPlans = append ? [...this.historyPlans, ...data.items] : data.items;
            this.historyTotal = data.total;
          } catch(e) { console.error(e); }
          finally { this.loadingHistory = false; }
        },
      };
    }
  </script>
</body>
