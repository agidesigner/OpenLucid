            { muted: !shot.asset_audio },
          );
        },

        // ── B-roll editor helpers ─────────────────────────────────────
        //
        // The AI director writes ``creation.structured_content.broll_plan``
        // when generating the script (see script_composer.py). Here we let
        // users review + tweak that plan before hitting Generate, and add
        // extra shots guided by the rules the composer itself uses:
        //   • retention — at char 0, 5s, visually striking opener
        //   • illustrative — after a concrete noun/beat in the narration,
        //     5-6s, placed so gaps stay ≤ 8-12s of VO
        //   • CTA section (last) — skip B-roll, keep avatar face-to-camera

        _brollNarrationText() {
          // Concatenation order must match the server's rendering so
          // insert_after_char means the same thing on both sides.
          const sc = this.videoModal.creation?.structured_content;
          if (!sc?.sections) return '';
          const order = sc.section_ids || Object.keys(sc.sections);
          return order
            .map(id => (sc.sections[id]?.text || '').trim())
            .filter(Boolean)
            .join('');
        },

        brollTotalNarrationChars() {
          return this._brollNarrationText().length;
        },

        brollContextAt(charPos) {
          // Show a short slice of VO around the insert point so the user
          // sees which line this shot will cut over. ~20 chars radius.
          // Used as the tooltip on the row header — gives the precise
          // before/after split at hover.
          const text = this._brollNarrationText();
          if (!text) return '';
          const pos = Math.max(0, Math.min(Number(charPos) || 0, text.length));
          const start = Math.max(0, pos - 10);
          const end = Math.min(text.length, pos + 10);
          const pre = text.slice(start, pos);
          const post = text.slice(pos, end);
          return `…${pre}│${post}…`;
        },

        // Human-readable position preview for the row header — replaces
        // the raw char-offset number that ships in the form data with
        // a sentence-fragment phrasing the user can actually parse
        // ("After 'I made 10 video ads'"). Falls back to char index
        // when the snippet would be empty (offset at start, or after
        // pure-punctuation).
        brollPositionPreview(charPos) {
          const text = this._brollNarrationText();
          const pos = Math.max(0, Math.min(Number(charPos) || 0, (text || '').length));
          if (!text || pos === 0) return t('vg_broll_pos_start');
          // Take up to 14 chars before the cut, trimmed of leading
          // whitespace + CJK/Latin punctuation so the snippet starts
          // mid-word, not mid-sentence-tail.
          let snippet = text.slice(Math.max(0, pos - 14), pos)
            .replace(/^[\s，。！？,.!?;:、—\-]+/, '')
            .trim();
          if (!snippet) return t('vg_broll_pos_at_char').replace('{n}', pos);
          return t('vg_broll_pos_after').replace('{snippet}', snippet);
        },

        // ── Per-card narration context ──────────────────────────────
        // Returns {before, after} — ~30 chars on each side of the broll's
        // insert_after_char, with leading/trailing punctuation stripped
        // so snippets read like phrases, not orphan tail-fragments.
        // Used by each broll card to show in-context where it fires;
        // user scans cards top-to-bottom and at-a-glance sees what
        // narration each shot lands on. No popover, no scroll, no
        // hover — visible at rest, "一眼可以看到".
        brollContextWindow(charPos) {
          const text = this._brollNarrationText();
          if (!text) return { before: '', after: '' };
          const pos = Math.max(0, Math.min(Number(charPos) || 0, text.length));
          const RADIUS = 36;
          const beforeRaw = text.slice(Math.max(0, pos - RADIUS), pos);
          const afterRaw = text.slice(pos, Math.min(text.length, pos + RADIUS));
          // Strip leading/trailing whitespace + sentence punctuation so
          // the displayed snippet reads as a phrase (else we get
          // ", and the worst part…" which looks broken).
          const before = beforeRaw.replace(/^[\s，。！？,.!?;:、—\-]+/, '').trim();
          const after = afterRaw.replace(/[\s]+$/, '').trim();
          return { before, after };
        },

        brollAddShot() {
          // Director heuristic — pick insert_after_char such that the new
          // shot lands in the largest currently-unpadded gap (keeps the
          // 8-12s visual-change rhythm the composer aims for). Ties break
          // toward the earlier gap so openings stay punchy.
          const plan = this.videoModal.form.broll_plan || [];
          const total = this.brollTotalNarrationChars();
          if (!total) {
            // No narration yet — add an empty placeholder at 0
            plan.push({ type: 'illustrative', insert_after_char: 0, duration_seconds: 5, prompt: '' });
            this.videoModal.form.broll_plan = plan;
            return;
          }

          // Reserve the tail (last ~30 chars = CTA) — director rule: no
          // B-roll on CTA. Clamp search range to [0, total - 30].
          const searchEnd = Math.max(0, total - 30);

          // Collect existing positions (clamped) plus boundaries [0, searchEnd].
          const anchors = [0, searchEnd];
          for (const s of plan) {
            const p = Number(s.insert_after_char);
            if (!Number.isFinite(p)) continue;
            if (p >= 0 && p <= searchEnd) anchors.push(p);
          }
          anchors.sort((a, b) => a - b);
          // Dedup
          const uniq = [...new Set(anchors)];

          // Largest gap between consecutive anchors — midpoint wins.
          let bestSpan = -1, bestMid = Math.floor(searchEnd / 2);
          for (let i = 0; i < uniq.length - 1; i++) {
            const span = uniq[i + 1] - uniq[i];
            if (span > bestSpan) {
              bestSpan = span;
              bestMid = Math.round((uniq[i] + uniq[i + 1]) / 2);
            }
          }
          // If everything is crowded (no meaningful gap), default to
          // section-boundary — first uncovered section beginning.
          if (bestSpan < 30) {
            const sc = this.videoModal.creation?.structured_content;
            const order = (sc?.section_ids || Object.keys(sc?.sections || {}));
            let cursor = 0;
            for (const id of order) {
              const text = (sc?.sections?.[id]?.text || '').trim();
              const boundary = cursor;
              cursor += text.length;
              const taken = plan.some(s => Math.abs((s.insert_after_char || 0) - boundary) < 5);
              if (!taken && boundary <= searchEnd) { bestMid = boundary; break; }
            }
          }

          plan.push({
            type: plan.length === 0 ? 'retention' : 'illustrative',
            insert_after_char: plan.length === 0 ? 0 : bestMid,
            duration_seconds: plan.length === 0 ? 5 : 6,
            prompt: '',
          });
          // Re-sort so the UI reads in narration order.
          plan.sort((a, b) => (a.insert_after_char || 0) - (b.insert_after_char || 0));
          this.videoModal.form.broll_plan = plan;
        },

        // ── B-roll asset matching (Generate Video modal) ─────────────────
        // Loaded once per modal-open + on aspect change. Silently swallows
        // failures — the feature is an enhancement, not a blocker.

        async loadBrollSuggestions() {
          const c = this.videoModal.creation;
          if (!c || !c.id) return;
          const aspect = this.videoModal.form?.aspect_ratio;
          if (!aspect) return;
          const plan = this.videoModal.form?.broll_plan;
          if (!Array.isArray(plan) || plan.length === 0) return;
          // Clear stale matches first so an aspect change wipes old
          // suggestions before the new fetch returns.
          for (const shot of plan) {
            if (shot && shot.matched_asset && !shot._asset_dismissed) {
              shot.matched_asset = null;
              shot.asset_id = null;
              shot.asset_mode = null;
            }
          }
          try {
            const res = await fetch(
              `/api/v1/creations/${c.id}/broll-suggestions?aspect=${encodeURIComponent(aspect)}`,
              { method: 'POST' },
            );
            if (!res.ok) return;
            const data = await res.json();
            const matches = (data && data.matches) || [];
            for (const m of matches) {
              const shot = plan[m.shot_index];
              if (!shot || !m.matched_asset) continue;
              // Respect explicit dismissal — once the user said "no thanks",
              // don't re-suggest in the same modal session even if aspect
              // changes back.
              if (shot._asset_dismissed) continue;
              shot.matched_asset = m.matched_asset;
              shot.asset_id = m.matched_asset.id;
              shot.asset_mode = 'direct';  // default-on per spec
            }
          } catch (e) {
            console.warn('broll suggestions fetch failed:', e);
          }
        },

        setShotMode(shot, mode) {
          // mode: 'direct' | 'reference' | 'ai'
          shot.asset_mode = mode;
          if (mode === 'ai') {
            // Mode "ai" disables the asset binding for this shot. Keep
            // matched_asset visible (so user can flip back) but clear
            // the asset_id so submit doesn't include it.
            shot.asset_id = null;
          } else if (shot.matched_asset) {
            // Restore the binding when switching back into direct/ref.
            shot.asset_id = shot.matched_asset.id;
          }
          // Audio toggle is direct-mode-only — clear any leftover state
          // when leaving direct mode so the flag never silently survives
          // a mode change. Today's submit guard requires `mode==='direct'`
          // before forwarding asset_audio, but defending here keeps state
          // hygiene if a future caller forgets that guard.
          if (mode !== 'direct') {
            shot.asset_audio = false;
          }
        },

        dismissAssetSuggestion(shot) {
          shot.matched_asset = null;
          shot.asset_id = null;
          shot.asset_mode = null;
          shot.asset_audio = false;  // clear audio toggle alongside the binding
          shot._asset_dismissed = true;
        },

        _extractNarration(creation) {
          // Extract TTS-ready narration from structured_content when available.
          // Uses section_ids for correct order (JSONB doesn't preserve key order).
          // Join with a single newline: Jogg's TTS turns ``\n\n`` into a ~3.5s
          // paragraph pause (audible dead air at hook→body transitions), while
          // ``\n`` produces a normal sentence-break pause (~0.5-1s). Sections
          // already end in punctuation so no speech-flow information is lost.
          const sc = creation.structured_content;
          if (sc && sc.sections && typeof sc.sections === 'object') {
            const order = sc.section_ids || Object.keys(sc.sections);
            const lines = order
              .map(id => sc.sections[id])
              .filter(Boolean)
              .map(s => (s.text || '').trim())
              .filter(Boolean);
            if (lines.length) return lines.join('\n');
          }
          return creation.content || '';
        },

        pickDefaultProvider(text) {
          // Smart default by Chinese-character ratio:
          //   ≥ 30% Chinese → prefer chanjing if active
          //   otherwise   → prefer jogg if active
          //   else fall back to first active
          const providers = this.videoModal.providers;
          if (providers.length === 1) return providers[0];
          const sample = (text || '').slice(0, 500);
          if (!sample) return providers[0];
          const cn = (sample.match(/[\u4e00-\u9fff]/g) || []).length;
          const ratio = cn / sample.length;
          const preferred = ratio >= 0.3 ? 'chanjing' : 'jogg';
          return providers.find(p => p.provider === preferred) || providers[0];
        },

        async onProviderChange(configId, options = {}) {
          const m = this.videoModal;

          // Cancel any in-flight fetches from a previous provider
          // selection. Without this, switching from chanjing to jogg
          // mid-load would let the chanjing pagination keep running
          // (wasting upstream quota) and could race-overwrite jogg's
          // data when it eventually returns.
          if (this._listsFetchAbort) {
            try { this._listsFetchAbort.abort(); } catch (e) { /* noop */ }
          }
          const ac = new AbortController();
          this._listsFetchAbort = ac;

          m.selectedProviderId = configId;
          m.avatars = [];
          m.voices = [];
          m.avatarTags = [];
          m.selectedTagIds = [];
          m.visibleAvatarLimit = 60;
          m.visibleVoiceLimit = 50;
          // Don't reset avatarSort on provider change — user's
          // preference is sticky across providers within a session.
          m.listsError = '';
          m.avatarsLoading = false;
          m.voicesLoading = false;
          m.form.avatar_id = '';
          m.form.voice_id = '';

          const cfg = m.providers.find(p => p.id === configId);
          if (!cfg) return;

          // Pre-fill aspect_ratio from provider defaults. ``square`` is no
          // longer offered in the UI — coerce legacy values to ``portrait``
          // so the toggle group always has a matching pressed state.
          if (cfg.defaults && cfg.defaults.aspect_ratio) {
            m.form.aspect_ratio = cfg.defaults.aspect_ratio === 'square'
              ? 'portrait'
              : cfg.defaults.aspect_ratio;
          }

          // ── Cache layer (localStorage, 12h TTL) ──
          // Avatar/voice lists rarely change on the provider side; caching
          // them avoids 1-2s of latency every time the user opens the modal,
          // and saves Chanjing access_token API calls. Bust on demand via the
          // refresh button (options.force = true). Cache key bumped to ``v4``
          // when chanjing's circle_view (headshot-frame mode) avatars were
          // server-side filtered out of /avatars — without this bump, users
          // with v3 caches kept seeing old figure_type=circle_view entries
          // for 12h, then submitted them and got distorted output. Cache is
          // per-(config, sort) so switching sort doesn't return stale
          // ordering from cache.
          const cacheKey = `od_video_lists_v4:${configId}:${m.avatarSort}`;
          const CACHE_TTL_MS = 12 * 60 * 60 * 1000;  // 12h
          if (!options.force) {
            try {
              const cached = JSON.parse(localStorage.getItem(cacheKey) || 'null');
              // Empty avatars in cache = previous run errored before
              // populating. Don't trust it — re-fetch. Heals users whose
              // cache was poisoned before the write-side guard landed.
              const cachedAvatars = (cached && cached.avatars) || [];
              const cacheUsable = cached
                && (Date.now() - cached.ts) < CACHE_TTL_MS
                && this._cacheSchemaIsCurrent(cached)
                && Array.isArray(cachedAvatars)
                && cachedAvatars.length > 0;
              if (cacheUsable) {
                m.avatars = cachedAvatars;
                m.voices = cached.voices || [];
                m.avatarTags = cached.avatarTags || [];
                this._applyDefaultsForProvider(cfg);
                return;  // skip the network entirely
              }
            } catch (e) { /* corrupt cache, fall through to fetch */ }
          }

          // Each list loads independently. Avatars commonly return in
          // 1-2 jogg HTTP calls; voices may walk multiple pages and
          // arrive seconds later. Independent promises mean the user
          // sees avatars + can edit script while voices are still
          // streaming in. Tags are best-effort and never block.
          m.avatarsLoading = true;
          m.voicesLoading = true;
          m.listsLoading = true;

          const settle = () => {
            // listsLoading reflects "any list still pending"; flips off
            // when both avatars and voices have settled.
            if (this._listsFetchAbort === ac && !m.avatarsLoading && !m.voicesLoading) {
              m.listsLoading = false;
            }
          };

          const avatarsP = fetch(
            `/api/v1/media-providers/${configId}/avatars?sort=${encodeURIComponent(m.avatarSort)}`,
            { signal: ac.signal },
          ).then(async ar => {
            if (ac.signal.aborted) return;
            if (!ar.ok) throw new Error('avatars: ' + (await ar.text()));
            m.avatars = await ar.json();
            this._applyDefaultsForProvider(cfg);
          }).catch(e => {
            if (e && (e.name === 'AbortError' || ac.signal.aborted)) return;
            m.listsError = t('vg_lists_load_failed') + e.message;
          }).finally(() => {
            if (this._listsFetchAbort === ac) m.avatarsLoading = false;
            settle();
          });

          const voicesP = fetch(
            `/api/v1/media-providers/${configId}/voices`,
            { signal: ac.signal },
          ).then(async vr => {
            if (ac.signal.aborted) return;
            if (!vr.ok) throw new Error('voices: ' + (await vr.text()));
            m.voices = await vr.json();
          }).catch(e => {
            if (e && (e.name === 'AbortError' || ac.signal.aborted)) return;
            // Voice failure is shown but doesn't override an avatar error.
            if (!m.listsError) m.listsError = t('vg_lists_load_failed') + e.message;
          }).finally(() => {
            if (this._listsFetchAbort === ac) m.voicesLoading = false;
            settle();
          });

          // Tags are best-effort — never set listsError, never block
          // the loading flags. The chip bar just won't render if this
          // fails.
          fetch(
            `/api/v1/media-providers/${configId}/avatar-tags`,
            { signal: ac.signal },
          ).then(async tr => {
            if (ac.signal.aborted) return;
            if (tr.ok) {
              m.avatarTags = await tr.json();
            } else {
              console.warn('avatar-tags fetch failed:', await tr.text());
              m.avatarTags = [];
            }
          }).catch(e => {
            if (e && (e.name === 'AbortError' || ac.signal.aborted)) return;
            console.warn('avatar-tags fetch threw:', e);
          });

          // Persist to cache once both lists have completed (avatar
          // tags arrive separately and may overwrite the cache shortly
          // after if they came in late — that's fine, next open will
          // see them).
          //
          // Two guards on cache write: (1) skip if any fetch errored,
          // and (2) skip if avatars came back empty. Both prevent the
          // bug where an auth failure (deleted/rotated provider key)
          // wrote `[]` into the 12h cache, and subsequent opens — even
          // after the user fixed the key in setting.html — kept reading
          // the empty cache instead of re-fetching. Empty result on a
          // healthy provider is rare; treating it as "don't cache" is
          // the safer default.
          Promise.allSettled([avatarsP, voicesP]).then(() => {
            if (this._listsFetchAbort !== ac || ac.signal.aborted) return;
            if (m.listsError) return;
            if (!Array.isArray(m.avatars) || m.avatars.length === 0) return;
            try {
              localStorage.setItem(cacheKey, JSON.stringify({
                ts: Date.now(),
                avatars: m.avatars,
                voices: m.voices,
                avatarTags: m.avatarTags,
              }));
            } catch (e) { /* localStorage full or disabled — non-fatal */ }
          });
        },

        // Reject caches that were written when the backend hadn't shipped
        // the current picker contract. Two known failure modes self-heal
        // here without waiting for the 12h TTL:
        //  (1) avatars lacking the chip-filter keys (tag_ids /
        //      native_aspect_ratio) — chip bar and aspect filter went
        //      blank under v2 cache.
        //  (2) any avatar carrying figure_type=circle_view — that mode
        //      was server-side filtered out; if any cached entry still
        //      has it, the cache predates the filter and submitting
        //      from the picker would produce distorted output.
        _cacheSchemaIsCurrent(cached) {
          const avatars = cached && cached.avatars;
          if (!Array.isArray(avatars) || avatars.length === 0) return true;  // empty is fine
          const ex = (avatars[0] && avatars[0].extras) || {};
          if (!Array.isArray(ex.tag_ids) && typeof ex.native_aspect_ratio !== 'string') {
            return false;  // (1) pre-chip-filter cache
          }
          // (2) Probe up to 30 entries — circle_view typically clusters,
          // so even one hit means the entire cache predates the filter.
          const probe = avatars.slice(0, 30);
          for (const a of probe) {
            const aex = (a && a.extras) || {};
            if (aex.figure_type === 'circle_view') return false;
          }
          return true;
        },

        _applyDefaultsForProvider(cfg) {
          // Pick the default avatar + voice from the provider config (or first
          // item from the deduped list). Shared between cache-hit and
          // fresh-fetch paths so behavior is identical.
          const m = this.videoModal;
          const avatars = this.uniqueAvatars;
          const voices = this.uniqueVoices;

          const dAv = (cfg.defaults && cfg.defaults.avatar_id) || '';
          const avatar = avatars.find(a => a.id === dAv) || avatars[0] || null;
          m.form.avatar_id = avatar ? avatar.id : '';

          const dVo = (cfg.defaults && cfg.defaults.voice_id) || '';
          let voice = voices.find(v => v.id === dVo) || null;
          if (!voice && avatar) voice = this.pickBestVoiceFor(avatar);
          if (!voice) voice = voices[0] || null;
          m.form.voice_id = voice ? voice.id : '';
        },

        async refreshProviderLists() {
          // Manual cache bust: force a fresh fetch for the current provider.
          if (!this.videoModal.selectedProviderId) return;
          await this.onProviderChange(this.videoModal.selectedProviderId, { force: true });
        },

        selectAvatar(a) {
          this.videoModal.form.avatar_id = a.id;
          // Auto-rematch voice unless the user explicitly picked one that's
          // still a strong match. Always re-pick by best score on avatar change
          // — simpler mental model.
          const best = this.pickBestVoiceFor(a);
          if (best) this.videoModal.form.voice_id = best.id;
        },

        playPairedPreview(avatar) {
          // Play the avatar's officially-paired voice sample directly.
          // Shares the modal's <audio> element with auditionVoice so the
          // two paths behave consistently (clicking ▶ on a different
          // avatar stops whatever was playing). No TTS synthesis here —
          // chanjing returns a ready-to-play URL on the avatar payload.
          const m = this.videoModal;
          const url = avatar && avatar.extras && avatar.extras.paired_voice_preview_url;
          if (!url) return;
          const audio = this.$refs.auditionAudio;
          if (!audio) return;
          // Toggle off if the same paired preview is already playing.
          const tag = `paired:${avatar.id}`;
          if (m.auditionPlayingId === tag) {
            audio.pause();
            audio.currentTime = 0;
            m.auditionPlayingId = '';
            return;
          }
          audio.pause();
          audio.currentTime = 0;
          audio.src = url;
          m.auditionPlayingId = tag;
          audio.play().catch(() => { m.auditionPlayingId = ''; });
        },

        async auditionVoice(voice) {
          // Audition the given voice using the first 20 chars of the script.
          // Calls the backend TTS endpoint, caches the resulting audio URL per
          // voice for the lifetime of the modal session.
          const m = this.videoModal;
          const v = voice || this.selectedVoice;
          if (!v || !v.id) return;

          const audio = this.$refs.auditionAudio;
          if (!audio) return;

          // If clicking the currently-playing voice, stop it
          if (m.auditionPlayingId === v.id) {
            audio.pause();
            audio.currentTime = 0;
            m.auditionPlayingId = '';
            return;
          }

          // Stop any other playing voice
          if (m.auditionPlayingId) {
            audio.pause();
            audio.currentTime = 0;
            m.auditionPlayingId = '';
          }

          // Cached?
          let url = m.auditionCache[v.id];
          if (!url) {
            const text = this.auditionPreviewText;
            if (!text) {
              // Defensive: button should already be disabled when script is
              // empty, but in case it isn't, fail silently rather than alert.
              return;
            }
            m.auditionLoadingId = v.id;
            try {
              const r = await fetch(
                `/api/v1/media-providers/${m.selectedProviderId}/voices/${encodeURIComponent(v.id)}/preview`,
                {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ text }),
                }
              );
              if (!r.ok) {
                const d = await r.json().catch(() => ({}));
                throw new Error(d.error?.message || d.detail || r.statusText);
              }
              const data = await r.json();
              url = data.audio_url;
              if (!url) throw new Error('No audio URL returned');
              m.auditionCache[v.id] = url;
            } catch (e) {
              toast.error(t('vg_audition_failed') + (e.message || String(e)));
              return;
            } finally {
              m.auditionLoadingId = '';
            }
          }

          audio.src = url;
          try {
            await audio.play();
            m.auditionPlayingId = v.id;
          } catch (e) {
            console.warn('audio play failed', e);
          }
        },

        async submitVideo() {
          const m = this.videoModal;
          if (!this.canSubmitVideo) return;
          m.submitting = true;
          m.submitError = '';
          try {
            const avatar = this.selectedAvatar;
            const body = {
              provider_config_id: m.selectedProviderId,
              avatar_id: m.form.avatar_id,
              voice_id: m.form.voice_id,
              script: m.form.script,
              aspect_ratio: m.form.aspect_ratio,
              caption: m.form.caption,
              subtitle_style: m.form.subtitle_style || 'classic',
              subtitle_color: m.form.subtitle_color || undefined,
              subtitle_stroke: m.form.subtitle_stroke || undefined,
              broll: m.form.broll || false,
              // Send the edited plan when broll is enabled; service falls
              // back to creation.structured_content.broll_plan otherwise.
              // Also strips client-only fields (matched_asset metadata,
              // _asset_dismissed flag) and only forwards the asset_id /
              // asset_mode pair the backend understands.
              ...(m.form.broll && Array.isArray(m.form.broll_plan) && m.form.broll_plan.length
                ? {
                    broll_plan: m.form.broll_plan.map(shot => {
                      const out = {
                        type: shot.type,
                        insert_after_char: shot.insert_after_char,
                        duration_seconds: shot.duration_seconds,
                        prompt: shot.prompt,
                      };
                      // Only forward asset binding when both fields are
                      // set AND mode != "ai" (which means "ignore the
                      // matched asset for this run").
                      if (shot.asset_id && shot.asset_mode &&
                          shot.asset_mode !== 'ai') {
                        out.asset_id = shot.asset_id;
                        out.asset_mode = shot.asset_mode;
                        // asset_audio only meaningful in direct mode —
                        // reference mode just feeds AI a style hint, the
                        // asset's audio never leaves OpenLucid.
                        if (shot.asset_mode === 'direct' && shot.asset_audio) {
                          out.asset_audio = true;
                        }
                      }
                      return out;
                    }),
                  }
                : {}),
              // Per-job B-roll model override (provider+model picked in the
              // toolbar selector). Omit when the user hasn't enabled B-roll
              // or when no override is set — the resolver falls back to the
              // video_gen capability default in that case.
              ...(m.form.broll && m.form.broll_provider_config_id && m.form.broll_model_code
                ? {
                    broll_provider_config_id: m.form.broll_provider_config_id,
                    broll_model_code: m.form.broll_model_code,
                  }
                : {}),
              name: this.videoModal.creation?.title || null,
              provider_extras: (avatar && avatar.extras) || {},
            };
            const r = await fetch(`/api/v1/creations/${this.videoModal.creation.id}/videos`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(body),
            });
            if (!r.ok) {
              const d = await r.json().catch(() => ({}));
              throw new Error(d.error?.message || d.detail || r.statusText);
            }
            const job = await r.json();
            // Add to top of jobs list and start polling
            m.jobs = [job, ...m.jobs];
            this.startPolling(job.id);

            // ── UX feedback: make sure user SEES the new job ──
            // 1. Auto-expand the past videos section
            m.pastVideosExpanded = true;
            // 2. Brief highlight on the new job (clears after 2s)
            m.flashJobId = job.id;
            setTimeout(() => {
              if (m.flashJobId === job.id) m.flashJobId = '';
            }, 2000);
            // 3. Smooth-scroll the modal body to top (history is now at the top)
            // Use setTimeout to wait for x-collapse expansion animation (~300ms)
            setTimeout(() => {
              const body = this.$refs.videoModalBody;
              if (body) body.scrollTo({ top: 0, behavior: 'smooth' });
            }, 350);
          } catch (e) {
            m.submitError = e.message || String(e);
          } finally {
            m.submitting = false;
          }
        },

        startPolling(jobId) {
          if (this.videoModal.pollTimers[jobId]) return;
          const tick = async () => {
            try {
              const r = await fetch(`/api/v1/videos/${jobId}`);
              if (!r.ok) return;
              const updated = await r.json();
              const idx = this.videoModal.jobs.findIndex(j => j.id === jobId);
              if (idx >= 0) {
                this.videoModal.jobs[idx] = updated;
              }
              if (updated.status === 'completed' || updated.status === 'failed') {
                this.stopPolling(jobId);
              }
            } catch (e) {
              console.warn('poll failed', e);
            }
          };
          // Run once immediately, then every 5s
          tick();
          this.videoModal.pollTimers[jobId] = setInterval(tick, 5000);
        },

        stopPolling(jobId) {
          const timerId = this.videoModal.pollTimers[jobId];
          if (timerId) {
            clearInterval(timerId);
            delete this.videoModal.pollTimers[jobId];
          }
        },

        async deleteVideoJob(job) {
          if (!confirm(t('vg_confirm_delete_job'))) return;
          try {
            const r = await fetch(`/api/v1/videos/${job.id}`, { method: 'DELETE' });
            if (r.ok || r.status === 204) {
              this.stopPolling(job.id);
              this.videoModal.jobs = this.videoModal.jobs.filter(j => j.id !== job.id);
            }
          } catch (e) { console.error(e); }
        },
      };
    }
  </script>
</body>
</html>
