<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenLucid</title>
  <script>
    document.documentElement.style.display='none';
    fetch('/api/v1/auth/me').then(r=>{
      if(!r.ok) fetch('/api/v1/auth/setup-status').then(r=>r.json()).then(s=>{
        location.href=s.needs_setup?'/install.html':'/signin.html';
      });
      else document.documentElement.style.display='';
    });
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: {
        sidebar: { DEFAULT: '#1C1C28', hover: '#2A2A3C' },
        accent: { DEFAULT: '#155EEF', light: '#EFF4FF', hover: '#1849C6' },
      }}}
    }
  </script>
  <script src="/js/i18n.js"></script>
  <script src="/js/pinned-apps.js"></script>
  <script src="/js/avatar.js"></script>
  <script src="/js/feedback.js"></script>
  <script src="/js/shared.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
  <style>
    [x-cloak]{display:none!important}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',sans-serif}
    .sidebar-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;color:#A0A0B0;font-size:14px;cursor:pointer;transition:all .15s}
    .sidebar-item:hover{background:#2A2A3C;color:#E0E0EE}
    .sidebar-item.active{background:#2D2D40;color:#fff}
    /* source badges now use shared .od-chip tokens (see js/shared.js) */
  </style>
</head>
<body class="bg-gray-50 h-screen flex overflow-hidden" x-data="creationsPage()" x-init="init()">

  <!-- Sidebar -->
  <aside class="w-56 bg-sidebar flex flex-col shrink-0">
    <div class="px-4 py-5 flex items-center gap-2.5">
      <img src="/images/logo.png" alt="OpenLucid" class="w-8 h-8 rounded-lg">
      <span class="text-white font-semibold text-base">OpenLucid</span>
    </div>
    <nav class="flex-1 px-3 space-y-1 mt-2">
      <a href="/" class="sidebar-item">
        <svg class="w-[18px] h-[18px]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
        <span x-text="t('sidebar_offers')"></span>
      </a>
      <a href="/brandkit-list.html" class="sidebar-item">
        <svg class="w-[18px] h-[18px]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.657-1.657a2 2 0 012.828 0l2.829 2.829a2 2 0 010 2.828l-8.486 8.485M7 17h.01"/></svg>
        <span x-text="t('sidebar_brandkit')"></span>
      </a>
      <a href="/creations.html" class="sidebar-item active">
        <svg class="w-[18px] h-[18px]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>
        <span x-text="t('sidebar_creations')"></span>
      </a>
      <a href="/video-studio.html" class="sidebar-item">
        <svg class="w-[18px] h-[18px]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
        <span x-text="t('sidebar_videos')"></span>
      </a>
    </nav>
    <div class="px-3 pb-3 mt-auto">
      <div class="text-[10px] text-white/25 text-center">Powered by <a href="https://openlucid.ai/?ref=app" target="_blank" class="hover:text-white/40 transition-colors">OpenLucid</a></div>
    </div>
  </aside>

  <!-- Main -->
  <div class="flex-1 flex flex-col overflow-hidden">
    <header class="h-14 bg-white border-b flex items-center justify-between px-6 shrink-0">
      <h1 class="text-base font-semibold text-gray-800">📚 <span x-text="t('creations_title')"></span></h1>
      <div class="flex items-center gap-3">
        <a href="/setting.html?section=mcp" class="inline-flex items-center gap-1.5 text-xs font-medium text-gray-500 hover:text-gray-700 border border-gray-200 hover:border-gray-300 px-2.5 py-1.5 rounded-lg transition-colors">
          <span class="w-1.5 h-1.5 bg-green-400 rounded-full"></span>
          MCP
        </a>
        <div id="avatar-mount"></div>
      </div>
    </header>

    <main class="flex-1 overflow-y-auto p-6">
      <!-- Toolbar -->
      <div class="bg-white rounded-xl border p-4 mb-4 flex items-center gap-3 flex-wrap">
        <div class="flex-1 min-w-[240px]">
          <div class="relative">
            <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            <input x-model="searchQ" @input.debounce.300ms="reload()"
                   type="text" :placeholder="t('creations_search_placeholder')"
                   class="w-full pl-9 pr-3 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-accent/20 focus:border-accent">
          </div>
        </div>
        <select x-model="filterType" @change="reload()"
                class="text-sm border border-gray-200 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-accent/20 focus:border-accent">
          <option value="" x-text="t('creations_all_types')"></option>
          <option value="topic" x-text="t('creations_type_topic')"></option>
          <option value="post" x-text="t('creations_type_post')"></option>
          <option value="script" x-text="t('creations_type_script')"></option>
          <option value="email" x-text="t('creations_type_email')"></option>
          <option value="caption" x-text="t('creations_type_caption')"></option>
          <option value="hook" x-text="t('creations_type_hook')"></option>
          <option value="general" x-text="t('creations_type_general')"></option>
        </select>
        <select x-model="filterSource" @change="reload()"
                class="text-sm border border-gray-200 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-accent/20 focus:border-accent">
          <option value="" x-text="t('creations_all_sources')"></option>
          <option value="mcp:external" x-text="t('creations_source_mcp')"></option>
          <option value="topic_studio">Topic Studio</option>
          <option value="manual" x-text="t('creations_source_manual')"></option>
        </select>
        <!-- Clear-filters shortcut — shown only when any filter is active. -->
        <button x-show="searchQ || filterType || filterSource"
                x-cloak
                @click="searchQ = ''; filterType = ''; filterSource = ''; reload()"
                class="inline-flex items-center gap-1 text-xs text-gray-500 hover:text-accent transition-colors px-2 py-2">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
          <span x-text="t('creations_filters_clear')"></span>
        </button>
      </div>

      <!-- Loading / Empty -->
      <div x-show="loading" class="text-center py-12 text-gray-400 text-sm" x-text="t('loading')"></div>
      <!-- Empty state — compact one-liner with inline CTAs. -->
      <div x-show="!loading && items.length === 0" class="bg-white rounded-xl border border-dashed border-gray-200 py-10 px-6 text-center">
        <div class="text-3xl mb-2">✨</div>
        <h3 class="text-base font-semibold text-gray-800 mb-1" x-text="t('creations_empty_cta_title')"></h3>
        <p class="text-xs text-gray-400 mb-5" x-text="t('creations_empty_cta_hint')"></p>
        <div class="flex gap-2 justify-center flex-wrap">
          <a href="/script-writer.html"
             class="inline-flex items-center gap-1.5 bg-white border border-gray-200 hover:border-accent hover:text-accent text-gray-700 rounded-lg px-3.5 py-2 text-sm font-medium transition-colors">
            <span>🎬</span>
            <span x-text="t('creations_empty_cta_video')"></span>
          </a>
          <a href="/content-studio.html"
             class="inline-flex items-center gap-1.5 bg-white border border-gray-200 hover:border-accent hover:text-accent text-gray-700 rounded-lg px-3.5 py-2 text-sm font-medium transition-colors">
            <span>📝</span>
            <span x-text="t('creations_empty_cta_text')"></span>
          </a>
        </div>
      </div>

      <!-- List -->
      <div x-show="!loading && items.length > 0" class="space-y-2">
        <template x-for="c in items" :key="c.id">
          <div :data-creation-id="c.id"
               class="bg-white rounded-xl border hover:shadow-sm transition-all"
               :class="flashCreationId === c.id ? 'ring-2 ring-accent/40 bg-accent/5' : ''">
            <div class="p-4 cursor-pointer" @click="openDetail(c)">
              <div class="flex items-start gap-3">
                <div class="flex-1 min-w-0">
                  <div class="flex items-center gap-2 mb-1">
                    <span class="od-chip od-chip-neutral" x-text="c.content_type"></span>
                    <span class="od-chip"
                          :class="c.source_app === 'mcp:external' ? 'od-chip-primary' : (c.source_app === 'manual' ? 'od-chip-neutral' : 'od-chip-success')"
                          x-text="c.source_app"></span>
                    <template x-for="tag in (c.tags || [])">
                      <span class="od-chip od-chip-info" x-text="tag"></span>
                    </template>
                  </div>
                  <h3 class="text-[15px] font-semibold text-gray-800 leading-snug" x-text="c.title"></h3>
                  <p class="text-[13px] text-gray-500 mt-1 line-clamp-2" x-text="c.content"></p>
                  <p x-show="c.source_note" class="text-[11px] text-gray-400 mt-1.5 italic" x-text="c.source_note"></p>
                </div>

                <!-- Video badge: latest cover thumbnail + count, click → open modal with history pre-expanded -->
                <template x-if="c.video_count > 0">
                  <button @click.stop="openVideoModal(c, { openHistory: true })"
                          :title="t('vg_badge_tooltip').replace('{n}', c.video_count)"
                          class="shrink-0 group relative w-20 h-12 rounded-lg overflow-hidden bg-gray-100 border border-gray-200 hover:border-accent transition-colors">
                    <!-- Latest cover image -->
                    <img x-show="c.latest_video && c.latest_video.cover_url"
                         :src="c.latest_video && c.latest_video.cover_url"
                         class="absolute inset-0 w-full h-full object-cover"
                         loading="lazy"
                         @error="$event.target.style.display='none'">
                    <!-- Fallback / status overlay -->
                    <div class="absolute inset-0 flex items-center justify-center"
                         x-show="!(c.latest_video && c.latest_video.cover_url) || (c.latest_video && c.latest_video.status !== 'completed')">
                      <template x-if="c.latest_video && c.latest_video.status === 'processing'">
                        <svg class="w-4 h-4 text-blue-400 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/></svg>
                      </template>
                      <template x-if="c.latest_video && c.latest_video.status === 'failed'">
                        <svg class="w-4 h-4 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                      </template>
                      <template x-if="!c.latest_video || c.latest_video.status === 'pending'">
                        <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
                      </template>
                    </div>
                    <!-- Count chip -->
                    <span class="absolute bottom-0.5 right-0.5 text-[9px] font-semibold px-1 py-0.5 rounded bg-gray-900/70 text-white backdrop-blur-sm"
                          x-text="'🎬 ' + c.video_count"></span>
                    <!-- Play overlay on hover (completed only) -->
                    <div x-show="c.latest_video && c.latest_video.status === 'completed'"
                         class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                      <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    </div>
                  </button>
                </template>

                <!-- Single-row meta column: date + actions inline (was 2 stacked rows). -->
                <div class="flex items-center gap-2 shrink-0 self-start">
                  <span class="text-[11px] text-gray-400 tabular-nums hidden sm:inline"
                        x-text="new Date(c.created_at).toLocaleDateString()"></span>
                  <!-- Generate Video: only for video-ready scripts, and only when no videos yet
                       (once c.video_count > 0 the thumbnail is the single entry point to the same modal). -->
                  <button x-show="_isVideoReady(c.content_type) && !c.video_count"
                          @click.stop="openVideoModal(c)"
                          class="inline-flex items-center gap-1 text-[11px] font-medium text-accent border border-accent/30 hover:bg-accent/5 rounded-md px-2 py-1 transition-colors"
                          :title="t('vg_button_tooltip')">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
                    <span x-text="t('vg_button')"></span>
                  </button>
                  <!-- Open in Creator: for non-video-ready content -->
                  <button x-show="_isRecreatable(c.content_type)"
                          @click.stop="goRecreate(c)"
                          class="inline-flex items-center gap-1 text-[11px] font-medium text-gray-500 border border-gray-200 hover:bg-gray-50 rounded-md px-2 py-1 transition-colors"
                          :title="t('recreate_tooltip')">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
                    <span x-text="t('recreate_btn')"></span>
                  </button>
                  <button @click.stop="confirmDelete(c)"
                          class="text-gray-300 hover:text-red-500 transition-colors p-1"
                          :title="t('btn_delete')">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                  </button>
                </div>
              </div>
            </div>
          </div>
        </template>
      </div>

      <!-- Pagination -->
      <div x-show="!loading && total > pageSize" class="mt-4 flex items-center justify-center gap-2 text-sm">
        <button @click="page--; reload()" :disabled="page <= 1"
                class="px-3 py-1.5 rounded-lg border border-gray-200 disabled:opacity-30 hover:bg-gray-50">←</button>
        <span class="text-gray-500" x-text="`${page} / ${Math.ceil(total / pageSize)}`"></span>
        <button @click="page++; reload()" :disabled="page * pageSize >= total"
                class="px-3 py-1.5 rounded-lg border border-gray-200 disabled:opacity-30 hover:bg-gray-50">→</button>
      </div>
    </main>
  </div>

  <!-- Detail / Edit Modal -->
  <div x-show="modal.open" x-cloak
       class="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center p-4"
       @click="closeModal()">
    <div class="bg-white rounded-2xl shadow-2xl max-w-2xl w-full max-h-[85vh] flex flex-col" @click.stop>
      <div class="p-5 border-b flex items-center justify-between shrink-0">
        <div class="flex items-center gap-2">
          <span class="text-xs px-2 py-0.5 bg-gray-100 text-gray-600 rounded font-medium" x-text="modal.data.content_type || 'general'"></span>
          <h2 class="text-base font-semibold text-gray-800" x-text="modal.mode === 'new' ? t('creations_new_title') : t('creations_edit_title')"></h2>
        </div>
        <button @click="closeModal()" class="text-gray-400 hover:text-gray-600">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="p-5 overflow-y-auto flex-1 space-y-4">
        <div>
          <label class="block text-xs font-medium text-gray-500 mb-1" x-text="t('creations_field_title')"></label>
          <input x-model="modal.data.title" type="text" maxlength="512"
                 class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-accent/20 focus:border-accent">
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-500 mb-1" x-text="t('creations_field_content')"></label>
          <textarea x-model="modal.data.content" rows="10"
                    class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm font-mono leading-relaxed focus:outline-none focus:ring-2 focus:ring-accent/20 focus:border-accent"></textarea>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-medium text-gray-500 mb-1" x-text="t('creations_field_type')"></label>
            <select x-model="modal.data.content_type"
                    class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-accent/20 focus:border-accent">
              <option value="general" x-text="t('creations_type_general')"></option>
              <option value="topic" x-text="t('creations_type_topic')"></option>
              <option value="post" x-text="t('creations_type_post')"></option>
              <option value="script" x-text="t('creations_type_script')"></option>
              <option value="email" x-text="t('creations_type_email')"></option>
              <option value="caption" x-text="t('creations_type_caption')"></option>
              <option value="hook" x-text="t('creations_type_hook')"></option>
            </select>
          </div>
          <div>
            <label class="block text-xs font-medium text-gray-500 mb-1" x-text="t('creations_field_tags')"></label>
            <input x-model="modal.tagsText" type="text" placeholder="tiktok, launch, hook"
                   class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-accent/20 focus:border-accent">
          </div>
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-500 mb-1" x-text="t('creations_field_note')"></label>
          <input x-model="modal.data.source_note" type="text"
                 class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-accent/20 focus:border-accent">
        </div>
      </div>
      <div class="p-4 border-t flex items-center justify-between shrink-0">
        <div class="text-[11px] text-gray-400">
          <span x-show="modal.mode === 'edit'" x-text="modal.data.source_app + ' · ' + (modal.data.created_at ? new Date(modal.data.created_at).toLocaleString() : '')"></span>
        </div>
        <div class="flex items-center gap-2">
          <button @click="closeModal()" class="px-4 py-2 text-sm text-gray-600 hover:bg-gray-50 rounded-lg" x-text="t('btn_cancel')"></button>
          <button @click="save()" :disabled="modal.saving || !modal.data.title || !modal.data.content"
                  class="px-4 py-2 text-sm bg-accent text-white rounded-lg hover:bg-accent-hover disabled:opacity-50">
            <span x-text="modal.saving ? t('saving') : t('btn_save')"></span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Generate Video Modal -->
  <div x-show="videoModal.open" x-cloak
       class="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl max-w-3xl w-full max-h-[90vh] flex flex-col">

      <!-- Header -->
      <div class="p-5 border-b flex items-center justify-between shrink-0">
        <div class="min-w-0">
          <h2 class="text-base font-semibold text-gray-800 flex items-center gap-2">
            <svg class="w-5 h-5 text-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
            <span x-text="t('vg_modal_title')"></span>
          </h2>
          <p class="text-xs text-gray-500 mt-0.5 truncate" x-text="videoModal.creation?.title || ''"></p>
        </div>
        <button @click="closeVideoModal()" class="text-gray-400 hover:text-gray-600">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>

      <!-- Body -->
      <div class="p-5 overflow-y-auto flex-1 space-y-5" x-ref="videoModalBody">

        <!-- No providers configured -->
        <div x-show="!videoModal.providersLoading && videoModal.providers.length === 0"
             class="bg-amber-50 border border-amber-200 rounded-xl p-4">
          <p class="text-sm text-amber-800 mb-2" x-text="t('vg_no_providers_title')"></p>
          <p class="text-xs text-amber-700 mb-3" x-text="t('vg_no_providers_hint')"></p>
          <a href="/setting.html?section=media-providers"
             class="inline-flex items-center gap-1.5 bg-amber-600 text-white px-3 py-1.5 rounded-lg text-xs font-medium hover:bg-amber-700 transition-colors">
            <span x-text="t('vg_no_providers_cta')"></span> →
          </a>
        </div>

        <!-- ── Videos (shown first when there are results) ── -->
        <div x-show="videoModal.jobs.length > 0" class="mb-5 pb-4 border-b border-gray-100">
          <button type="button" @click="videoModal.pastVideosExpanded = !videoModal.pastVideosExpanded"
                  class="w-full flex items-center justify-between text-left hover:bg-gray-50 -mx-2 px-2 py-1.5 rounded-lg transition-colors">
            <div class="flex items-center gap-2">
              <svg class="w-3.5 h-3.5 text-gray-400 transition-transform"
                   :class="videoModal.pastVideosExpanded ? 'rotate-90' : ''"
                   fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"/>
              </svg>
              <span class="text-[11px] font-semibold uppercase tracking-wider text-gray-400"
                    x-text="t('vg_existing_videos') + ' (' + videoModal.jobs.length + ')'"></span>
              <span x-show="activeJobsCount > 0"
                    class="inline-flex items-center gap-1 text-[10px] font-medium text-amber-700 bg-amber-50 px-2 py-0.5 rounded-full">
                <svg class="w-2.5 h-2.5 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/></svg>
                <span x-text="t('vg_jobs_in_progress').replace('{n}', activeJobsCount)"></span>
              </span>
            </div>
          </button>

          <div x-show="videoModal.pastVideosExpanded" x-collapse class="space-y-3 mt-3" x-ref="pastVideosContainer">
            <!-- Show latest 3 by default; "show all" expands the rest -->
            <template x-for="(job, idx) in videoModal.jobs" :key="job.id">
              <template x-if="idx < 3 || videoModal.showAllJobs">
              <div class="rounded-xl p-3 transition-all duration-500"
                   :class="videoModal.flashJobId === job.id ? 'bg-amber-50 ring-2 ring-amber-300' : 'bg-gray-50'">
                <div class="flex items-start gap-3">
                  <div class="w-32 h-20 bg-gray-200 rounded-lg overflow-hidden shrink-0 relative cursor-pointer group/thumb"
                       @click="job.status === 'completed' && job.video_url && openVideoPlayer(job.video_url, job.cover_url)">
                    <template x-if="job.status === 'completed' && job.video_url">
                      <div class="relative w-full h-full">
                        <img :src="job.cover_url || ''" class="w-full h-full object-cover" alt="">
                        <div class="absolute inset-0 flex items-center justify-center bg-black/20 group-hover/thumb:bg-black/40 transition-colors">
                          <svg class="w-8 h-8 text-white drop-shadow-lg" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                        </div>
                      </div>
                    </template>
                    <template x-if="job.status !== 'completed'">
                      <div class="w-full h-full flex items-center justify-center text-gray-400">
                        <template x-if="job.status === 'failed'">
                          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                        </template>
                        <template x-if="job.status !== 'failed'">
                          <svg class="w-6 h-6 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/></svg>
                        </template>
                      </div>
                    </template>
                  </div>
                  <div class="flex-1 min-w-0">
                    <div class="flex items-center gap-2 mb-1 flex-wrap">
                      <span class="text-[11px] font-medium px-2 py-0.5 rounded-full"
                            :class="{
                              'bg-gray-200 text-gray-600': job.status === 'pending',
                              'bg-blue-100 text-blue-700': job.status === 'processing',
                              'bg-green-100 text-green-700': job.status === 'completed',
                              'bg-red-100 text-red-700': job.status === 'failed',
                            }"
                            x-text="t('vg_status_' + job.status)"></span>
                      <span class="text-[11px] text-gray-400" x-text="job.provider"></span>
                      <span x-show="job.progress != null" class="text-[11px] text-gray-400" x-text="`${job.progress}%`"></span>
                      <span x-show="job.duration_seconds" class="text-[11px] text-gray-400" x-text="`${job.duration_seconds}s`"></span>
                      <span x-show="job.created_at" class="text-[11px] text-gray-400"
                            :title="new Date(job.created_at).toLocaleString()"
                            x-text="formatRelative(job.created_at)"></span>
                    </div>
                    <p x-show="job.error_message" class="text-[11px] text-red-600 mt-1 break-words" x-text="job.error_message"></p>
                    <div class="flex items-center gap-3 mt-2">
                      <a x-show="job.status === 'completed' && job.video_url"
                         :href="job.video_url" target="_blank" rel="noopener" download
                         class="text-[11px] font-medium text-accent hover:underline">
                        <span x-text="t('vg_download')"></span> ↓
                      </a>
                      <button @click="deleteVideoJob(job)"
                              class="text-[11px] text-gray-400 hover:text-red-500 transition-colors">
                        <span x-text="t('vg_delete_job')"></span>
                      </button>
                    </div>
                  </div>
                </div>
              </div>
              </template>
            </template>
            <!-- Show more / show less toggle -->
            <button x-show="videoModal.jobs.length > 3"
                    @click="videoModal.showAllJobs = !videoModal.showAllJobs"
                    type="button"
                    class="w-full text-center py-1.5 text-[11px] text-gray-400 hover:text-accent transition-colors">
              <span x-show="!videoModal.showAllJobs" x-text="'查看全部 ' + videoModal.jobs.length + ' 条 ↓'"></span>
              <span x-show="videoModal.showAllJobs">收起 ↑</span>
            </button>
          </div>
        </div>

        <!-- Generate form -->
        <div x-show="videoModal.providers.length > 0">
          <div class="text-[11px] font-semibold text-gray-400 uppercase tracking-wider mb-3"
               x-text="t('vg_generate_section')"></div>

          <!-- Provider switcher — only shown when 2+ providers configured -->
          <div x-show="videoModal.providers.length > 1" class="mb-4">
            <label class="block text-xs font-medium text-gray-500 mb-1.5" x-text="t('vg_provider')"></label>
            <div class="flex gap-2">
              <template x-for="p in videoModal.providers" :key="p.id">
                <button type="button"
                        @click="onProviderChange(p.id)"
                        class="flex-1 py-2 px-3 rounded-xl border text-xs font-medium transition-all"
                        :class="videoModal.selectedProviderId === p.id
                          ? 'border-accent bg-accent/5 text-accent'
                          : 'border-gray-200 text-gray-600 hover:border-gray-300 hover:bg-gray-50'">
                  <span x-text="(p.provider === 'chanjing' ? '🎬' : '🎥') + ' ' + p.label"></span>
                </button>
              </template>
            </div>
          </div>

          <!-- Loading lists -->
          <div x-show="videoModal.listsLoading" class="flex items-center justify-center py-8">
            <svg class="animate-spin w-5 h-5 text-accent" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/></svg>
          </div>

          <!-- Lists error -->
          <div x-show="videoModal.listsError" class="text-xs text-red-600 bg-red-50 px-3 py-2 rounded-xl mb-3" x-text="videoModal.listsError"></div>

          <div x-show="!videoModal.listsLoading && !videoModal.listsError && (uniqueAvatars.length > 0 || uniqueVoices.length > 0)" class="space-y-5">

            <!-- ── Primary: Script (the content — users need to preview/edit) ── -->
            <div>
              <div class="flex items-center justify-between mb-2">
                <label class="text-[11px] font-semibold uppercase tracking-wider text-gray-400" x-text="t('vg_section_script')"></label>
                <span class="text-[11px] tabular-nums"
                      :class="videoModal.form.script.length > 4000 ? 'text-red-500' : 'text-gray-400'"
                      x-text="`${videoModal.form.script.length}`"></span>
              </div>
              <textarea x-model="videoModal.form.script" rows="5"
                        class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm leading-relaxed focus:outline-none focus:ring-2 focus:ring-accent/20 focus:border-accent"
                        :placeholder="t('vg_script_placeholder')"></textarea>
              <!-- Visual Direction (per-section) used to live here as a
                   read-only Phase-1 preview. The video pipeline never read
                   it — the editable B-roll plan below is the only UI that
                   actually shapes the generated B-roll. Removed to stop
                   confusing users who saw two different shot listings. -->
            </div>

            <!-- ── Primary: Avatar (the one real decision — highest visual weight) ── -->
            <div>
              <div class="flex items-center justify-between mb-2">
                <label class="text-sm font-semibold text-gray-800" x-text="t('vg_section_avatar')"></label>
                <div class="flex items-center gap-2">
                  <span class="text-[10px] text-gray-400" x-text="filteredAvatars.length + ' / ' + uniqueAvatars.length"></span>
                  <button type="button"
                          @click="refreshProviderLists()"
                          :disabled="videoModal.listsLoading"
                          :title="t('vg_refresh_lists_tooltip')"
                          class="text-gray-400 hover:text-accent disabled:opacity-30 transition-colors">
                    <svg class="w-3 h-3" :class="videoModal.listsLoading && 'animate-spin'" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                  </button>
                </div>
              </div>

              <!-- Filter chips (subtle) -->
              <div x-show="uniqueAvatars.length > 0" class="flex items-center gap-1 mb-2 flex-wrap">
                <template x-for="opt in [
                  {v:'all',    l:t('vg_filter_all'),    n:avatarCounts.all},
                  {v:'male',   l:'♂ '+t('vg_filter_male'),   n:avatarCounts.male},
                  {v:'female', l:'♀ '+t('vg_filter_female'), n:avatarCounts.female},
                ]" :key="opt.v">
                  <button type="button"
                          x-show="opt.n > 0"
                          @click="videoModal.avatarFilter = opt.v"
                          class="px-2 py-0.5 rounded-md text-[11px] font-medium transition-colors"
                          :class="videoModal.avatarFilter === opt.v
                            ? 'bg-accent/10 text-accent'
                            : 'text-gray-500 hover:bg-gray-100'">
                    <span x-text="opt.l + ' (' + opt.n + ')'"></span>
                  </button>
                </template>
              </div>

              <!-- Empty state -->
              <div x-show="uniqueAvatars.length === 0"
                   class="text-center py-6 px-4 bg-gray-50 border border-dashed border-gray-200 rounded-xl">
                <p class="text-xs text-gray-500" x-text="t('vg_no_avatars')"></p>
              </div>

              <!-- Grid -->
              <div x-show="uniqueAvatars.length > 0" class="grid grid-cols-4 gap-2 max-h-[22rem] overflow-y-auto pr-1">
                <template x-for="(a, idx) in filteredAvatars" :key="a.id || ('idx_' + idx)">
                  <button type="button"
                          @click="selectAvatar(a)"
                          @mouseenter="$el.querySelector('video')?.play().catch(()=>{})"
                          @mouseleave="const _v = $el.querySelector('video'); if (_v) { _v.pause(); _v.currentTime = 0; }"
                          class="group relative rounded-xl border-2 overflow-hidden transition-all aspect-square bg-gray-100"
                          :class="videoModal.form.avatar_id === a.id ? 'border-accent ring-1 ring-accent/30' : 'border-gray-100 hover:border-gray-300'">
                    <img x-show="a.preview_image_url"
                         :src="a.preview_image_url" :alt="a.name"
                         class="absolute inset-0 w-full h-full object-cover transition-opacity group-hover:opacity-0"
                         loading="lazy"
                         @error="$event.target.style.display='none'">
                    <video x-show="a.preview_video_url"
                           :src="a.preview_video_url"
                           class="absolute inset-0 w-full h-full object-cover opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none"
                           muted loop playsinline preload="none">
                    </video>
                    <div class="absolute inset-0 flex items-center justify-center px-1 text-center text-[10px] text-gray-400 pointer-events-none"
                         x-show="!a.preview_image_url">
                      <span x-text="a.name"></span>
                    </div>
                    <div class="absolute top-1 right-1 flex gap-0.5 pointer-events-none">
                      <span x-show="a.gender"
                            class="text-[9px] font-semibold px-1 py-0.5 rounded backdrop-blur-sm"
                            :class="a.gender === 'male' ? 'bg-blue-500/80 text-white' : 'bg-pink-500/80 text-white'"
                            x-text="a.gender === 'male' ? '♂' : '♀'"></span>
                      <span x-show="a.age"
                            class="text-[9px] font-semibold px-1 py-0.5 rounded backdrop-blur-sm bg-gray-800/70 text-white"
                            x-text="t('vg_age_' + a.age)"></span>
                    </div>
                    <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/70 to-transparent text-white text-[10px] font-medium px-1.5 py-1 truncate pointer-events-none">
                      <span x-text="a.name"></span>
                    </div>
                  </button>
                </template>
              </div>
            </div>

            <!-- ── Primary: Aspect ratio ── -->
            <div>
              <label class="text-[11px] font-semibold uppercase tracking-wider text-gray-400 block mb-2" x-text="t('vg_section_format')"></label>
              <div class="grid grid-cols-3 gap-2">
                <button type="button" @click="videoModal.form.aspect_ratio = 'portrait'"
                        class="py-3 px-2 rounded-xl border-2 transition-all flex flex-col items-center gap-1.5"
                        :class="videoModal.form.aspect_ratio === 'portrait'
                          ? 'border-accent bg-accent/5'
                          : 'border-gray-200 hover:border-gray-300 hover:bg-gray-50'">
                  <div class="w-5 h-9 border-2 rounded-sm transition-colors"
                       :class="videoModal.form.aspect_ratio === 'portrait' ? 'border-accent' : 'border-gray-400'"></div>
                  <div class="text-[11px] font-medium"
                       :class="videoModal.form.aspect_ratio === 'portrait' ? 'text-accent' : 'text-gray-600'">
                    <span x-text="t('vg_aspect_portrait')"></span>
                    <span class="text-[9px] text-gray-400 ml-1">9:16</span>
                  </div>
                </button>
                <button type="button" @click="videoModal.form.aspect_ratio = 'landscape'"
                        class="py-3 px-2 rounded-xl border-2 transition-all flex flex-col items-center gap-1.5"
                        :class="videoModal.form.aspect_ratio === 'landscape'
                          ? 'border-accent bg-accent/5'
                          : 'border-gray-200 hover:border-gray-300 hover:bg-gray-50'">
                  <div class="w-9 h-5 border-2 rounded-sm transition-colors"
                       :class="videoModal.form.aspect_ratio === 'landscape' ? 'border-accent' : 'border-gray-400'"></div>
                  <div class="text-[11px] font-medium"
                       :class="videoModal.form.aspect_ratio === 'landscape' ? 'text-accent' : 'text-gray-600'">
                    <span x-text="t('vg_aspect_landscape')"></span>
                    <span class="text-[9px] text-gray-400 ml-1">16:9</span>
                  </div>
                </button>
                <button type="button" @click="videoModal.form.aspect_ratio = 'square'"
                        class="py-3 px-2 rounded-xl border-2 transition-all flex flex-col items-center gap-1.5"
                        :class="videoModal.form.aspect_ratio === 'square'
                          ? 'border-accent bg-accent/5'
                          : 'border-gray-200 hover:border-gray-300 hover:bg-gray-50'">
                  <div class="w-7 h-7 border-2 rounded-sm transition-colors"
                       :class="videoModal.form.aspect_ratio === 'square' ? 'border-accent' : 'border-gray-400'"></div>
                  <div class="text-[11px] font-medium"
                       :class="videoModal.form.aspect_ratio === 'square' ? 'text-accent' : 'text-gray-600'">
                    <span x-text="t('vg_aspect_square')"></span>
                    <span class="text-[9px] text-gray-400 ml-1">1:1</span>
                  </div>
                </button>
              </div>
            </div>

            <!-- ── Primary: Enhancements (B-roll + Caption toggles) ── -->
            <div class="space-y-2">
              <!-- B-roll (conditional — only when structured_content has visual_direction) -->
              <template x-if="videoModal.creation?.structured_content?.sections && Object.values(videoModal.creation.structured_content.sections).some(s => s.visual_direction)">
                <div class="space-y-2">
                  <label class="flex items-start gap-2 text-sm text-gray-600 cursor-pointer rounded-lg border border-gray-200 hover:border-gray-300 px-3 py-2.5 transition-colors">
                    <input type="checkbox" x-model="videoModal.form.broll" class="accent-accent w-4 h-4 mt-0.5">
                    <div class="flex-1 min-w-0">
                      <div class="flex items-center gap-2 flex-wrap">
                        <span class="font-medium" x-text="t('vg_broll_label')"></span>
                        <span class="text-[11px] text-gray-400 font-normal" x-text="t('vg_broll_time_suffix')"></span>
                      </div>
                      <p class="text-[11px] text-gray-400 mt-0.5" x-text="t('vg_broll_desc')"></p>
                    </div>
                  </label>

                  <!-- B-roll editor: shows when the toggle is on -->
                  <div x-show="videoModal.form.broll" x-cloak
                       class="ml-7 mr-0 border border-gray-200 rounded-lg bg-gray-50/60 p-3 space-y-3">
                    <div class="flex items-center justify-between gap-2 flex-wrap">
                      <div class="text-[11px] text-gray-500">
                        <span x-text="t('vg_broll_editor_label')"></span>
                        <span class="text-gray-400">
                          — <span x-text="brollTotalNarrationChars()"></span>
                          <span x-text="t('vg_broll_chars')"></span>
                        </span>
                      </div>
                      <div class="flex items-center gap-3">
                        <button type="button" @click="brollRegeneratePlan()"
                                :disabled="brollRegenerating"
                                class="text-[11px] text-gray-500 hover:text-accent font-medium flex items-center gap-1 disabled:opacity-50">
                          <svg class="w-3 h-3" :class="brollRegenerating ? 'animate-spin' : ''" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                          <span x-text="brollRegenerating ? t('vg_broll_regenerating') : t('vg_broll_regenerate')"></span>
                        </button>
                        <button type="button" @click="brollAddShot()"
                                class="text-[11px] text-accent hover:text-accent-hover font-medium flex items-center gap-1">
                          <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                          <span x-text="t('vg_broll_add_shot')"></span>
                        </button>
                      </div>
                    </div>

                    <template x-if="(videoModal.form.broll_plan || []).length === 0">
                      <p class="text-[11px] text-gray-400 italic" x-text="t('vg_broll_empty_hint')"></p>
                    </template>

                    <template x-for="(shot, idx) in videoModal.form.broll_plan" :key="idx">
                      <div class="bg-white border border-gray-200 rounded-lg p-2.5 space-y-2">
                        <div class="flex items-center gap-2 text-[11px]">
                          <select x-model="shot.type"
                                  class="border border-gray-200 rounded px-1.5 py-0.5 text-[11px] bg-white">
                            <option value="retention" x-text="t('vg_broll_type_retention')"></option>
                            <option value="illustrative" x-text="t('vg_broll_type_illustrative')"></option>
                          </select>
                          <span class="text-gray-400" x-text="t('vg_broll_insert_after')"></span>
                          <input type="number" min="0" :max="brollTotalNarrationChars()"
                                 x-model.number="shot.insert_after_char"
                                 class="border border-gray-200 rounded px-1.5 py-0.5 text-[11px] w-16 bg-white">
                          <span class="text-gray-400" x-text="t('vg_broll_duration')"></span>
                          <input type="number" min="2" max="15"
                                 x-model.number="shot.duration_seconds"
                                 class="border border-gray-200 rounded px-1.5 py-0.5 text-[11px] w-14 bg-white">
                          <span class="text-gray-400">s</span>
                          <!-- Preview: the VO keyword this shot will land next to -->
                          <span class="text-[10px] text-gray-400 truncate flex-1 text-right"
                                :title="brollContextAt(shot.insert_after_char)"
                                x-text="brollContextAt(shot.insert_after_char)"></span>
                          <button type="button" @click="videoModal.form.broll_plan.splice(idx, 1)"
                                  class="text-gray-300 hover:text-red-500 shrink-0">
                            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                          </button>
                        </div>
                        <textarea x-model="shot.prompt" rows="2"
                                  :placeholder="t('vg_broll_prompt_placeholder')"
                                  class="w-full text-[12px] border border-gray-200 rounded px-2 py-1.5 leading-snug focus:outline-none focus:ring-1 focus:ring-accent/30 focus:border-accent resize-y bg-white"></textarea>
                      </div>
                    </template>
                  </div>
                </div>
              </template>
              <!-- Caption -->
              <div class="flex items-center gap-2 rounded-lg border border-gray-200 hover:border-gray-300 px-3 py-2.5 transition-colors">
                <label class="flex items-center gap-2 text-sm text-gray-600 cursor-pointer flex-1 min-w-0">
                  <input type="checkbox" x-model="videoModal.form.caption" class="accent-accent w-4 h-4">
                  <span class="font-medium" x-text="t('vg_caption')"></span>
                </label>
                <button type="button" x-show="videoModal.form.caption"
                        @click="const d = document.getElementById('vg-advanced'); if (d) { d.open = true; d.scrollIntoView({behavior:'smooth', block:'nearest'}); }"
                        class="text-[11px] text-accent/70 hover:text-accent transition-colors shrink-0"
                        x-text="t('vg_caption_customize_hint')"></button>
              </div>
            </div>

            <!-- ── Advanced (Voice + Caption style details) ── -->
            <details class="group/advanced border-t border-gray-100 pt-4" id="vg-advanced">
              <summary class="flex items-center justify-between cursor-pointer select-none hover:bg-gray-50 -mx-1 px-1 py-1 rounded-lg transition-colors">
                <label class="text-[11px] font-semibold uppercase tracking-wider text-gray-400 pointer-events-none"
                       x-text="t('vg_advanced')"></label>
                <div class="flex items-center gap-2 text-[11px] text-gray-400">
                  <span x-show="videoModal.form.voice_id && uniqueVoices.find(v => v.id === videoModal.form.voice_id)"
                        x-text="uniqueVoices.find(v => v.id === videoModal.form.voice_id)?.name || ''"></span>
                  <svg class="w-3 h-3 transition-transform group-open/advanced:rotate-90" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
                </div>
              </summary>
              <div class="mt-4 space-y-5">

                <!-- Voice -->
                <div>
                  <label class="text-[11px] font-semibold uppercase tracking-wider text-gray-400 block mb-2" x-text="t('vg_section_voice')"></label>
                  <div class="flex items-center gap-2 mb-2 flex-wrap">
                    <div class="relative flex-1 min-w-[160px]">
                      <svg class="absolute left-2.5 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                      <input type="text" x-model="videoModal.voiceSearch"

                    </div>
                    <div class="flex items-center gap-1 flex-wrap">
                      <button type="button"
                              x-show="selectedAvatar"
                              @click="videoModal.voiceFilter = 'best'"
                              class="px-2 py-0.5 rounded-md text-[11px] font-medium transition-colors"

                      </button>
                      <template x-for="opt in [
                        {v:'all',    l:t('vg_filter_all'),    n:voiceCounts.all},
                        {v:'male',   l:'♂', n:voiceCounts.male},

                                x-show="opt.n > 0"
                                @click="videoModal.voiceFilter = opt.v"
                                class="px-2 py-0.5 rounded-md text-[11px] font-medium transition-colors"

                  <div class="border border-gray-200 rounded-lg max-h-60 overflow-y-auto divide-y divide-gray-100">
                    <template x-for="(v, idx) in filteredVoices" :key="v.id || ('idx_' + idx)">
                      <div class="flex items-center gap-3 px-3 py-2 cursor-pointer transition-colors"
                           :class="videoModal.form.voice_id === v.id ? 'bg-accent/5' : 'hover:bg-gray-50'"
                           @click="videoModal.form.voice_id = v.id">
                        <div class="w-4 h-4 rounded-full border-2 shrink-0 flex items-center justify-center"
                             :class="videoModal.form.voice_id === v.id ? 'border-accent' : 'border-gray-300'">
                          <div x-show="videoModal.form.voice_id === v.id" class="w-2 h-2 rounded-full bg-accent"></div>
                        </div>
                        <span x-show="voiceMatchLabel(v)"

                        <div class="flex-1 min-w-0">
                          <div class="text-sm font-medium text-gray-800 truncate" x-text="v.name"></div>
                          <div class="text-[11px] text-gray-400 flex items-center gap-1.5">
                            <span x-show="v.gender" x-text="v.gender === 'male' ? '♂' : '♀'"></span>
                            <span x-show="v.age" x-text="t('vg_age_' + v.age)"></span>
                            <span x-show="v.language" x-text="voiceLangLabel(v.language)"></span>
                          </div>
                        </div>
                        <button type="button"
                                @click.stop="auditionVoice(v)"
                                :disabled="videoModal.auditionLoadingId === v.id || !auditionCanPlay"
                                :title="!auditionCanPlay ? t('vg_audition_no_text') : ''"
                                class="shrink-0 inline-flex items-center gap-1 text-[11px] font-medium px-2.5 py-1 rounded-lg border transition-colors disabled:opacity-40 disabled:cursor-not-allowed"
                                :class="videoModal.auditionPlayingId === v.id
                                  ? 'border-accent bg-accent/5 text-accent'
                                  : 'border-gray-200 text-gray-600 hover:border-accent hover:text-accent'">
                          <svg x-show="videoModal.auditionLoadingId === v.id" class="w-3 h-3 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/></svg>
                          <svg x-show="videoModal.auditionLoadingId !== v.id && videoModal.auditionPlayingId === v.id" class="w-3 h-3" fill="currentColor" viewBox="0 0 24 24"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg>
                          <svg x-show="videoModal.auditionLoadingId !== v.id && videoModal.auditionPlayingId !== v.id" class="w-3 h-3" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                          <span x-text="t('vg_audition_short')"></span>
                        </button>
                      </div>
                    </template>
                    <div x-show="filteredVoices.length === 0" class="py-6 text-center text-xs text-gray-400">
                      <span x-text="t('vg_voices_no_match')"></span>
                    </div>
                  </div>
                  <p class="mt-1 text-[10px] text-gray-400">
                    <span x-show="auditionCanPlay" x-text="t('vg_audition_hint').replace('{n}', auditionPreviewText.length).replace('{text}', auditionPreviewText)"></span>
                    <span x-show="!auditionCanPlay" x-text="t('vg_audition_no_text')"></span>
                  </p>
                  <audio x-ref="auditionAudio" class="hidden" @ended="videoModal.auditionPlayingId = ''"></audio>
                </div>

                <!-- Caption style (shown only when caption enabled above) -->
                <div x-show="videoModal.form.caption" x-collapse>
                  <label class="text-[11px] font-semibold uppercase tracking-wider text-gray-400 block mb-2" x-text="t('vg_caption_style')"></label>
                  <div class="flex gap-2">
                    <template x-for="s in [
                      {id:'classic', label:t('vg_subtitle_classic'),  desc:t('vg_subtitle_classic_desc'), color:'#FFFFFF', stroke:'#000000', size:'text-sm'},
                      {id:'bold',    label:t('vg_subtitle_bold'),     desc:t('vg_subtitle_bold_desc'),    color:'#FFE033', stroke:'#1A1A1A', size:'text-base font-bold'},
                      {id:'minimal', label:t('vg_subtitle_minimal'),  desc:t('vg_subtitle_minimal_desc'), color:'#E8E8E8', stroke:'#555555', size:'text-xs'},
                    ]" :key="s.id">
                      <button type="button"
                              @click="videoModal.form.subtitle_style = s.id; videoModal.form.subtitle_color = ''; videoModal.form.subtitle_stroke = ''"
                              class="flex-1 rounded-xl border-2 p-2.5 transition-all text-center"
                              :class="videoModal.form.subtitle_style === s.id
                                ? 'border-accent bg-accent/5'
                                : 'border-gray-200 hover:border-gray-300'">
                        <div class="bg-gray-800 rounded-md px-2 py-1.5 mb-1.5 flex items-center justify-center min-h-[28px]">
                          <span :class="s.size"
                                :style="`color:${videoModal.form.subtitle_color || s.color}; text-shadow: -1px -1px 0 ${videoModal.form.subtitle_stroke || s.stroke}, 1px -1px 0 ${videoModal.form.subtitle_stroke || s.stroke}, -1px 1px 0 ${videoModal.form.subtitle_stroke || s.stroke}, 1px 1px 0 ${videoModal.form.subtitle_stroke || s.stroke};`"
                                x-text="t('vg_subtitle_preview_text')"></span>
                        </div>
                        <div class="text-[11px] font-medium" :class="videoModal.form.subtitle_style === s.id ? 'text-accent' : 'text-gray-600'" x-text="s.label"></div>
                        <div class="text-[10px] text-gray-400" x-text="s.desc"></div>
                      </button>
                    </template>
                  </div>
                  <!-- Customize colors (collapsed by default) -->
                  <details class="mt-3">
                    <summary class="text-[11px] text-gray-400 cursor-pointer hover:text-gray-600 select-none flex items-center gap-1">
                      <svg class="w-3 h-3 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
                      <span x-text="t('vg_customize_colors')"></span>
                    </summary>
                    <div class="mt-2 flex items-center gap-4 px-1">
                      <label class="flex items-center gap-1.5 text-[11px] text-gray-500">
                        <span x-text="t('vg_subtitle_color_text')"></span>
                        <input type="color"
                               :value="videoModal.form.subtitle_color || ({classic:'#FFFFFF',bold:'#FFE033',minimal:'#E8E8E8'}[videoModal.form.subtitle_style] || '#FFFFFF')"
                               @input="videoModal.form.subtitle_color = $event.target.value"
                               class="w-6 h-6 rounded border border-gray-300 cursor-pointer p-0"
                               style="padding:1px;">
                      </label>
                      <label class="flex items-center gap-1.5 text-[11px] text-gray-500">
                        <span x-text="t('vg_subtitle_color_stroke')"></span>
                        <input type="color"
                               :value="videoModal.form.subtitle_stroke || ({classic:'#000000',bold:'#1A1A1A',minimal:'#555555'}[videoModal.form.subtitle_style] || '#000000')"
                               @input="videoModal.form.subtitle_stroke = $event.target.value"
                               class="w-6 h-6 rounded border border-gray-300 cursor-pointer p-0"
                               style="padding:1px;">
                      </label>
                      <button x-show="videoModal.form.subtitle_color || videoModal.form.subtitle_stroke"
                              @click="videoModal.form.subtitle_color = ''; videoModal.form.subtitle_stroke = ''"
                              class="text-[10px] text-gray-400 hover:text-accent transition-colors"
                              x-text="t('vg_subtitle_reset')"></button>
                    </div>
                  </details>
                </div>

              </div>
            </details>

            <!-- Submit error -->
            <div x-show="videoModal.submitError" class="text-xs text-red-600 bg-red-50 px-3 py-2 rounded-xl"
                 x-text="videoModal.submitError"></div>
          </div>
        </div>

      </div>

      <!-- Footer -->
      <div class="px-5 py-4 border-t flex items-center justify-between gap-4 shrink-0">
        <div class="min-w-0 flex-1">
          <!-- Generate summary (highlights what's about to happen) -->
          <div x-show="generateSummary" class="text-[11px] flex items-center gap-1.5 text-gray-600">
            <svg class="w-3 h-3 text-accent shrink-0" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            <span class="truncate" :title="generateSummary">
              <span class="text-gray-400" x-text="t('vg_will_generate')"></span>
              <span class="font-medium text-gray-700" x-text="generateSummary"></span>
            </span>
          </div>
          <!-- Fallback hint when nothing chosen yet -->
          <div x-show="!generateSummary && videoModal.providers.length > 0"
               class="text-[11px] text-gray-400" x-text="t('vg_footer_hint')"></div>
        </div>
        <div class="flex items-center gap-2 shrink-0">
          <button @click="submitVideo()"
                  :disabled="!canSubmitVideo"
                  :title="!canSubmitVideo ? t('vg_disabled_hint') : ''"
                  class="inline-flex items-center gap-1.5 px-5 py-2 text-sm font-medium bg-accent text-white rounded-lg hover:bg-accent-hover disabled:opacity-50 disabled:cursor-not-allowed shadow-sm">
            <svg x-show="videoModal.submitting" class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/></svg>
            <span x-show="videoModal.submitting" x-text="t('vg_submitting')"></span>
            <span x-show="!videoModal.submitting && hasJobs" x-text="t('vg_generate_another')"></span>
            <span x-show="!videoModal.submitting && !hasJobs" x-text="t('vg_generate_btn')"></span>
          </button>
        </div>
      </div>
