  </div>

  <!-- ── Video Lightbox Player ── -->
  <div x-show="videoPlayer.open" x-cloak
       x-transition:enter="transition ease-out duration-200"
       x-transition:enter-start="opacity-0"
       x-transition:enter-end="opacity-100"
       x-transition:leave="transition ease-in duration-150"
       x-transition:leave-start="opacity-100"
       x-transition:leave-end="opacity-0"
       class="fixed inset-0 z-[200] flex items-center justify-center"
       @keydown.escape.window="closeVideoPlayer()">
    <!-- Backdrop -->
    <div class="absolute inset-0 bg-black/80" @click="closeVideoPlayer()"></div>
    <!-- Player container -->
    <div class="relative z-10 flex flex-col items-center gap-3 max-w-[90vw] max-h-[90vh]"
         @click.stop>
      <!-- Close button -->
      <button @click="closeVideoPlayer()"
              class="absolute -top-2 -right-2 z-20 w-8 h-8 rounded-full bg-white/10 hover:bg-white/20 backdrop-blur flex items-center justify-center text-white transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
      <!-- Video -->
      <video x-ref="lightboxVideo"
             :src="videoPlayer.url"
             :poster="videoPlayer.poster"
             class="rounded-xl shadow-2xl max-h-[80vh] max-w-[85vw] bg-black"
             controls autoplay playsinline>
      </video>
      <!-- Download -->
      <a x-show="videoPlayer.downloadUrl"
         :href="videoPlayer.downloadUrl" target="_blank" rel="noopener" download
         class="inline-flex items-center gap-1.5 text-sm text-white/70 hover:text-white transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
        <span x-text="t('vg_download')"></span>
      </a>
    </div>
  </div>

  <script>
    function creationsPage() {
      return {
        items: [],
        total: 0,
        page: 1,
        pageSize: 20,
        loading: true,
        searchQ: '',
        filterType: '',
        filterSource: '',
        flashCreationId: '',  // transient highlight when arriving from ?highlight=<id>
        modal: {
          open: false,
          mode: 'new',  // 'new' | 'edit'
          data: {},
          tagsText: '',
          saving: false,
        },

        // ── Generate Video modal ──
        videoModal: {
          open: false,
          creation: null,
          providers: [],          // active media-provider configs
          providersLoading: false,
          selectedProviderId: '',
          jobs: [],
          jobsLoading: false,
          avatars: [],
          voices: [],
          listsLoading: false,
          listsError: '',
          form: {
            avatar_id: '',
            voice_id: '',
            aspect_ratio: 'portrait',
            caption: true,
            script: '',
          },
          submitting: false,
          submitError: '',
          pollTimers: {},   // { [jobId]: intervalId }
          // Audition state
          auditionLoadingId: '',  // voice id currently being synthesized
          auditionPlayingId: '',  // voice id currently playing
          auditionCache: {},      // { voice_id: audio_url } — short-circuit repeat clicks
          // Filter / search state
          avatarFilter: 'all',    // 'all' | 'male' | 'female'
          voiceFilter: 'all',     // 'all' | 'best' | 'male' | 'female'
          voiceSearch: '',
          pastVideosExpanded: false,
          showAllJobs: false,
          // Submission feedback
          flashJobId: '',         // briefly highlight a newly-submitted job
        },
        // ── B-roll regenerate state ──
        brollRegenerating: false,

        // Video lightbox player
        videoPlayer: { open: false, url: '', poster: '', downloadUrl: '' },

        get activeJobsCount() {
          return this.videoModal.jobs.filter(
            j => j.status === 'pending' || j.status === 'processing'
          ).length;
        },

        get hasJobs() {
          return this.videoModal.jobs.length > 0;
        },

        // Defensive: dedupe + drop empty-id items so x-for never collides on
        // an empty-string fallback key. Some Chanjing accounts return malformed
        // rows, and Alpine's x-for crashes on duplicate/undefined :key, taking
        // the entire grid down.
        get uniqueAvatars() {
          const seen = new Set();
          return (this.videoModal.avatars || []).filter(a => {
            if (!a || !a.id || seen.has(a.id)) return false;
            seen.add(a.id);
            return true;
          });
        },
        get uniqueVoices() {
          const seen = new Set();
          return (this.videoModal.voices || []).filter(v => {
            if (!v || !v.id || seen.has(v.id)) return false;
            seen.add(v.id);
            return true;
          });
        },
        get selectedAvatar() {
          return this.uniqueAvatars.find(a => a.id === this.videoModal.form.avatar_id) || null;
        },
        get selectedVoice() {
          return this.uniqueVoices.find(v => v.id === this.videoModal.form.voice_id) || null;
        },
        get canSubmitVideo() {
          const m = this.videoModal;
          if (m.submitting || m.listsLoading) return false;
          if (!m.selectedProviderId) return false;
          if (!m.form.avatar_id || !m.form.voice_id) return false;
          if (!m.form.script || m.form.script.length === 0 || m.form.script.length > 4000) return false;
          return true;
        },

        get auditionPreviewText() {
          // First 20 chars of the script (after trim) — used as the TTS prompt
          // for per-voice audition. Empty string if no script yet.
          const s = (this.videoModal.form.script || '').trim();
          return s.slice(0, 20);
        },

        get auditionCanPlay() {
          return this.auditionPreviewText.length > 0;
        },

        // ── Avatar filter ──
        get avatarCounts() {
          const all = this.uniqueAvatars;
          return {
            all: all.length,
            male: all.filter(a => a.gender === 'male').length,
            female: all.filter(a => a.gender === 'female').length,
          };
        },
        get filteredAvatars() {
          const f = this.videoModal.avatarFilter;
          if (f === 'all') return this.uniqueAvatars;
          return this.uniqueAvatars.filter(a => a.gender === f);
        },

        // ── Voice search + filter ──
        get voiceCounts() {
          const all = this.uniqueVoices;
          return {
            all: all.length,
            male: all.filter(v => v.gender === 'male').length,
            female: all.filter(v => v.gender === 'female').length,
          };
        },
        get filteredVoices() {
          const list = this.sortedVoices;
          const f = this.videoModal.voiceFilter;
          const q = (this.videoModal.voiceSearch || '').trim().toLowerCase();
          return list.filter(v => {
            // Search by name (case-insensitive substring)
            if (q && !(v.name || '').toLowerCase().includes(q)) return false;
            // Filter by category
            if (f === 'all') return true;
            if (f === 'best') {
              const av = this.selectedAvatar;
              if (!av) return false;
              return this.voiceMatchScore(v, av) > 0;
            }
            return v.gender === f;
          });
        },

        // ── Generate button summary ──
        get generateSummary() {
          // Returns a short string describing what's about to be generated.
          // Empty string if not all required fields filled in.
          if (!this.videoModal.selectedProviderId) return '';
          const av = this.selectedAvatar;
          const vo = this.selectedVoice;
          if (!av || !vo) return '';
          const parts = [av.name, vo.name];
          parts.push(t('vg_aspect_' + this.videoModal.form.aspect_ratio));
          if (this.videoModal.form.caption) parts.push(t('vg_caption_short'));
          return parts.join(' · ');
        },

        voiceMatchTooltip(voice) {
          // Hover-text explanation of the ✨/✓/⚠ badge
          const av = this.selectedAvatar;
          if (!av) return '';
          if (av.extras && av.extras.paired_voice_id === voice.id) return t('vg_match_paired_tooltip');
          if (av.gender && voice.gender && av.gender === voice.gender) return t('vg_match_gender_tooltip');
          if (av.gender && voice.gender && av.gender !== voice.gender) return t('vg_match_mismatch_tooltip');
          return '';
        },

        // ── Voice ↔ Avatar matching ──
        // Voices are re-ranked when an avatar is selected so the best match
        // floats to the top. Signals (highest weight first):
        //   1. paired_voice_id (Chanjing only — the avatar's "official" voice)
        //   2. matching gender (hard signal, both providers expose this)
        //   3. matching age (Jogg structured + Chanjing tag-parsed)
        //   4. script-mood ↔ voice-name keyword match (weak heuristic)

        _detectScriptMood(script) {
          if (!script) return null;
          const t = script.toLowerCase();
          if (/限时|优惠|抢|秒杀|促销|直降|低价|包邮|赠品|甩|sale|deal|discount|buy now|shop now/.test(t)) return 'sales';
          if (/故事|回忆|陪伴|温暖|曾经|那时|童年|成长|story|once|memory|remember/.test(t)) return 'narrative';
          if (/分析|数据|报告|研究|趋势|策略|analysis|research|report|data/.test(t)) return 'professional';
          return null;
        },

        _voiceMoodTag(voiceName) {
          if (!voiceName) return null;
          if (/带货|促销|sale/i.test(voiceName)) return 'sales';
          if (/情感|故事|narrat|story/i.test(voiceName)) return 'narrative';
          if (/商务|主播|news|business/i.test(voiceName)) return 'professional';
          return null;
        },

        voiceMatchScore(voice, avatar) {
          if (!voice || !avatar) return 0;
          let score = 0;
          // Paired voice — overrides everything else
          if (avatar.extras && avatar.extras.paired_voice_id === voice.id) {
            score += 1000;
          }
          // Gender (most jarring when wrong)
          if (avatar.gender && voice.gender && avatar.gender === voice.gender) {
            score += 50;
          } else if (avatar.gender && voice.gender && avatar.gender !== voice.gender) {
            score -= 30;  // explicit penalty for cross-gender
          }
          // Age
          if (avatar.age && voice.age && avatar.age === voice.age) {
            score += 20;
          }
          // Mood (script ↔ voice name)
          const mood = this._detectScriptMood(this.videoModal.form.script);
          const vMood = this._voiceMoodTag(voice.name);
          if (mood && vMood && mood === vMood) {
            score += 15;
          }
          return score;
        },

        voiceMatchLabel(voice) {
          // Short badge label shown next to voice in the dropdown.
          const av = this.selectedAvatar;
          if (!av) return '';
          if (av.extras && av.extras.paired_voice_id === voice.id) return '✨';
          if (av.gender && voice.gender && av.gender === voice.gender) return '✓';
          if (av.gender && voice.gender && av.gender !== voice.gender) return '⚠';
          return '';
        },

        voiceLangLabel(lang) {
          // Translate provider language strings ("multilingual", "english", "cn"...)
          // to the active locale. Falls back to the raw value if no translation
          // exists for that key.
          if (!lang) return '';
          const lower = String(lang).toLowerCase().trim();
          const key = 'vg_lang_' + lower;
          const translated = t(key);
          return translated === key ? lang : translated;
        },

        get sortedVoices() {
          const list = this.uniqueVoices;
          const av = this.selectedAvatar;
          if (!av || list.length === 0) return list;
          return [...list].sort(
            (a, b) => this.voiceMatchScore(b, av) - this.voiceMatchScore(a, av)
          );
        },

        pickBestVoiceFor(avatar) {
          if (!avatar) return null;
          const list = this.uniqueVoices;
          const ranked = [...list].sort(
            (a, b) => this.voiceMatchScore(b, avatar) - this.voiceMatchScore(a, avatar)
          );
          return ranked[0] || null;
        },

        async init() {
          document.title = t('creations_title') + ' - OpenLucid';
          await this.reload();

          const urlParams = new URLSearchParams(location.search);

          // Auto-open video modal when redirected from Script Writer "Generate Video" button
          const openVideoId = urlParams.get('open_video');
          if (openVideoId) {
            history.replaceState(null, '', location.pathname);
            const res = await fetch(`/api/v1/creations/${openVideoId}`).catch(() => null);
            if (res?.ok) {
              const creation = await res.json();
              await this.openVideoModal(creation);
            }
          }

          // Flash-highlight a creation when arriving from an app's "View in Library" link
          const highlightId = urlParams.get('highlight');
          if (highlightId) {
            history.replaceState(null, '', location.pathname);
            this.flashCreationId = highlightId;
            await this.$nextTick();
            const el = document.querySelector(`[data-creation-id="${highlightId}"]`);
            if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            setTimeout(() => { this.flashCreationId = ''; }, 2400);
          }
        },

        async reload() {
          this.loading = true;
          try {
            const params = new URLSearchParams({
              page: this.page,
              page_size: this.pageSize,
            });
            if (this.searchQ) params.set('q', this.searchQ);
            if (this.filterType) params.set('content_type', this.filterType);
            if (this.filterSource) params.set('source_app', this.filterSource);
            const res = await fetch(`/api/v1/creations?${params}`);
            if (res.ok) {
              const data = await res.json();
              this.items = data.items || [];
              this.total = data.total || 0;
            }
          } catch (e) { console.error(e); }
          finally { this.loading = false; }
        },

        openNew() {
          this.modal = {
            open: true,
            mode: 'new',
            data: { title: '', content: '', content_type: 'general', source_note: '' },
            tagsText: '',
            saving: false,
          };
        },

        openDetail(c) {
          this.modal = {
            open: true,
            mode: 'edit',
            data: { ...c },
            tagsText: (c.tags || []).join(', '),
            saving: false,
          };
        },

        closeModal() {
          this.modal.open = false;
        },

        async save() {
          this.modal.saving = true;
          try {
            const tags = this.modal.tagsText
              ? this.modal.tagsText.split(',').map(t => t.trim()).filter(Boolean)
              : null;
            const body = {
              title: this.modal.data.title,
              content: this.modal.data.content,
              content_type: this.modal.data.content_type || 'general',
              tags,
              source_note: this.modal.data.source_note || null,
            };
            let res;
            if (this.modal.mode === 'new') {
              body.source_app = 'manual';
              res = await fetch('/api/v1/creations', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body),
              });
            } else {
              res = await fetch(`/api/v1/creations/${this.modal.data.id}`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body),
              });
            }
            if (res.ok) {
              this.modal.open = false;
              await this.reload();
            } else {
              const err = await res.json().catch(() => ({}));
              toast.error((err.error?.message || err.detail || 'Save failed'));
            }
          } catch (e) {
            toast.error('Save failed: ' + e.message);
          }
          this.modal.saving = false;
        },

        async confirmDelete(c) {
          if (!confirm(t('creations_confirm_delete') + '\n\n' + c.title)) return;
          try {
            const res = await fetch(`/api/v1/creations/${c.id}`, { method: 'DELETE' });
            if (res.ok || res.status === 204) await this.reload();
          } catch (e) { console.error(e); }
        },

        // ── Video generation modal ──

        async openVideoModal(creation, options = {}) {
          this.videoModal.open = true;
          this.videoModal.creation = creation;
          this.videoModal.jobs = [];
          this.videoModal.avatars = [];
          this.videoModal.voices = [];
          this.videoModal.selectedProviderId = '';
          this.videoModal.listsError = '';
          this.videoModal.submitError = '';
          this.videoModal.avatarFilter = 'all';
          this.videoModal.voiceFilter = 'all';
          this.videoModal.voiceSearch = '';
          // Open with history pre-expanded if caller (e.g. video badge click) asked
          this.videoModal.pastVideosExpanded = !!options.openHistory;
          this.videoModal.showAllJobs = false;
          // Auto-infer aspect_ratio from platform (douyin/tiktok → portrait, etc.)
          const platformAspect = {
            douyin: 'portrait', wechat_video: 'portrait', tiktok: 'portrait',
            youtube_shorts: 'portrait', xiaohongshu: 'portrait',
          };
          const pid = creation.structured_content?.platform_id;
          const inferredAspect = (pid && platformAspect[pid]) || 'portrait';
          this.videoModal.form = {
            avatar_id: '',
            voice_id: '',
            aspect_ratio: inferredAspect,
            caption: true,
            subtitle_style: 'classic',
            subtitle_color: '',
            subtitle_stroke: '',
            broll: false,
            // Deep-clone the AI director's plan so edits here don't mutate
            // the stored creation.structured_content.broll_plan.
            broll_plan: (() => {
              const plan = creation?.structured_content?.broll_plan;
              return Array.isArray(plan) ? JSON.parse(JSON.stringify(plan)) : [];
            })(),
            script: this._extractNarration(creation),
          };

          // Load providers + existing jobs in parallel
          this.videoModal.providersLoading = true;
          this.videoModal.jobsLoading = true;
          try {
            const [pr, jr] = await Promise.all([
              fetch('/api/v1/media-providers'),
              fetch(`/api/v1/creations/${creation.id}/videos`),
            ]);
            if (pr.ok) {
              const all = await pr.json();
              this.videoModal.providers = all.filter(p => p.is_active);
            }
            if (jr.ok) {
              this.videoModal.jobs = await jr.json();
            }
          } catch (e) {
            console.error(e);
          } finally {
            this.videoModal.providersLoading = false;
            this.videoModal.jobsLoading = false;
          }

          // Pick smart default provider based on script language
          if (this.videoModal.providers.length > 0) {
            const def = this.pickDefaultProvider(this.videoModal.form.script);
            await this.onProviderChange(def.id);
          }

          // If any existing job is non-terminal, start polling it
          for (const job of this.videoModal.jobs) {
            if (job.status === 'pending' || job.status === 'processing') {
              this.startPolling(job.id);
            }
          }

          // If there are completed videos, show history first (more useful than empty form)
          const hasCompleted = this.videoModal.jobs.some(j => j.status === 'completed');
          if (hasCompleted && !options.openHistory) {
            this.videoModal.pastVideosExpanded = true;
          }
        },

        closeVideoModal() {
          // Stop all active polling timers
          for (const [, timerId] of Object.entries(this.videoModal.pollTimers)) {
            clearInterval(timerId);
          }
          this.videoModal.pollTimers = {};
          // Stop any audition playback + clear cache (script may change next session)
          const audio = this.$refs.auditionAudio;
          if (audio) {
            audio.pause();
            audio.currentTime = 0;
          }
          this.videoModal.auditionPlayingId = '';
          this.videoModal.auditionLoadingId = '';
          this.videoModal.auditionCache = {};
          this.videoModal.open = false;
        },

        _isVideoReady(contentType) {
          // Content types that can go directly to video generation
          return contentType === 'script_video' || contentType === 'script_writer';
        },

        _isRecreatable(contentType) {
          // Content types that should offer "Open in Creator" instead of Generate Video
          // Excludes: video-ready (has its own button)
          if (!contentType) return true;
          if (contentType === 'script_video' || contentType === 'script_writer') return false;
          return true;
        },

        _recreatorApp(contentType) {
          // Route text-oriented content back to Content Studio; everything else → Script Writer.
          const textTypes = ['text_post', 'article', 'thread', 'post', 'xhs_post'];
          if (contentType && textTypes.includes(contentType)) return '/content-studio.html';
          return '/script-writer.html';
        },

        goRecreate(creation) {
          const p = new URLSearchParams();
          if (creation.offer_id) p.set('offer_id', creation.offer_id);
          p.set('ref_creation_id', creation.id);
          window.location.href = `${this._recreatorApp(creation.content_type)}?${p}`;
        },

        openVideoPlayer(url, poster) {
          this.videoPlayer = { open: true, url, poster: poster || '', downloadUrl: url };
          // Pause any small inline videos
          document.querySelectorAll('.video-modal-body video').forEach(v => v.pause());
        },
        closeVideoPlayer() {
          this.videoPlayer.open = false;
          // Let the <video> unload by clearing URL after transition
          setTimeout(() => { if (!this.videoPlayer.open) this.videoPlayer.url = ''; }, 300);
        },

        // ── B-roll editor helpers ─────────────────────────────────────
        //
        // The AI director writes ``creation.structured_content.broll_plan``
        // when generating the script (see script_composer.py). Here we let
        // users review + tweak that plan before hitting Generate, and add
        // extra shots guided by the rules the composer itself uses:
        //   • retention — at char 0, 5s, visually striking opener
        //   • illustrative — after a concrete noun/beat in the narration,
        //     5-6s, placed so gaps stay ≤ 8-12s of VO
        //   • CTA section (last) — skip B-roll, keep avatar face-to-camera

        _brollNarrationText() {
          // Concatenation order must match the server's rendering so
          // insert_after_char means the same thing on both sides.
          const sc = this.videoModal.creation?.structured_content;
          if (!sc?.sections) return '';
          const order = sc.section_ids || Object.keys(sc.sections);
          return order
            .map(id => (sc.sections[id]?.text || '').trim())
            .filter(Boolean)
            .join('');
        },

        brollTotalNarrationChars() {
          return this._brollNarrationText().length;
        },

        brollContextAt(charPos) {
          // Show a short slice of VO around the insert point so the user
          // sees which line this shot will cut over. ~20 chars radius.
          const text = this._brollNarrationText();
          if (!text) return '';
          const pos = Math.max(0, Math.min(Number(charPos) || 0, text.length));
          const start = Math.max(0, pos - 10);
          const end = Math.min(text.length, pos + 10);
          const pre = text.slice(start, pos);
          const post = text.slice(pos, end);
          return `…${pre}│${post}…`;
        },

        async brollRegeneratePlan() {
          // Ask the server to propose a fresh broll_plan for this creation.
          // Server re-sanitizes + persists, we just repoint the form.
          if (this.brollRegenerating || !this.videoModal.creation?.id) return;
          this.brollRegenerating = true;
          try {
            const r = await fetch(
              `/api/v1/creations/${this.videoModal.creation.id}/regenerate-broll-plan`,
              { method: 'POST' },
            );
            const data = await r.json().catch(() => ({}));
            if (!r.ok) {
              throw new Error(data.detail || data.error || r.statusText);
            }
            this.videoModal.form.broll_plan = (data.broll_plan || [])
              .map(s => ({ ...s }));  // shallow clone per row
            // Also update the in-memory creation so subsequent re-opens see
            // the fresh plan without a full reload.
            if (this.videoModal.creation.structured_content) {
              this.videoModal.creation.structured_content.broll_plan = data.broll_plan;
            }
          } catch (e) {
            toast.error(e.message || String(e));
          } finally {
            this.brollRegenerating = false;
          }
        },

        brollAddShot() {
          // Director heuristic — pick insert_after_char such that the new
          // shot lands in the largest currently-unpadded gap (keeps the
          // 8-12s visual-change rhythm the composer aims for). Ties break
          // toward the earlier gap so openings stay punchy.
          const plan = this.videoModal.form.broll_plan || [];
          const total = this.brollTotalNarrationChars();
          if (!total) {
            // No narration yet — add an empty placeholder at 0
            plan.push({ type: 'illustrative', insert_after_char: 0, duration_seconds: 5, prompt: '' });
            this.videoModal.form.broll_plan = plan;
            return;
          }

          // Reserve the tail (last ~30 chars = CTA) — director rule: no
          // B-roll on CTA. Clamp search range to [0, total - 30].
          const searchEnd = Math.max(0, total - 30);

          // Collect existing positions (clamped) plus boundaries [0, searchEnd].
          const anchors = [0, searchEnd];
          for (const s of plan) {
            const p = Number(s.insert_after_char);
            if (!Number.isFinite(p)) continue;
            if (p >= 0 && p <= searchEnd) anchors.push(p);
          }
          anchors.sort((a, b) => a - b);
          // Dedup
          const uniq = [...new Set(anchors)];

          // Largest gap between consecutive anchors — midpoint wins.
          let bestSpan = -1, bestMid = Math.floor(searchEnd / 2);
          for (let i = 0; i < uniq.length - 1; i++) {
            const span = uniq[i + 1] - uniq[i];
            if (span > bestSpan) {
              bestSpan = span;
              bestMid = Math.round((uniq[i] + uniq[i + 1]) / 2);
            }
          }
          // If everything is crowded (no meaningful gap), default to
          // section-boundary — first uncovered section beginning.
          if (bestSpan < 30) {
            const sc = this.videoModal.creation?.structured_content;
            const order = (sc?.section_ids || Object.keys(sc?.sections || {}));
            let cursor = 0;
            for (const id of order) {
              const text = (sc?.sections?.[id]?.text || '').trim();
              const boundary = cursor;
              cursor += text.length;
              const taken = plan.some(s => Math.abs((s.insert_after_char || 0) - boundary) < 5);
              if (!taken && boundary <= searchEnd) { bestMid = boundary; break; }
            }
          }

          plan.push({
            type: plan.length === 0 ? 'retention' : 'illustrative',
            insert_after_char: plan.length === 0 ? 0 : bestMid,
            duration_seconds: plan.length === 0 ? 5 : 6,
            prompt: '',
          });
          // Re-sort so the UI reads in narration order.
          plan.sort((a, b) => (a.insert_after_char || 0) - (b.insert_after_char || 0));
          this.videoModal.form.broll_plan = plan;
        },

        _extractNarration(creation) {
          // Extract TTS-ready narration from structured_content when available.
          // Uses section_ids for correct order (JSONB doesn't preserve key order).
          // Join with a single newline: Jogg's TTS turns ``\n\n`` into a ~3.5s
          // paragraph pause (audible dead air at hook→body transitions), while
          // ``\n`` produces a normal sentence-break pause (~0.5-1s). Sections
          // already end in punctuation so no speech-flow information is lost.
          const sc = creation.structured_content;
          if (sc && sc.sections && typeof sc.sections === 'object') {
            const order = sc.section_ids || Object.keys(sc.sections);
            const lines = order
              .map(id => sc.sections[id])
              .filter(Boolean)
              .map(s => (s.text || '').trim())
              .filter(Boolean);
            if (lines.length) return lines.join('\n');
          }
          return creation.content || '';
        },

        pickDefaultProvider(text) {
          // Smart default by Chinese-character ratio:
          //   ≥ 30% Chinese → prefer chanjing if active
          //   otherwise   → prefer jogg if active
          //   else fall back to first active
          const providers = this.videoModal.providers;
          if (providers.length === 1) return providers[0];
          const sample = (text || '').slice(0, 500);
          if (!sample) return providers[0];
          const cn = (sample.match(/[\u4e00-\u9fff]/g) || []).length;
          const ratio = cn / sample.length;
          const preferred = ratio >= 0.3 ? 'chanjing' : 'jogg';
          return providers.find(p => p.provider === preferred) || providers[0];
        },

        async onProviderChange(configId, options = {}) {
          const m = this.videoModal;
          m.selectedProviderId = configId;
          m.avatars = [];
          m.voices = [];
          m.listsError = '';
          m.form.avatar_id = '';
          m.form.voice_id = '';

          const cfg = m.providers.find(p => p.id === configId);
          if (!cfg) return;

          // Pre-fill aspect_ratio from provider defaults
          if (cfg.defaults && cfg.defaults.aspect_ratio) {
            m.form.aspect_ratio = cfg.defaults.aspect_ratio;
          }

          // ── Cache layer (localStorage, 12h TTL) ──
          // Avatar/voice lists rarely change on the provider side; caching
          // them avoids 1-2s of latency every time the user opens the modal,
          // and saves Chanjing access_token API calls. Bust on demand via the
          // refresh button (options.force = true).
          const cacheKey = `od_video_lists:${configId}`;
          const CACHE_TTL_MS = 12 * 60 * 60 * 1000;  // 12h
          if (!options.force) {
            try {
              const cached = JSON.parse(localStorage.getItem(cacheKey) || 'null');
              if (cached && (Date.now() - cached.ts) < CACHE_TTL_MS) {
                m.avatars = cached.avatars || [];
                m.voices = cached.voices || [];
                this._applyDefaultsForProvider(cfg);
                return;  // skip the network entirely
              }
            } catch (e) { /* corrupt cache, fall through to fetch */ }
          }

          m.listsLoading = true;
          try {
            const [ar, vr] = await Promise.all([
              fetch(`/api/v1/media-providers/${configId}/avatars?page=1&page_size=100`),
              fetch(`/api/v1/media-providers/${configId}/voices?page=1&page_size=100`),
            ]);
            if (!ar.ok) throw new Error('avatars: ' + (await ar.text()));
            if (!vr.ok) throw new Error('voices: ' + (await vr.text()));
            m.avatars = await ar.json();
            m.voices = await vr.json();

            // Persist to cache
            try {
              localStorage.setItem(cacheKey, JSON.stringify({
                ts: Date.now(),
                avatars: m.avatars,
                voices: m.voices,
              }));
            } catch (e) { /* localStorage full or disabled — non-fatal */ }

            this._applyDefaultsForProvider(cfg);
          } catch (e) {
            m.listsError = t('vg_lists_load_failed') + e.message;
          } finally {
            m.listsLoading = false;
          }
        },

        _applyDefaultsForProvider(cfg) {
          // Pick the default avatar + voice from the provider config (or first
          // item from the deduped list). Shared between cache-hit and
          // fresh-fetch paths so behavior is identical.
          const m = this.videoModal;
          const avatars = this.uniqueAvatars;
          const voices = this.uniqueVoices;

          const dAv = (cfg.defaults && cfg.defaults.avatar_id) || '';
          const avatar = avatars.find(a => a.id === dAv) || avatars[0] || null;
          m.form.avatar_id = avatar ? avatar.id : '';

          const dVo = (cfg.defaults && cfg.defaults.voice_id) || '';
          let voice = voices.find(v => v.id === dVo) || null;
          if (!voice && avatar) voice = this.pickBestVoiceFor(avatar);
          if (!voice) voice = voices[0] || null;
          m.form.voice_id = voice ? voice.id : '';
        },

        async refreshProviderLists() {
          // Manual cache bust: force a fresh fetch for the current provider.
          if (!this.videoModal.selectedProviderId) return;
          await this.onProviderChange(this.videoModal.selectedProviderId, { force: true });
        },

        selectAvatar(a) {
          this.videoModal.form.avatar_id = a.id;
          // Auto-rematch voice unless the user explicitly picked one that's
          // still a strong match. Always re-pick by best score on avatar change
          // — simpler mental model.
          const best = this.pickBestVoiceFor(a);
          if (best) this.videoModal.form.voice_id = best.id;
        },

        async auditionVoice(voice) {
          // Audition the given voice using the first 20 chars of the script.
          // Calls the backend TTS endpoint, caches the resulting audio URL per
          // voice for the lifetime of the modal session.
          const m = this.videoModal;
          const v = voice || this.selectedVoice;
          if (!v || !v.id) return;

          const audio = this.$refs.auditionAudio;
          if (!audio) return;

          // If clicking the currently-playing voice, stop it
          if (m.auditionPlayingId === v.id) {
            audio.pause();
            audio.currentTime = 0;
            m.auditionPlayingId = '';
            return;
          }

          // Stop any other playing voice
          if (m.auditionPlayingId) {
            audio.pause();
            audio.currentTime = 0;
            m.auditionPlayingId = '';
          }

          // Cached?
          let url = m.auditionCache[v.id];
          if (!url) {
            const text = this.auditionPreviewText;
            if (!text) {
              // Defensive: button should already be disabled when script is
              // empty, but in case it isn't, fail silently rather than alert.
              return;
            }
            m.auditionLoadingId = v.id;
            try {
              const r = await fetch(
                `/api/v1/media-providers/${m.selectedProviderId}/voices/${encodeURIComponent(v.id)}/preview`,
                {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ text }),
                }
              );
              if (!r.ok) {
                const d = await r.json().catch(() => ({}));
                throw new Error(d.error?.message || d.detail || r.statusText);
              }
              const data = await r.json();
              url = data.audio_url;
              if (!url) throw new Error('No audio URL returned');
              m.auditionCache[v.id] = url;
            } catch (e) {
              toast.error(t('vg_audition_failed') + (e.message || String(e)));
              return;
            } finally {
              m.auditionLoadingId = '';
            }
          }

          audio.src = url;
          try {
            await audio.play();
            m.auditionPlayingId = v.id;
          } catch (e) {
            console.warn('audio play failed', e);
          }
        },

        async submitVideo() {
          const m = this.videoModal;
          if (!this.canSubmitVideo) return;
          m.submitting = true;
          m.submitError = '';
          try {
            const avatar = this.selectedAvatar;
            const body = {
              provider_config_id: m.selectedProviderId,
              avatar_id: m.form.avatar_id,
              voice_id: m.form.voice_id,
              script: m.form.script,
              aspect_ratio: m.form.aspect_ratio,
              caption: m.form.caption,
              subtitle_style: m.form.subtitle_style || 'classic',
              subtitle_color: m.form.subtitle_color || undefined,
              subtitle_stroke: m.form.subtitle_stroke || undefined,
              broll: m.form.broll || false,
              // Send the edited plan when broll is enabled; service falls
              // back to creation.structured_content.broll_plan otherwise.
              ...(m.form.broll && Array.isArray(m.form.broll_plan) && m.form.broll_plan.length
                ? { broll_plan: m.form.broll_plan }
                : {}),
              name: this.videoModal.creation?.title || null,
              provider_extras: (avatar && avatar.extras) || {},
            };
            const r = await fetch(`/api/v1/creations/${this.videoModal.creation.id}/videos`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(body),
            });
            if (!r.ok) {
              const d = await r.json().catch(() => ({}));
              throw new Error(d.error?.message || d.detail || r.statusText);
            }
            const job = await r.json();
            // Add to top of jobs list and start polling
            m.jobs = [job, ...m.jobs];
            this.startPolling(job.id);

            // ── UX feedback: make sure user SEES the new job ──
            // 1. Auto-expand the past videos section
            m.pastVideosExpanded = true;
            // 2. Brief highlight on the new job (clears after 2s)
            m.flashJobId = job.id;
            setTimeout(() => {
              if (m.flashJobId === job.id) m.flashJobId = '';
            }, 2000);
            // 3. Smooth-scroll the modal body to top (history is now at the top)
            // Use setTimeout to wait for x-collapse expansion animation (~300ms)
            setTimeout(() => {
              const body = this.$refs.videoModalBody;
              if (body) body.scrollTo({ top: 0, behavior: 'smooth' });
            }, 350);
          } catch (e) {
            m.submitError = e.message || String(e);
          } finally {
            m.submitting = false;
          }
        },

        startPolling(jobId) {
          if (this.videoModal.pollTimers[jobId]) return;
          const tick = async () => {
            try {
              const r = await fetch(`/api/v1/videos/${jobId}`);
              if (!r.ok) return;
              const updated = await r.json();
              const idx = this.videoModal.jobs.findIndex(j => j.id === jobId);
              if (idx >= 0) {
                this.videoModal.jobs[idx] = updated;
              }
              if (updated.status === 'completed' || updated.status === 'failed') {
                this.stopPolling(jobId);
              }
            } catch (e) {
              console.warn('poll failed', e);
            }
          };
          // Run once immediately, then every 5s
          tick();
          this.videoModal.pollTimers[jobId] = setInterval(tick, 5000);
        },

        stopPolling(jobId) {
          const timerId = this.videoModal.pollTimers[jobId];
          if (timerId) {
            clearInterval(timerId);
            delete this.videoModal.pollTimers[jobId];
          }
        },

        async deleteVideoJob(job) {
          if (!confirm(t('vg_confirm_delete_job'))) return;
          try {
            const r = await fetch(`/api/v1/videos/${job.id}`, { method: 'DELETE' });
            if (r.ok || r.status === 204) {
              this.stopPolling(job.id);
              this.videoModal.jobs = this.videoModal.jobs.filter(j => j.id !== job.id);
            }
          } catch (e) { console.error(e); }
        },
      };
    }
  </script>
</body>
</html>
