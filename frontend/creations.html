<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenLucid</title>
  <script>
    document.documentElement.style.display='none';
    fetch('/api/v1/auth/me').then(r=>{
      if(!r.ok) fetch('/api/v1/auth/setup-status').then(r=>r.json()).then(s=>{
        location.href=s.needs_setup?'/install.html':'/signin.html';
      });
      else document.documentElement.style.display='';
    });
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: {
        sidebar: { DEFAULT: '#1C1C28', hover: '#2A2A3C' },
        accent: { DEFAULT: '#155EEF', light: '#EFF4FF', hover: '#1849C6' },
      }}}
    }
  </script>
  <script src="/js/i18n.js"></script>
  <script src="/js/pinned-apps.js"></script>
  <script src="/js/avatar.js"></script>
  <script src="/js/feedback.js"></script>
  <script src="/js/shared.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
  <style>
    [x-cloak]{display:none!important}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',sans-serif}
    .sidebar-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;color:#A0A0B0;font-size:14px;cursor:pointer;transition:all .15s}
    .sidebar-item:hover{background:#2A2A3C;color:#E0E0EE}
    .sidebar-item.active{background:#2D2D40;color:#fff}
    /* source badges now use shared .od-chip tokens (see js/shared.js) */
  </style>
</head>
<body class="bg-gray-50 h-screen flex overflow-hidden" x-data="creationsPage()" x-init="init()">

  <!-- Sidebar -->
  <aside class="w-56 bg-sidebar flex flex-col shrink-0">
    <div class="px-4 py-5 flex items-center gap-2.5">
      <img src="/images/logo.png" alt="OpenLucid" class="w-8 h-8 rounded-lg">
      <span class="text-white font-semibold text-base">OpenLucid</span>
    </div>
    <nav class="flex-1 px-3 space-y-1 mt-2">
      <a href="/" class="sidebar-item">
        <svg class="w-[18px] h-[18px]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
        <span x-text="t('sidebar_offers')"></span>
      </a>
      <a href="/brandkit-list.html" class="sidebar-item">
        <svg class="w-[18px] h-[18px]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.657-1.657a2 2 0 012.828 0l2.829 2.829a2 2 0 010 2.828l-8.486 8.485M7 17h.01"/></svg>
        <span x-text="t('sidebar_brandkit')"></span>
      </a>
      <a href="/creations.html" class="sidebar-item active">
        <svg class="w-[18px] h-[18px]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>
        <span x-text="t('sidebar_creations')"></span>
      </a>
      <a href="/video-studio.html" class="sidebar-item">
        <svg class="w-[18px] h-[18px]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
        <span x-text="t('sidebar_videos')"></span>
      </a>
    </nav>
    <div class="px-3 pb-3 mt-auto">
      <div class="text-[10px] text-white/25 text-center">Powered by <a href="https://openlucid.ai/?ref=app" target="_blank" class="hover:text-white/40 transition-colors">OpenLucid</a></div>
    </div>
  </aside>

  <!-- Main -->
  <div class="flex-1 flex flex-col overflow-hidden">
    <header class="h-14 bg-white border-b flex items-center justify-between px-6 shrink-0">
      <h1 class="text-base font-semibold text-gray-800">📚 <span x-text="t('creations_title')"></span></h1>
      <div class="flex items-center gap-3">
        <a href="/setting.html?section=mcp" class="inline-flex items-center gap-1.5 text-xs font-medium text-gray-500 hover:text-gray-700 border border-gray-200 hover:border-gray-300 px-2.5 py-1.5 rounded-lg transition-colors">
          <span class="w-1.5 h-1.5 bg-green-400 rounded-full"></span>
          MCP
        </a>
        <div id="avatar-mount"></div>
      </div>
    </header>

    <main class="flex-1 overflow-y-auto p-6">
      <!-- Toolbar -->
      <div class="bg-white rounded-xl border p-4 mb-4 flex items-center gap-3 flex-wrap">
        <div class="flex-1 min-w-[240px]">
          <div class="relative">
            <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            <input x-model="searchQ" @input.debounce.300ms="reload()"
                   type="text" :placeholder="t('creations_search_placeholder')"
                   class="w-full pl-9 pr-3 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-accent/20 focus:border-accent">
          </div>
        </div>
        <!-- Source filter — dynamically pruned to sources that
             actually have creations in the user's scope. The previous
             static list (every theoretically-possible app + mcp:* +
             manual) padded the dropdown with dead options that
             returned empty results when picked. ``visibleSourceOptions``
             intersects the known apps with /creations/source-counts;
             only sources with count > 0 render, with the count shown
             next to the label so the user can see scale at a glance. -->
        <select x-model="filterSource" @change="reload()"
                class="text-sm border border-gray-200 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-accent/20 focus:border-accent">
          <option value="" x-text="t('creations_all_sources') + (totalSourceCount > 0 ? ' (' + totalSourceCount + ')' : '')"></option>
          <template x-for="opt in visibleSourceOptions" :key="opt.value">
            <option :value="opt.value" x-text="opt.label + ' (' + opt.count + ')'"></option>
          </template>
        </select>
        <!-- Offer filter — populated from /creations/offer-counts so
             only offers that actually have creations appear. Default
             empty = all offers. -->
        <select x-show="offerCounts.length > 0"
                x-cloak
                x-model="filterOffer" @change="reload()"
                class="text-sm border border-gray-200 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-accent/20 focus:border-accent">
          <option value="" x-text="t('creations_all_offers')"></option>
          <template x-for="o in offerCounts" :key="o.offer_id">
            <option :value="o.offer_id" x-text="o.name + ' (' + o.count + ')'"></option>
          </template>
        </select>
        <!-- Clear-filters shortcut — shown only when any filter is active. -->
        <button x-show="searchQ || filterSource || filterOffer"
                x-cloak
                @click="searchQ = ''; filterSource = ''; filterOffer = ''; reload()"
                class="inline-flex items-center gap-1 text-xs text-gray-500 hover:text-accent transition-colors px-2 py-2">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
          <span x-text="t('creations_filters_clear')"></span>
        </button>
      </div>

      <!-- Loading / Empty -->
      <div x-show="loading" class="text-center py-12 text-gray-400 text-sm" x-text="t('loading')"></div>
      <!-- Empty state — compact one-liner with inline CTAs. -->
      <div x-show="!loading && items.length === 0" class="bg-white rounded-xl border border-dashed border-gray-200 py-10 px-6 text-center">
        <div class="text-3xl mb-2">✨</div>
        <h3 class="text-base font-semibold text-gray-800 mb-1" x-text="t('creations_empty_cta_title')"></h3>
        <p class="text-xs text-gray-400 mb-5" x-text="t('creations_empty_cta_hint')"></p>
        <div class="flex gap-2 justify-center flex-wrap">
          <a href="/script-writer.html"
             class="inline-flex items-center gap-1.5 bg-white border border-gray-200 hover:border-accent hover:text-accent text-gray-700 rounded-lg px-3.5 py-2 text-sm font-medium transition-colors">
            <span>🎬</span>
            <span x-text="t('creations_empty_cta_video')"></span>
          </a>
          <a href="/content-studio.html"
             class="inline-flex items-center gap-1.5 bg-white border border-gray-200 hover:border-accent hover:text-accent text-gray-700 rounded-lg px-3.5 py-2 text-sm font-medium transition-colors">
            <span>📝</span>
            <span x-text="t('creations_empty_cta_text')"></span>
          </a>
        </div>
      </div>

      <!-- List -->
      <div x-show="!loading && items.length > 0" class="space-y-2">
        <template x-for="c in items" :key="c.id">
          <div :data-creation-id="c.id"
               class="bg-white rounded-xl border hover:shadow-sm transition-all"
               :class="flashCreationId === c.id ? 'ring-2 ring-accent/40 bg-accent/5' : ''">
            <div class="p-4 cursor-pointer" @click="openDetail(c)">
              <div class="flex items-start gap-3">
                <div class="flex-1 min-w-0">
                  <div class="flex items-center gap-2 mb-1 flex-wrap">
                    <!-- Offer chip — placed first because Offer is the
                         strongest mental anchor for "what is this
                         creation about". Click to filter the list to
                         only that offer. -->
                    <button type="button"
                            x-show="c.offer_id"
                            @click.stop="filterOffer = c.offer_id; reload()"
                            class="od-chip od-chip-violet hover:ring-1 hover:ring-violet-300 transition-shadow"
                            :title="t('creations_filter_by_offer')"
                            x-text="offerName(c.offer_id)"></button>
                    <span class="od-chip od-chip-neutral" x-text="c.content_type"></span>
                    <span class="od-chip"
                          :class="c.source_app === 'mcp:external' ? 'od-chip-primary' : (c.source_app === 'manual' ? 'od-chip-neutral' : 'od-chip-success')"
                          x-text="c.source_app"></span>
                    <template x-for="tag in (c.tags || [])">
                      <span class="od-chip od-chip-info" x-text="tag"></span>
                    </template>
                  </div>
                  <h3 class="text-[15px] font-semibold text-gray-800 leading-snug" x-text="c.title"></h3>
                  <p class="text-[13px] text-gray-500 mt-1 line-clamp-2" x-text="c.content"></p>
                  <p x-show="c.source_note" class="text-[11px] text-gray-400 mt-1.5 italic" x-text="c.source_note"></p>
                </div>

                <!-- Video badge: latest cover thumbnail + count, click → open modal with history pre-expanded -->
                <template x-if="c.video_count > 0">
                  <button @click.stop="openVideoModal(c, { openHistory: true })"
                          :title="t('vg_badge_tooltip').replace('{n}', c.video_count)"
                          class="shrink-0 group relative w-20 h-12 rounded-lg overflow-hidden bg-gray-100 border border-gray-200 hover:border-accent transition-colors">
                    <!-- Latest cover image -->
                    <img x-show="c.latest_video && c.latest_video.cover_url"
                         :src="c.latest_video && c.latest_video.cover_url"
                         class="absolute inset-0 w-full h-full object-cover"
                         loading="lazy"
                         @error="$event.target.style.display='none'">
                    <!-- Fallback / status overlay -->
                    <div class="absolute inset-0 flex items-center justify-center"
                         x-show="!(c.latest_video && c.latest_video.cover_url) || (c.latest_video && c.latest_video.status !== 'completed')">
                      <template x-if="c.latest_video && c.latest_video.status === 'processing'">
                        <svg class="w-4 h-4 text-blue-400 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/></svg>
                      </template>
                      <template x-if="c.latest_video && c.latest_video.status === 'failed'">
                        <svg class="w-4 h-4 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                      </template>
                      <template x-if="!c.latest_video || c.latest_video.status === 'pending'">
                        <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
                      </template>
                    </div>
                    <!-- Count chip -->
                    <span class="absolute bottom-0.5 right-0.5 text-[9px] font-semibold px-1 py-0.5 rounded bg-gray-900/70 text-white backdrop-blur-sm"
                          x-text="'🎬 ' + c.video_count"></span>
                    <!-- Play overlay on hover (completed only) -->
                    <div x-show="c.latest_video && c.latest_video.status === 'completed'"
                         class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                      <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    </div>
                  </button>
                </template>

                <!-- Single-row meta column: date + actions inline (was 2 stacked rows). -->
                <div class="flex items-center gap-2 shrink-0 self-start">
                  <span class="text-[11px] text-gray-400 tabular-nums hidden sm:inline"
                        x-text="new Date(c.created_at).toLocaleDateString()"></span>
                  <!-- Generate Video: only for video-ready scripts, and only when no videos yet
                       (once c.video_count > 0 the thumbnail is the single entry point to the same modal). -->
                  <button x-show="_isVideoReady(c.content_type) && !c.video_count"
                          @click.stop="openVideoModal(c)"
                          class="inline-flex items-center gap-1 text-[11px] font-medium text-accent border border-accent/30 hover:bg-accent/5 rounded-md px-2 py-1 transition-colors"
                          :title="t('vg_button_tooltip')">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
                    <span x-text="t('vg_button')"></span>
                  </button>
                  <!-- Open in Creator: for non-video-ready content -->
                  <button x-show="_isRecreatable(c.content_type)"
                          @click.stop="goRecreate(c)"
                          class="inline-flex items-center gap-1 text-[11px] font-medium text-gray-500 border border-gray-200 hover:bg-gray-50 rounded-md px-2 py-1 transition-colors"
                          :title="t('recreate_tooltip')">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
                    <span x-text="t('recreate_btn')"></span>
                  </button>
                  <button @click.stop="confirmDelete(c)"
                          class="text-gray-300 hover:text-red-500 transition-colors p-1"
                          :title="t('btn_delete')">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                  </button>
                </div>
              </div>
            </div>
          </div>
        </template>
      </div>

      <!-- Pagination -->
      <div x-show="!loading && total > pageSize" class="mt-4 flex items-center justify-center gap-2 text-sm">
        <button @click="page--; reload()" :disabled="page <= 1"
                class="px-3 py-1.5 rounded-lg border border-gray-200 disabled:opacity-30 hover:bg-gray-50">←</button>
        <span class="text-gray-500" x-text="`${page} / ${Math.ceil(total / pageSize)}`"></span>
        <button @click="page++; reload()" :disabled="page * pageSize >= total"
                class="px-3 py-1.5 rounded-lg border border-gray-200 disabled:opacity-30 hover:bg-gray-50">→</button>
      </div>
    </main>
  </div>

  <!-- Detail / Edit Modal -->
  <div x-show="modal.open" x-cloak
       class="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center p-4"
       @click="closeModal()">
    <div class="bg-white rounded-2xl shadow-2xl max-w-2xl w-full max-h-[85vh] flex flex-col" @click.stop>
      <div class="p-5 border-b flex items-center justify-between shrink-0">
        <div class="flex items-center gap-2">
          <span class="text-xs px-2 py-0.5 bg-gray-100 text-gray-600 rounded font-medium" x-text="modal.data.content_type || 'general'"></span>
          <h2 class="text-base font-semibold text-gray-800" x-text="modal.mode === 'new' ? t('creations_new_title') : t('creations_edit_title')"></h2>
        </div>
        <button @click="closeModal()" class="text-gray-400 hover:text-gray-600">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="p-5 overflow-y-auto flex-1 space-y-4">
        <div>
          <label class="block text-xs font-medium text-gray-500 mb-1" x-text="t('creations_field_title')"></label>
          <input x-model="modal.data.title" type="text" maxlength="512"
                 class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-accent/20 focus:border-accent">
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-500 mb-1" x-text="t('creations_field_content')"></label>
          <textarea x-model="modal.data.content" rows="10"
                    class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm font-mono leading-relaxed focus:outline-none focus:ring-2 focus:ring-accent/20 focus:border-accent"></textarea>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-medium text-gray-500 mb-1" x-text="t('creations_field_type')"></label>
            <select x-model="modal.data.content_type"
                    class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-accent/20 focus:border-accent">
              <option value="general" x-text="t('creations_type_general')"></option>
              <option value="topic" x-text="t('creations_type_topic')"></option>
              <option value="post" x-text="t('creations_type_post')"></option>
              <option value="script" x-text="t('creations_type_script')"></option>
              <option value="email" x-text="t('creations_type_email')"></option>
              <option value="caption" x-text="t('creations_type_caption')"></option>
              <option value="hook" x-text="t('creations_type_hook')"></option>
            </select>
          </div>
          <div>
            <label class="block text-xs font-medium text-gray-500 mb-1" x-text="t('creations_field_tags')"></label>
            <input x-model="modal.tagsText" type="text" placeholder="tiktok, launch, hook"
                   class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-accent/20 focus:border-accent">
          </div>
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-500 mb-1" x-text="t('creations_field_note')"></label>
          <input x-model="modal.data.source_note" type="text"
                 class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-accent/20 focus:border-accent">
        </div>
      </div>
      <div class="p-4 border-t flex items-center justify-between shrink-0">
        <div class="text-[11px] text-gray-400">
          <span x-show="modal.mode === 'edit'" x-text="modal.data.source_app + ' · ' + (modal.data.created_at ? new Date(modal.data.created_at).toLocaleString() : '')"></span>
        </div>
        <div class="flex items-center gap-2">
          <button @click="closeModal()" class="px-4 py-2 text-sm text-gray-600 hover:bg-gray-50 rounded-lg" x-text="t('btn_cancel')"></button>
          <button @click="save()" :disabled="modal.saving || !modal.data.title || !modal.data.content"
                  class="px-4 py-2 text-sm bg-accent text-white rounded-lg hover:bg-accent-hover disabled:opacity-50">
            <span x-text="modal.saving ? t('saving') : t('btn_save')"></span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Generate Video Modal -->
  <div x-show="videoModal.open" x-cloak
       class="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl max-w-3xl w-full max-h-[90vh] flex flex-col">

      <!-- Header -->
      <div class="p-5 border-b flex items-center justify-between shrink-0">
        <div class="min-w-0">
          <h2 class="text-base font-semibold text-gray-800 flex items-center gap-2">
            <svg class="w-5 h-5 text-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
            <span x-text="t('vg_modal_title')"></span>
          </h2>
          <p class="text-xs text-gray-500 mt-0.5 truncate" x-text="videoModal.creation?.title || ''"></p>
        </div>
        <button @click="closeVideoModal()" class="text-gray-400 hover:text-gray-600">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>

      <!-- Body -->
      <div class="p-5 overflow-y-auto flex-1 space-y-5" x-ref="videoModalBody">

        <!-- No providers configured -->
        <div x-show="!videoModal.providersLoading && videoModal.providers.length === 0"
             class="bg-amber-50 border border-amber-200 rounded-xl p-4">
          <p class="text-sm text-amber-800 mb-2" x-text="t('vg_no_providers_title')"></p>
          <p class="text-xs text-amber-700 mb-3" x-text="t('vg_no_providers_hint')"></p>
          <a href="/setting.html?section=media-providers"
             class="inline-flex items-center gap-1.5 bg-amber-600 text-white px-3 py-1.5 rounded-lg text-xs font-medium hover:bg-amber-700 transition-colors">
            <span x-text="t('vg_no_providers_cta')"></span> →
          </a>
        </div>

        <!-- ── Videos (shown first when there are results) ── -->
        <div x-show="videoModal.jobs.length > 0" class="mb-5 pb-4 border-b border-gray-100">
          <button type="button" @click="videoModal.pastVideosExpanded = !videoModal.pastVideosExpanded"
                  class="w-full flex items-center justify-between text-left hover:bg-gray-50 -mx-2 px-2 py-1.5 rounded-lg transition-colors">
            <div class="flex items-center gap-2">
              <svg class="w-3.5 h-3.5 text-gray-400 transition-transform"
                   :class="videoModal.pastVideosExpanded ? 'rotate-90' : ''"
                   fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"/>
              </svg>
              <span class="text-[11px] font-semibold uppercase tracking-wider text-gray-400"
                    x-text="t('vg_existing_videos') + ' (' + videoModal.jobs.length + ')'"></span>
              <span x-show="activeJobsCount > 0"
                    class="inline-flex items-center gap-1 text-[10px] font-medium text-amber-700 bg-amber-50 px-2 py-0.5 rounded-full">
                <svg class="w-2.5 h-2.5 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/></svg>
                <span x-text="t('vg_jobs_in_progress').replace('{n}', activeJobsCount)"></span>
              </span>
            </div>
          </button>

          <div x-show="videoModal.pastVideosExpanded" x-collapse class="space-y-3 mt-3" x-ref="pastVideosContainer">
            <!-- Show latest 3 by default; "show all" expands the rest -->
            <template x-for="(job, idx) in videoModal.jobs" :key="job.id">
              <template x-if="idx < 3 || videoModal.showAllJobs">
              <template x-if="job.status !== 'failed'">
              <div class="rounded-xl p-3 transition-all duration-500"
                   :class="videoModal.flashJobId === job.id ? 'bg-amber-50 ring-2 ring-amber-300' : 'bg-gray-50'">
                <div class="flex items-start gap-3">
                  <div class="w-32 h-20 bg-gray-200 rounded-lg overflow-hidden shrink-0 relative cursor-pointer group/thumb"
                       @click="job.status === 'completed' && job.video_url && openVideoPlayer(job.video_url, job.cover_url)">
                    <template x-if="job.status === 'completed' && job.video_url">
                      <div class="relative w-full h-full">
                        <img :src="job.cover_url || ''" class="w-full h-full object-cover" alt="">
                        <div class="absolute inset-0 flex items-center justify-center bg-black/20 group-hover/thumb:bg-black/40 transition-colors">
                          <svg class="w-8 h-8 text-white drop-shadow-lg" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                        </div>
                      </div>
                    </template>
                    <template x-if="job.status !== 'completed'">
                      <div class="w-full h-full flex items-center justify-center text-gray-400">
                        <svg class="w-6 h-6 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/></svg>
                      </div>
                    </template>
                  </div>
                  <div class="flex-1 min-w-0">
                    <div class="flex items-center gap-2 mb-1 flex-wrap">
                      <span class="text-[11px] font-medium px-2 py-0.5 rounded-full"
                            :class="{
                              'bg-gray-200 text-gray-600': job.status === 'pending',
                              'bg-blue-100 text-blue-700': job.status === 'processing',
                              'bg-green-100 text-green-700': job.status === 'completed',
                            }"
                            x-text="t('vg_status_' + job.status)"></span>
                      <span class="text-[11px] text-gray-400" x-text="job.provider"></span>
                      <span x-show="job.progress != null" class="text-[11px] text-gray-400" x-text="`${job.progress}%`"></span>
                      <span x-show="job.duration_seconds" class="text-[11px] text-gray-400" x-text="`${job.duration_seconds}s`"></span>
                      <span x-show="job.created_at" class="text-[11px] text-gray-400"
                            :title="new Date(job.created_at).toLocaleString()"
                            x-text="formatRelative(job.created_at)"></span>
                    </div>
                    <div class="flex items-center gap-3 mt-2">
                      <a x-show="job.status === 'completed' && job.video_url"
                         :href="job.video_url" target="_blank" rel="noopener" download
                         class="text-[11px] font-medium text-accent hover:underline">
                        <span x-text="t('vg_download')"></span> ↓
                      </a>
                      <button @click="deleteVideoJob(job)"
                              class="text-[11px] text-gray-400 hover:text-red-500 transition-colors">
                        <span x-text="t('vg_delete_job')"></span>
                      </button>
                    </div>
                  </div>
                </div>
              </div>
              </template>
              <!-- Failed job — compact single-row by default, expandable
                   for full error + B-roll warning details. Without this
                   collapse, a single failed entry could occupy 3-4× the
                   vertical space of a successful one (long error
                   strings + amber B-roll alert block + raw per-shot
                   dump). Progressive-disclosure pattern: show only the
                   cause summary; everything else is one click away. -->
              <template x-if="job.status === 'failed'">
              <div x-data="{ expanded: false }"
                   class="rounded-xl bg-red-50/40 border border-red-100/70 transition-colors"
                   :class="videoModal.flashJobId === job.id ? 'bg-amber-50 ring-2 ring-amber-300 border-transparent' : ''">
                <div class="flex items-center gap-2 px-3 py-2">
                  <!-- Toggle: red dot + caption + truncated error.
                       Sibling-of-delete (not parent) so we don't
                       violate HTML5 button-nesting rules. -->
                  <button type="button"
                          @click="expanded = !expanded"
                          :aria-expanded="expanded"
                          class="flex items-center gap-2 flex-1 min-w-0 text-left rounded focus:outline-none focus:ring-2 focus:ring-red-200/60">
                    <span class="w-2 h-2 rounded-full bg-red-500 shrink-0" aria-hidden="true"></span>
                    <span class="text-[11px] font-semibold text-red-700 shrink-0" x-text="t('vg_status_failed')"></span>
                    <span class="text-[11px] text-gray-300 shrink-0">·</span>
                    <span class="text-[11px] text-gray-500 shrink-0" x-text="job.provider"></span>
                    <span class="text-[11px] text-gray-300 shrink-0" x-show="job.created_at">·</span>
                    <span class="text-[11px] text-gray-500 shrink-0"
                          :title="new Date(job.created_at).toLocaleString()"
                          x-text="formatRelative(job.created_at)" x-show="job.created_at"></span>
                    <span class="text-[11px] text-gray-700 truncate flex-1 min-w-0"
                          x-text="job.error_message || t('vg_status_failed')"></span>
                    <svg class="w-3.5 h-3.5 text-gray-400 transition-transform shrink-0"
                         :class="expanded ? 'rotate-180' : ''"
                         fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                    </svg>
                  </button>
                  <button type="button"
                          @click="deleteVideoJob(job)"
                          class="shrink-0 text-gray-400 hover:text-red-500 transition-colors p-1 -m-1 rounded"
                          :aria-label="t('vg_delete_job')"
                          :title="t('vg_delete_job')">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                  </button>
                </div>
                <div x-show="expanded" x-cloak
                     x-transition:enter="transition ease-out duration-200"
                     x-transition:enter-start="opacity-0 -translate-y-1"
                     x-transition:enter-end="opacity-100 translate-y-0"
                     class="px-3 pb-3 pt-1 space-y-2 border-t border-red-100/70">
                  <p x-show="job.error_message" class="text-[11px] text-red-700 break-words leading-relaxed" x-text="job.error_message"></p>
                  <!-- B-roll warnings — same content as before, just
                       only mounted when the user opens the row. -->
                  <div x-show="job.params && Array.isArray(job.params.broll_warnings) && job.params.broll_warnings.length > 0"
                       role="alert" aria-live="polite"
                       class="rounded-lg border bg-amber-50 border-amber-200 text-amber-900 px-3 py-2.5">
                    <div class="flex items-start gap-2">
                      <svg class="w-4 h-4 shrink-0 mt-0.5 text-amber-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M5 19h14a2 2 0 001.84-2.75L13.74 4a2 2 0 00-3.48 0L3.16 16.25A2 2 0 005 19z"/></svg>
                      <div class="min-w-0 flex-1">
                        <div class="flex items-center gap-1.5 flex-wrap text-[12px] font-semibold">
                          <span x-text="job.params?.broll_status === 'all_failed' || job.params?.broll_status === 'failed_strict' ? t('vg_broll_warn_all_failed') : t('vg_broll_warn_partial')"></span>
                          <span class="text-amber-700/70 font-normal text-[11px]">
                            <span x-text="(job.params?.broll_warnings?.length || 0)"></span><span class="opacity-50"> shot</span><span x-show="(job.params?.broll_warnings?.length || 0) !== 1" class="opacity-50">s</span>
                            <span x-show="job.params?.broll_warning_provider">· <span x-text="job.params.broll_warning_provider"></span></span>
                          </span>
                        </div>
                        <ul class="mt-1 space-y-1 text-[12px] leading-snug">
                          <template x-for="(group, ci) in groupBrollWarnings(job.params.broll_warnings)" :key="ci">
                            <li class="flex items-start gap-1.5">
                              <span x-show="group.shots.length > 1"
                                    class="shrink-0 inline-flex items-center justify-center min-w-[1.25rem] h-[1rem] px-1 rounded bg-amber-200/70 text-amber-900 text-[10px] font-mono tabular-nums"
                                    x-text="'×' + group.shots.length"></span>
                              <span x-show="group.shots.length === 1"
                                    class="shrink-0 text-[10px] text-amber-700/60 font-mono tabular-nums pt-px"
                                    x-text="'#' + (group.shots[0] + 1)"></span>
                              <span class="break-words" x-text="group.error"></span>
                            </li>
                          </template>
                        </ul>
                        <details class="mt-1.5 group/det" x-show="(job.params?.broll_warnings?.length || 0) > 1">
                          <summary class="cursor-pointer select-none text-[11px] text-amber-800/70 hover:text-amber-900 inline-flex items-center gap-1">
                            <svg class="w-3 h-3 transition-transform group-open/det:rotate-90" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
                            <span x-text="t('vg_broll_warn_show_details')"></span>
                          </summary>
                          <ul class="mt-1.5 space-y-0.5 text-[11px] text-amber-800/90">
                            <template x-for="w in (job.params.broll_warnings || [])" :key="w.idx">
                              <li class="break-words font-mono leading-snug"><span class="opacity-60" x-text="'#' + ((w.idx || 0) + 1) + ' '"></span><span x-text="w.error"></span></li>
                            </template>
                          </ul>
                        </details>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
              </template>
              </template>
            </template>
            <!-- Show more / show less toggle -->
            <button x-show="videoModal.jobs.length > 3"
                    @click="videoModal.showAllJobs = !videoModal.showAllJobs"
                    type="button"
                    class="w-full text-center py-1.5 text-[11px] text-gray-400 hover:text-accent transition-colors">
              <span x-show="!videoModal.showAllJobs"
                    x-text="t('vg_view_all_jobs').replace('{n}', videoModal.jobs.length)"></span>
              <span x-show="videoModal.showAllJobs" x-text="t('vg_collapse') + ' ↑'"></span>
            </button>
          </div>
        </div>

        <!-- Generate form -->
        <div x-show="videoModal.providers.length > 0">
          <div class="text-[11px] font-semibold text-gray-400 uppercase tracking-wider mb-3"
               x-text="t('vg_generate_section')"></div>

          <!-- Provider switcher — only shown when 2+ providers configured -->
          <div x-show="videoModal.providers.length > 1" class="mb-4">
            <label class="block text-xs font-medium text-gray-500 mb-1.5" x-text="t('vg_provider')"></label>
            <div class="flex gap-2">
              <template x-for="p in videoModal.providers" :key="p.id">
                <button type="button"
                        @click="onProviderChange(p.id)"
                        class="flex-1 py-2 px-3 rounded-xl border text-xs font-medium transition-all"
                        :class="videoModal.selectedProviderId === p.id
                          ? 'border-accent bg-accent/5 text-accent'
                          : 'border-gray-200 text-gray-600 hover:border-gray-300 hover:bg-gray-50'">
                  <span x-text="(p.provider === 'chanjing' ? '🎬' : '🎥') + ' ' + p.label"></span>
                </button>
              </template>
            </div>
          </div>

          <!-- Lists error -->
          <div x-show="videoModal.listsError" class="text-xs text-red-600 bg-red-50 px-3 py-2 rounded-xl mb-3" x-text="videoModal.listsError"></div>

          <!-- Form body — visible as soon as a provider is selected,
               regardless of avatar/voice fetch progress. The avatar
               grid and voice list each show their own inline spinner
               while loading; everything else (script, format toggle,
               B-roll, caption, submit) stays interactable so the user
               can edit copy while the upstream catalog is paginating. -->
          <div x-show="!videoModal.listsError" class="space-y-5">

            <!-- ── Primary: Script (the content — users need to preview/edit) ── -->
            <div>
              <div class="flex items-center justify-between mb-2">
                <label class="text-[11px] font-semibold uppercase tracking-wider text-gray-400" x-text="t('vg_section_script')"></label>
                <span class="text-[11px] tabular-nums"
                      :class="videoModal.form.script.length > 4000 ? 'text-red-500' : 'text-gray-400'"
                      x-text="`${videoModal.form.script.length}`"></span>
              </div>
              <textarea x-model="videoModal.form.script" rows="5"
                        class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm leading-relaxed focus:outline-none focus:ring-2 focus:ring-accent/20 focus:border-accent"
                        :placeholder="t('vg_script_placeholder')"></textarea>
              <!-- Visual Direction (per-section) used to live here as a
                   read-only Phase-1 preview. The video pipeline never read
                   it — the editable B-roll plan below is the only UI that
                   actually shapes the generated B-roll. Removed to stop
                   confusing users who saw two different shot listings. -->
            </div>

            <!-- ── Primary: Aspect ratio ──
                 Lifted above Avatar so the avatar grid below can filter to
                 templates that match the chosen format. Both providers
                 expose ``extras.native_aspect_ratio`` (portrait /
                 landscape / square): jogg from its int aspect_ratio code,
                 chanjing computed from the avatar's native canvas
                 width/height. Avatars without a known native ratio stay
                 visible across all formats (chanjing's renderer can
                 stretch in either direction). -->
            <div>
              <label class="text-[11px] font-semibold uppercase tracking-wider text-gray-400 block mb-2" x-text="t('vg_section_format')"></label>
              <div class="grid grid-cols-2 gap-2" role="group" :aria-label="t('vg_section_format')">
                <button type="button" @click="setAspectRatio('portrait')"
                        :aria-pressed="videoModal.form.aspect_ratio === 'portrait'"
                        class="group py-2 px-3 rounded-lg border transition-colors flex items-center justify-center gap-2 focus:outline-none focus:ring-2 focus:ring-accent/40"
                        :class="videoModal.form.aspect_ratio === 'portrait'
                          ? 'border-accent bg-accent/5'
                          : 'border-gray-200 hover:border-gray-300 hover:bg-gray-50'">
                  <span class="inline-block w-3 h-[18px] border rounded-[2px] transition-colors"
                        :class="videoModal.form.aspect_ratio === 'portrait' ? 'border-accent' : 'border-gray-400 group-hover:border-gray-500'"></span>
                  <span class="text-sm font-medium"
                        :class="videoModal.form.aspect_ratio === 'portrait' ? 'text-accent' : 'text-gray-700'"
                        x-text="t('vg_aspect_portrait')"></span>
                  <span class="text-[11px] font-mono tabular-nums"
                        :class="videoModal.form.aspect_ratio === 'portrait' ? 'text-accent/70' : 'text-gray-400'">9:16</span>
                </button>
                <button type="button" @click="setAspectRatio('landscape')"
                        :aria-pressed="videoModal.form.aspect_ratio === 'landscape'"
                        class="group py-2 px-3 rounded-lg border transition-colors flex items-center justify-center gap-2 focus:outline-none focus:ring-2 focus:ring-accent/40"
                        :class="videoModal.form.aspect_ratio === 'landscape'
                          ? 'border-accent bg-accent/5'
                          : 'border-gray-200 hover:border-gray-300 hover:bg-gray-50'">
                  <span class="inline-block w-[18px] h-3 border rounded-[2px] transition-colors"
                        :class="videoModal.form.aspect_ratio === 'landscape' ? 'border-accent' : 'border-gray-400 group-hover:border-gray-500'"></span>
                  <span class="text-sm font-medium"
                        :class="videoModal.form.aspect_ratio === 'landscape' ? 'text-accent' : 'text-gray-700'"
                        x-text="t('vg_aspect_landscape')"></span>
                  <span class="text-[11px] font-mono tabular-nums"
                        :class="videoModal.form.aspect_ratio === 'landscape' ? 'text-accent/70' : 'text-gray-400'">16:9</span>
                </button>
              </div>
            </div>

            <!-- ── Primary: Avatar (the one real decision — highest visual weight) ── -->
            <div>
              <div class="flex items-center justify-between mb-2">
                <div class="flex items-center gap-3">
                  <label class="text-sm font-semibold text-gray-800" x-text="t('vg_section_avatar')"></label>
                  <!-- Sort toggle — chanjing-only (jogg API has no
                       sort param). Default ``latest`` so newly added
                       templates surface; ``hottest`` ranks by usage. -->
                  <div x-show="selectedProviderType === 'chanjing'"
                       class="flex items-center gap-1 text-[11px]">
                    <span class="text-gray-400" x-text="t('vg_sort_label') + ':'"></span>
                    <template x-for="opt in [
                      {v:'latest',  l:t('vg_sort_latest')},
                      {v:'hottest', l:t('vg_sort_hottest')},
                    ]" :key="opt.v">
                      <button type="button"
                              @click="setAvatarSort(opt.v)"
                              class="px-2 py-0.5 rounded-md font-medium transition-colors"
                              :class="videoModal.avatarSort === opt.v
                                ? 'bg-accent/10 text-accent'
                                : 'text-gray-500 hover:bg-gray-100'">
                        <span x-text="opt.l"></span>
                      </button>
                    </template>
                  </div>
                </div>
                <div class="flex items-center gap-2">
                  <span class="text-[10px] text-gray-400"
                        :title="hasMoreAvatars ? ('已渲染 ' + displayedAvatars.length + ' 个，匹配 ' + filteredAvatars.length + ' 个') : ''"
                        x-text="filteredAvatars.length + ' / ' + uniqueAvatars.length"></span>
                  <button type="button"
                          @click="refreshProviderLists()"
                          :disabled="videoModal.listsLoading"
                          :title="t('vg_refresh_lists_tooltip')"
                          class="text-gray-400 hover:text-accent disabled:opacity-30 transition-colors">
                    <svg class="w-3 h-3" :class="videoModal.listsLoading && 'animate-spin'" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                  </button>
                </div>
              </div>

              <!-- Chip filter bar — TagCategory groups from /avatar-tags.
                   The "aspect" synthetic category is filtered out below
                   because the format toggle above already covers it.
                   Categories with zero non-empty chips don't render at
                   all (no point showing "性别: (no chips have any avatars)"). -->
              <div x-show="visibleAvatarTagCategories.length > 0" class="space-y-1.5 mb-2">
                <template x-for="cat in visibleAvatarTagCategories" :key="cat.id">
                  <div class="flex items-start gap-2 flex-wrap">
                    <span class="text-[10px] font-semibold uppercase tracking-wider text-gray-400 w-12 shrink-0 mt-1"
                          x-text="chipCategoryLabel(cat)"></span>
                    <div class="flex items-center gap-1 flex-wrap flex-1">
                      <template x-for="tag in cat.tags" :key="tag.id">
                        <button type="button"
                                x-show="avatarChipCount(tag.id) > 0"
                                @click="toggleTagId(tag.id)"
                                class="px-2 py-0.5 rounded-md text-[11px] font-medium transition-colors"
                                :class="videoModal.selectedTagIds.includes(tag.id)
                                  ? 'bg-accent/10 text-accent'
                                  : 'text-gray-500 hover:bg-gray-100'">
                          <span x-text="chipValueLabel(tag) + ' (' + avatarChipCount(tag.id) + ')'"></span>
                        </button>
                      </template>
                    </div>
                  </div>
                </template>
                <div x-show="videoModal.selectedTagIds.length > 0" class="flex justify-end">
                  <button type="button"
                          @click="clearTagFilters()"
                          class="text-[11px] text-gray-400 hover:text-accent underline">
                    <span x-text="t('vg_clear_filters')"></span>
                  </button>
                </div>
              </div>

              <!-- Loading state: avatars still fetching from provider. -->
              <div x-show="videoModal.avatarsLoading && uniqueAvatars.length === 0"
                   class="flex items-center justify-center py-10 bg-gray-50 border border-dashed border-gray-200 rounded-xl">
                <svg class="animate-spin w-5 h-5 text-accent" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/></svg>
                <span class="ml-2 text-xs text-gray-500" x-text="t('vg_loading_avatars') || '加载数字人中…'"></span>
              </div>

              <!-- Empty state: no avatars at all (after fetch settled) -->
              <div x-show="!videoModal.avatarsLoading && uniqueAvatars.length === 0"
                   class="text-center py-6 px-4 bg-gray-50 border border-dashed border-gray-200 rounded-xl">
                <p class="text-xs text-gray-500" x-text="t('vg_no_avatars')"></p>
              </div>

              <!-- Empty state: filters drained the grid -->
              <div x-show="uniqueAvatars.length > 0 && filteredAvatars.length === 0"
                   class="text-center py-6 px-4 bg-gray-50 border border-dashed border-gray-200 rounded-xl">
                <p class="text-xs text-gray-500" x-text="t('vg_avatars_no_match')"></p>
                <button type="button"
                        x-show="videoModal.selectedTagIds.length > 0"
                        @click="clearTagFilters()"
                        class="mt-1 text-[11px] text-accent hover:underline"
                        x-text="t('vg_clear_filters')"></button>
              </div>

              <!-- Grid — column count + card aspect track the format toggle.
                   In landscape mode chanjing returns 16:9 templates, so
                   forcing aspect-square would crop the avatar's most
                   meaningful framing (head + shoulders) into an awkward
                   centered slice. 3 wider columns of aspect-video read
                   the cards at their native shape.
                   x-for binds over ``displayedAvatars`` (a slice) rather
                   than ``filteredAvatars`` so Alpine never has to
                   diff/bind 700+ DOM nodes per click. -->
              <div x-show="uniqueAvatars.length > 0"
                   class="grid gap-2 max-h-[22rem] overflow-y-auto pr-1"
                   :class="videoModal.form.aspect_ratio === 'landscape' ? 'grid-cols-3' : 'grid-cols-4'">
                <template x-for="(a, idx) in displayedAvatars" :key="a.id || ('idx_' + idx)">
                  <button type="button"
                          @click="selectAvatar(a)"
                          @mouseenter="
                            const _v = $el.querySelector('video');
                            if (_v && a.preview_video_url) {
                              if (!_v.src) _v.src = a.preview_video_url;
                              _v.play().catch(()=>{});
                            }"
                          @mouseleave="
                            const _v = $el.querySelector('video');
                            if (_v) { _v.pause(); _v.currentTime = 0; }"
                          class="group relative rounded-xl border-2 overflow-hidden bg-gray-100 transition-all duration-200 ease-out hover:shadow-lg hover:-translate-y-0.5 hover:z-10"
                          :class="[
                            videoModal.form.avatar_id === a.id
                              ? 'border-accent ring-2 ring-accent/30 shadow-md'
                              : 'border-transparent hover:border-accent/40',
                            videoModal.form.aspect_ratio === 'landscape' ? 'aspect-video' : 'aspect-square'
                          ]">
                    <!-- img stays visible at all times — fading it out
                         on hover (the previous design) created a brief
                         gray flash because the lazy-loaded video hasn't
                         decoded its first frame yet. Hover feedback is
                         instead conveyed via the parent button's lift
                         + shadow + accent border (rules: state-clarity,
                         opacity-threshold, scale-feedback). -->
                    <img x-show="a.preview_image_url"
                         :src="a.preview_image_url" :alt="a.name"
                         class="absolute inset-0 w-full h-full object-cover"
                         loading="lazy"
                         @error="$event.target.style.display='none'">
                    <!-- Video src is set lazily on first hover (see
                         @mouseenter above). Without this, every visible
                         card eagerly created a media decoder for its
                         preview mp4 — 60 simultaneous decoder setups
                         on every filter change cost 1-3s on jogg
                         (which has video_url on every avatar). -->
                    <video x-show="a.preview_video_url"
                           class="absolute inset-0 w-full h-full object-cover opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none"
                           muted loop playsinline preload="none">
                    </video>
                    <div class="absolute inset-0 flex items-center justify-center px-1 text-center text-[10px] text-gray-400 pointer-events-none"
                         x-show="!a.preview_image_url">
                      <span x-text="a.name"></span>
                    </div>
                    <div class="absolute top-1 right-1 flex gap-0.5 pointer-events-none">
                      <span x-show="a.gender"
                            class="text-[9px] font-semibold px-1 py-0.5 rounded backdrop-blur-sm"
                            :class="a.gender === 'male' ? 'bg-blue-500/80 text-white' : 'bg-pink-500/80 text-white'"
                            x-text="a.gender === 'male' ? '♂' : '♀'"></span>
                      <span x-show="a.age"
                            class="text-[9px] font-semibold px-1 py-0.5 rounded backdrop-blur-sm bg-gray-800/70 text-white"
                            x-text="t('vg_age_' + a.age)"></span>
                      <!-- Background-replaceable badge — chanjing-only
                           capability bit, surfaced so users picking
                           avatars for custom-scene shoots can spot
                           supported templates at a glance. -->
                      <span x-show="a.extras && a.extras.bg_replace === true"
                            class="text-[9px] font-semibold px-1 py-0.5 rounded backdrop-blur-sm bg-emerald-600/80 text-white"
                            :title="t('vg_badge_bg_replace')">BG</span>
                    </div>
                    <!-- Paired-voice mini-badge (top-left): chanjing
                         carries an officially-recommended voice on each
                         avatar. Show the name as a hint; an inline ▶
                         lets users sample without scrolling to the
                         voice list. The button is positioned outside
                         the parent button via stop-propagation so a
                         click on ▶ doesn't also pick the avatar. -->
                    <div x-show="a.extras && a.extras.paired_voice_name"
                         class="absolute top-1 left-1 flex items-center gap-0.5 max-w-[80%]">
                      <button type="button"
                              x-show="a.extras && a.extras.paired_voice_preview_url"
                              @click.stop="playPairedPreview(a)"
                              :title="t('vg_badge_paired')"
                              class="text-[9px] px-1 py-0.5 rounded bg-black/60 text-white hover:bg-accent transition-colors">▶</button>
                      <span class="text-[9px] font-medium px-1 py-0.5 rounded backdrop-blur-sm bg-black/50 text-white truncate"
                            :title="t('vg_badge_paired') + ': ' + a.extras.paired_voice_name"
                            x-text="a.extras.paired_voice_name"></span>
                    </div>
                    <!-- Name strip — was using a soft from-black/70
                         gradient + 10px text that visually disappeared
                         on light-skinned/light-bg avatars. Stronger
                         gradient floor + 11px semibold makes the name
                         readable across every avatar bg without
                         covering the face. truncate moved to the span
                         (where the text actually lives) so ellipsis
                         renders correctly. -->
                    <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/90 via-black/55 to-transparent text-white text-[11px] font-semibold px-2 pt-3 pb-1.5 pointer-events-none">
                      <span class="block truncate" x-text="a.name || '—'"></span>
                    </div>
                  </button>
                </template>
              </div>

              <!-- Show-more footer — only appears when the slice hides
                   results. Two paths: load 60 more (gentle) or load all
                   (the user accepts the bigger render hit). -->
              <div x-show="hasMoreAvatars" class="flex items-center justify-center gap-3 mt-2 text-[11px]">
                <button type="button"
                        @click="showMoreAvatars()"
                        class="px-3 py-1 rounded-md text-accent hover:bg-accent/10 transition-colors"
                        x-text="t('vg_load_more_avatars').replace('{shown}', displayedAvatars.length).replace('{total}', filteredAvatars.length)"></button>
                <button type="button"
                        @click="showAllAvatars()"
                        class="text-gray-400 hover:text-accent underline"
                        x-text="t('vg_show_all_avatars').replace('{n}', filteredAvatars.length)"></button>
              </div>
            </div>

            <!-- ── Primary: Enhancements (B-roll + Caption toggles) ── -->
            <div class="space-y-2">
              <!-- B-roll (conditional — only when structured_content has visual_direction) -->
              <template x-if="videoModal.creation?.structured_content?.sections && Object.values(videoModal.creation.structured_content.sections).some(s => s.visual_direction)">
                <div class="space-y-2">
                  <label class="flex items-start gap-2 text-sm text-gray-600 cursor-pointer rounded-lg border border-gray-200 hover:border-gray-300 px-3 py-2.5 transition-colors">
                    <input type="checkbox" x-model="videoModal.form.broll" class="accent-accent w-4 h-4 mt-0.5">
                    <div class="flex-1 min-w-0">
                      <div class="flex items-center gap-2 flex-wrap">
                        <span class="font-medium" x-text="t('vg_broll_label')"></span>
                        <span class="text-[11px] text-gray-400 font-normal" x-text="t('vg_broll_time_suffix')"></span>
                      </div>
                      <p class="text-[11px] text-gray-400 mt-0.5" x-text="t('vg_broll_desc')"></p>
                    </div>
                  </label>

                  <!-- B-roll editor: shows when the toggle is on -->
                  <div x-show="videoModal.form.broll" x-cloak
                       class="ml-7 mr-0 border border-gray-200 rounded-lg bg-gray-50/60 p-3 space-y-3">
                    <div class="flex items-center justify-between gap-2 flex-wrap">
                      <div class="text-[11px] text-gray-500">
                        <span x-text="t('vg_broll_editor_label')"></span>
                        <span class="text-gray-400">
                          — <span x-text="brollTotalNarrationChars()"></span>
                          <span x-text="t('vg_broll_chars')"></span>
                        </span>
                      </div>
                      <div class="flex items-center gap-3 flex-wrap">
                        <!-- B-roll video model selector — applies to all shots in this generation. -->
                        <template x-if="videoModal.brollModelOptions.some(o => o.available)">
                          <div class="relative">
                            <select :aria-label="t('vg_broll_model_aria')"
                                    @change="(() => { const sel = videoModal.brollModelOptions.find(o => (o.provider_config_id + '::' + o.model_code) === $event.target.value); if (sel) { videoModal.form.broll_provider_config_id = sel.provider_config_id; videoModal.form.broll_model_code = sel.model_code; } })()"
                                    class="appearance-none text-[11px] font-medium text-gray-700 bg-white border border-gray-200 rounded-md pl-6 pr-6 py-1 hover:border-gray-300 focus:outline-none focus:ring-2 focus:ring-accent/40 focus:border-accent transition-colors cursor-pointer max-w-[200px] truncate">
                              <template x-for="opt in videoModal.brollModelOptions" :key="(opt.provider_config_id || 'unset') + '::' + opt.model_code + '::' + opt.provider">
                                <option :value="opt.available ? (opt.provider_config_id + '::' + opt.model_code) : ''"
                                        :disabled="!opt.available"
                                        :selected="opt.available && opt.provider_config_id === videoModal.form.broll_provider_config_id && opt.model_code === videoModal.form.broll_model_code"
                                        x-text="opt.display_label"></option>
                              </template>
                            </select>
                            <svg class="absolute left-1.5 top-1/2 -translate-y-1/2 w-3 h-3 text-gray-400 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
                            <svg class="absolute right-1.5 top-1/2 -translate-y-1/2 w-3 h-3 text-gray-400 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
                          </div>
                        </template>
                        <template x-if="!videoModal.brollModelOptions.some(o => o.available)">
                          <a href="/setting.html?section=llm"
                             :title="t('vg_broll_model_unset_hint')"
                             class="text-[11px] text-amber-600 hover:text-amber-700 font-medium flex items-center gap-1">
                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M5 19h14a2 2 0 001.84-2.75L13.74 4a2 2 0 00-3.48 0L3.16 16.25A2 2 0 005 19z"/></svg>
                            <span x-text="t('vg_broll_model_unset')"></span>
                          </a>
                        </template>

                        <button type="button" @click="brollAddShot()"
                                class="text-[11px] text-accent hover:text-accent-hover font-medium flex items-center gap-1">
                          <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                          <span x-text="t('vg_broll_add_shot')"></span>
                        </button>
                      </div>
                    </div>

                    <template x-if="(videoModal.form.broll_plan || []).length === 0">
                      <p class="text-[11px] text-gray-400 italic" x-text="t('vg_broll_empty_hint')"></p>
                    </template>

                    <template x-for="(shot, idx) in videoModal.form.broll_plan" :key="idx">
                      <!-- Row x-data scope: per-shot expand/collapse for
                           Advanced fields. Default collapsed — the LLM-
                           picked type/insert_at/duration values are
                           usually correct; only power users open this. -->
                      <div x-data="{ adv: false }"
                           class="bg-white border border-gray-200 rounded-lg p-2.5 space-y-2">
                        <!-- Header: compact ordinal + duration + actions. -->
                        <div class="flex items-center justify-between gap-2 text-[11px]">
                          <div class="flex items-center gap-2 min-w-0 flex-1">
                            <span class="shrink-0 inline-flex items-center justify-center w-5 h-5
                                         rounded-full bg-accent/10 text-accent
                                         text-[10px] font-semibold tabular-nums"
                                  x-text="idx + 1"></span>
                            <span class="text-gray-400 tabular-nums"
                                  x-text="(shot.duration_seconds || 5) + 's'"></span>
                            <span class="text-gray-300">·</span>
                            <span class="text-gray-400"
                                  x-text="shot.type === 'retention' ? t('vg_broll_type_retention') : t('vg_broll_type_illustrative')"></span>
                          </div>
                          <div class="flex items-center gap-1 shrink-0">
                            <button type="button"
                                    @click="adv = !adv"
                                    :title="adv ? t('vg_broll_advanced_collapse') : t('vg_broll_advanced_toggle')"
                                    class="p-1 text-gray-400 hover:text-gray-700 rounded transition-colors">
                              <svg class="w-3.5 h-3.5 transition-transform"
                                   :class="adv && 'rotate-180'"
                                   fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                              </svg>
                            </button>
                            <button type="button"
                                    @click="videoModal.form.broll_plan.splice(idx, 1)"
                                    class="p-1 text-gray-300 hover:text-red-500 rounded transition-colors">
                              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                            </button>
                          </div>
                        </div>
                        <!-- Narration context: the actual sentence(s) where
                             this broll fires. Renders ~30 chars before/after
                             insert_after_char with an inline [N] marker at
                             the exact fire point. The whole point: user
                             scans down the cards and at-a-glance sees WHERE
                             each broll lands in the script. No scroll, no
                             popover, no preview block above. -->
                        <div class="rounded-md bg-gray-50 border border-gray-100 px-2.5 py-1.5">
                          <p class="text-[12px] text-gray-700 leading-relaxed italic"
                             style="word-break: break-word;">
                            <template x-if="brollContextWindow(shot.insert_after_char).before">
                              <span class="text-gray-400" x-text="'…' + brollContextWindow(shot.insert_after_char).before"></span>
                            </template>
                            <span class="inline-flex items-center justify-center min-w-[16px] h-4 px-1 mx-0.5 rounded-full bg-accent text-white text-[9px] font-bold align-middle not-italic tabular-nums leading-none"
                                  x-text="idx + 1"></span>
                            <template x-if="brollContextWindow(shot.insert_after_char).after">
                              <span class="text-gray-400" x-text="brollContextWindow(shot.insert_after_char).after + '…'"></span>
                            </template>
                            <template x-if="!brollContextWindow(shot.insert_after_char).before && !brollContextWindow(shot.insert_after_char).after">
                              <span class="text-gray-400 not-italic"
                                    x-text="t('vg_broll_pos_at_char').replace('{n}', shot.insert_after_char || 0)"></span>
                            </template>
                          </p>
                        </div>
                        <!-- Matched-asset suggestion. Wrapped in <template x-if>
                             instead of x-show so the inner bindings DON'T
                             evaluate when no asset is matched — Alpine still
                             walks x-show subtrees, and a freshly-pushed shot
                             from "Add shot" has no matched_asset, which used
                             to break the rendering pipeline silently. With
                             x-if, the subtree only exists when there's an
                             actual asset to bind to. -->
                        <template x-if="shot.matched_asset">
                          <div class="p-2.5 rounded-lg bg-gray-50 border border-gray-100 relative">
                            <button type="button"
                                    @click="dismissAssetSuggestion(shot)"
                                    :aria-label="t('dismiss_suggestion')"
                                    :title="t('dismiss_suggestion')"
                                    class="absolute top-1.5 right-1.5 p-1 text-gray-400 hover:text-gray-600 hover:bg-gray-100 rounded transition-colors">
                              <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                              </svg>
                            </button>
                            <div class="flex items-start gap-2.5">
                              <!-- Clickable thumbnail. shrink-0 + fixed dim
                                   means landscape vs portrait don't shift the
                                   segmented control's left edge. Hover reveals
                                   a play overlay → click opens videoPlayer
                                   lightbox. The play affordance only shows
                                   for video assets; image assets stay quiet
                                   (no point in "playing" an image).  -->
                              <button type="button"
                                      @click="openAssetPreview(shot)"
                                      :aria-label="t('preview_asset') + ': ' + shot.matched_asset.file_name"
                                      class="shrink-0 rounded overflow-hidden bg-gray-200 relative group/thumb cursor-pointer focus:outline-none focus:ring-2 focus:ring-accent/40"
                                      :class="shot.matched_asset.aspect === '9:16'
                                                ? 'w-[36px] h-[64px]'
                                                : (shot.matched_asset.aspect === '1:1'
                                                    ? 'w-[56px] h-[56px]'
                                                    : 'w-[80px] h-[45px]')">
                                <!-- Thumbnail URL is built from asset.id, not
                                     preview_uri (which is the raw storage path
                                     from the backend, not a fetchable URL).
                                     Same pattern as offer.html:530/648. -->
                                <img :src="'/api/v1/assets/' + shot.matched_asset.id + '/' + (shot.matched_asset.asset_type === 'image' ? 'file' : 'thumbnail')"
                                     loading="lazy"
                                     class="w-full h-full object-cover"
                                     :alt="shot.matched_asset.file_name"
                                     @error="$el.style.opacity='0.3'">
                                <!-- Play overlay (video only). Hidden at rest;
                                     fades in on hover/focus. Pure transform/
                                     opacity transition — no layout shift. -->
                                <span x-show="shot.matched_asset.asset_type === 'video'"
                                      class="absolute inset-0 flex items-center justify-center
                                             bg-black/0 group-hover/thumb:bg-black/45
                                             group-focus/thumb:bg-black/45
                                             transition-colors duration-150">
                                  <svg class="w-5 h-5 text-white drop-shadow opacity-0
                                              group-hover/thumb:opacity-100
                                              group-focus/thumb:opacity-100
                                              transition-opacity duration-150"
                                       fill="currentColor" viewBox="0 0 24 24"
                                       aria-hidden="true">
                                    <path d="M8 5v14l11-7z"/>
                                  </svg>
                                </span>
                                <span x-show="shot.matched_asset.asset_type === 'video'"
                                      class="absolute bottom-0.5 right-0.5 px-1 py-0.5 rounded bg-black/55 text-white text-[9px] font-medium leading-none tabular-nums pointer-events-none"
                                      x-text="(shot.matched_asset.duration_seconds || 0) + 's'"></span>
                              </button>
                              <!-- Meta + segmented control -->
                              <div class="flex-1 min-w-0 pr-5">
                                <div class="flex items-center gap-1.5 mb-0.5">
                                  <span class="text-[11px] font-medium text-gray-700 truncate"
                                        x-text="shot.matched_asset.file_name"></span>
                                  <span class="inline-flex items-center gap-0.5 px-1.5 py-0.5 rounded-full bg-accent/10 text-accent text-[9px] font-medium shrink-0">
                                    <svg class="w-2.5 h-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
                                    </svg>
                                    <span x-text="t('ai_matched')"></span>
                                  </span>
                                </div>
                                <p class="text-[10px] text-gray-500 mb-1 tabular-nums"
                                   x-text="(shot.matched_asset.aspect || '?')
                                            + ' · '
                                            + (shot.matched_asset.duration_seconds || 0) + 's · '
                                            + (shot.matched_asset.resolution_label || '')"></p>
                                <!-- LLM rerank rationale — shows the one-line
                                     judgment that picked THIS asset for
                                     THIS shot. Helps the user trust the
                                     suggestion (or recognize a weak match
                                     quickly). Hidden when the LLM didn't
                                     return a reason. -->
                                <p x-show="shot.matched_asset.match_reason"
                                   class="text-[10px] text-gray-400 mb-1.5 italic leading-snug"
                                   x-text="'“' + shot.matched_asset.match_reason + '”'"></p>
                                <!-- Segmented control: 2 options.
                                     "Switch back to AI" is covered by the
                                     dismiss ✕ button on the top-right
                                     (clears the suggestion entirely → falls
                                     back to AI generation from prompt).
                                     A third button would just be a louder
                                     synonym for dismiss.  -->
                                <div class="inline-flex rounded-lg bg-gray-100 p-0.5 text-[11px]">
                                  <button type="button"
                                          @click="setShotMode(shot, 'direct')"
                                          :class="(shot.asset_mode === 'direct') ? 'bg-white shadow-sm text-accent' : 'text-gray-500 hover:text-gray-700'"
                                          class="px-2.5 py-1 rounded-md font-medium transition-all duration-150">
                                    <span x-text="t('use_directly')"></span>
                                  </button>
                                  <button type="button"
