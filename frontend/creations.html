                                          @click="setShotMode(shot, 'reference')"
                                          :class="(shot.asset_mode === 'reference') ? 'bg-white shadow-sm text-accent' : 'text-gray-500 hover:text-gray-700'"
                                          class="px-2.5 py-1 rounded-md font-medium transition-all duration-150">
                                    <span x-text="t('ai_reference')"></span>
                                  </button>
                                </div>
                                <!-- Reference-mode helper: explains the
                                     prompt textarea below is still editable
                                     and feeds AI as guidance alongside the
                                     asset reference. Direct mode no longer
                                     needs an explanation — the textarea is
                                     hidden, the user already sees "this
                                     asset goes here" without ambiguity. -->
                                <p x-show="shot.asset_mode === 'reference'"
                                   class="text-[10px] text-gray-500 mt-1 italic"
                                   x-text="t('asset_reference_helper')"></p>
                                <!-- Audio output toggle (direct mode only).
                                     Default: muted. Asset's video plays, but
                                     its original audio is dropped — the
                                     avatar's TTS keeps speaking continuously.
                                     ON state uses amber (NOT primary accent)
                                     because enabling has a real consequence:
                                     it silences TTS for this segment. Amber
                                     says "intentional, but be aware";
                                     primary blue would understate it. -->
                                <div x-show="shot.asset_mode === 'direct'
                                              && shot.matched_asset.asset_type === 'video'"
                                     class="mt-2 pt-2 border-t border-gray-100">
                                  <button type="button"
                                          @click="shot.asset_audio = !shot.asset_audio"
                                          :aria-pressed="!!shot.asset_audio"
                                          :class="shot.asset_audio
                                                    ? 'bg-amber-50 border-amber-200 hover:bg-amber-100'
                                                    : 'bg-white border-gray-200 hover:bg-gray-50'"
                                          class="w-full flex items-center justify-between gap-2 px-2.5 py-1.5 rounded-md border transition-colors">
                                    <span class="flex items-center gap-1.5 min-w-0">
                                      <!-- icon: muted speaker (off) -->
                                      <svg x-show="!shot.asset_audio" class="w-3.5 h-3.5 shrink-0 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15zM17 14l4-4m0 4l-4-4"/>
                                      </svg>
                                      <!-- icon: speaker (on) -->
                                      <svg x-show="shot.asset_audio" class="w-3.5 h-3.5 shrink-0 text-amber-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"/>
                                      </svg>
                                      <span class="text-[11px] font-medium truncate"
                                            :class="shot.asset_audio ? 'text-amber-700' : 'text-gray-600'">
                                        <span x-show="!shot.asset_audio" x-text="t('asset_audio_off_label')"></span>
                                        <span x-show="shot.asset_audio" x-text="t('asset_audio_on_label')"></span>
                                      </span>
                                    </span>
                                    <!-- Toggle pill: 36×20 (≥ 44 pt total
                                         with the wrapping button's tap area).
                                         Position-shifting dot is purely a
                                         transform on `left` — Tailwind's
                                         arbitrary value handles it. -->
                                    <span class="relative w-9 h-5 rounded-full transition-colors shrink-0"
                                          :class="shot.asset_audio ? 'bg-amber-500' : 'bg-gray-300'">
                                      <span class="absolute top-0.5 w-4 h-4 rounded-full bg-white shadow transition-all duration-150"
                                            :class="shot.asset_audio ? 'left-[18px]' : 'left-0.5'"></span>
                                    </span>
                                  </button>
                                  <p class="text-[10px] mt-1 leading-snug"
                                     :class="shot.asset_audio ? 'text-amber-700' : 'text-gray-400'"
                                     x-text="shot.asset_audio ? t('asset_audio_on_helper') : t('asset_audio_off_helper')"></p>
                                </div>
                              </div>
                            </div>
                          </div>
                        </template>
                        <!-- Body: prompt textarea — primary editable surface.
                             Hidden in ``direct`` mode (asset replaces this
                             shot, prompt is dead weight). x-show preserves
                             the textarea state across mode toggles, so user
                             switching to AI 参考 still keeps any text they
                             had typed. -->
                        <textarea x-show="shot.asset_mode !== 'direct'"
                                  x-model="shot.prompt" rows="3"
                                  :placeholder="t('vg_broll_prompt_placeholder')"
                                  class="w-full text-[12px] border border-gray-200 rounded px-2 py-1.5 leading-relaxed focus:outline-none focus:ring-2 focus:ring-accent/20 focus:border-accent resize-y bg-white"></textarea>
                        <!-- Advanced: hidden by default. Type/insert_at/
                             duration are LLM-picked; users open this
                             only for fine-tuning. -->
                        <div x-show="adv" x-cloak
                             x-transition:enter="transition ease-out duration-200"
                             x-transition:enter-start="opacity-0 -translate-y-1"
                             x-transition:enter-end="opacity-100 translate-y-0"
                             class="grid grid-cols-3 gap-3 pt-2 border-t border-gray-200/60 text-[11px]">
                          <label class="flex flex-col gap-1">
                            <span class="text-gray-500 font-medium" x-text="t('vg_broll_field_type')"></span>
                            <select x-model="shot.type"
                                    class="border border-gray-200 rounded px-1.5 py-1 text-[11px] bg-white">
                              <option value="retention" x-text="t('vg_broll_type_retention')"></option>
                              <option value="illustrative" x-text="t('vg_broll_type_illustrative')"></option>
                            </select>
                          </label>
                          <label class="flex flex-col gap-1">
                            <span class="text-gray-500 font-medium" x-text="t('vg_broll_field_insert_at')"></span>
                            <input type="number" min="0" :max="brollTotalNarrationChars()"
                                   x-model.number="shot.insert_after_char"
                                   class="border border-gray-200 rounded px-1.5 py-1 text-[11px] bg-white tabular-nums">
                          </label>
                          <label class="flex flex-col gap-1">
                            <span class="text-gray-500 font-medium" x-text="t('vg_broll_field_duration')"></span>
                            <input type="number" min="2" max="15"
                                   x-model.number="shot.duration_seconds"
                                   class="border border-gray-200 rounded px-1.5 py-1 text-[11px] bg-white tabular-nums">
                          </label>
                        </div>
                      </div>
                    </template>
                  </div>
                </div>
              </template>
              <!-- Caption -->
              <div class="flex items-center gap-2 rounded-lg border border-gray-200 hover:border-gray-300 px-3 py-2.5 transition-colors">
                <label class="flex items-center gap-2 text-sm text-gray-600 cursor-pointer flex-1 min-w-0">
                  <input type="checkbox" x-model="videoModal.form.caption" class="accent-accent w-4 h-4">
                  <span class="font-medium" x-text="t('vg_caption')"></span>
                </label>
                <button type="button" x-show="videoModal.form.caption"
                        @click="
                          const d = document.getElementById('vg-advanced');
                          if (d) d.open = true;
                          $nextTick(() => {
                            // Anchor to the caption-style sub-section (not
                            // the Advanced container) so the user lands
                            // on the section their click implied — not on
                            // Voice (which is the first child of Advanced).
                            const t = document.getElementById('vg-caption-style');
                            (t || d)?.scrollIntoView({behavior:'smooth', block:'start'});
                          });
                        "
                        class="text-[11px] text-accent/70 hover:text-accent transition-colors shrink-0"
                        x-text="t('vg_caption_customize_hint')"></button>
              </div>
            </div>

            <!-- ── Advanced (Voice + Caption style details) ── -->
            <details class="group/advanced border-t border-gray-100 pt-4" id="vg-advanced">
              <summary class="flex items-center justify-between cursor-pointer select-none hover:bg-gray-50 -mx-1 px-1 py-1 rounded-lg transition-colors">
                <label class="text-[11px] font-semibold uppercase tracking-wider text-gray-400 pointer-events-none"
                       x-text="t('vg_advanced')"></label>
                <div class="flex items-center gap-2 text-[11px] text-gray-400">
                  <span x-show="videoModal.form.voice_id && uniqueVoices.find(v => v.id === videoModal.form.voice_id)"
                        x-text="uniqueVoices.find(v => v.id === videoModal.form.voice_id)?.name || ''"></span>
                  <svg class="w-3 h-3 transition-transform group-open/advanced:rotate-90" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
                </div>
              </summary>
              <div class="mt-4 space-y-5">

                <!-- Voice -->
                <div>
                  <label class="text-[11px] font-semibold uppercase tracking-wider text-gray-400 block mb-2" x-text="t('vg_section_voice')"></label>
                  <div class="flex items-center gap-2 mb-2 flex-wrap">
                    <div class="relative flex-1 min-w-[160px]">
                      <svg class="absolute left-2.5 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                      <input type="text" x-model="videoModal.voiceSearch"
                             :placeholder="t('vg_search_voice')"
                             class="w-full pl-8 pr-2 py-1.5 text-xs border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-accent/20 focus:border-accent">
                    </div>
                    <div class="flex items-center gap-1 flex-wrap">
                      <button type="button"
                              x-show="selectedAvatar"
                              @click="videoModal.voiceFilter = 'best'"
                              class="px-2 py-0.5 rounded-md text-[11px] font-medium transition-colors"
                              :class="videoModal.voiceFilter === 'best'
                                ? 'bg-accent/10 text-accent'
                                : 'text-gray-500 hover:bg-gray-100'">
                        <span x-text="'✨ ' + t('vg_filter_best')"></span>
                      </button>
                      <template x-for="opt in [
                        {v:'all',    l:t('vg_filter_all'),    n:voiceCounts.all},
                        {v:'male',   l:'♂', n:voiceCounts.male},
                        {v:'female', l:'♀', n:voiceCounts.female},
                      ]" :key="opt.v">
                        <button type="button"
                                x-show="opt.n > 0"
                                @click="videoModal.voiceFilter = opt.v"
                                class="px-2 py-0.5 rounded-md text-[11px] font-medium transition-colors"
                                :class="videoModal.voiceFilter === opt.v
                                  ? 'bg-accent/10 text-accent'
                                  : 'text-gray-500 hover:bg-gray-100'">
                          <span x-text="opt.l + ' (' + opt.n + ')'"></span>
                        </button>
                      </template>
                    </div>
                  </div>
                  <div class="border border-gray-200 rounded-lg max-h-60 overflow-y-auto divide-y divide-gray-100">
                    <!-- Inline loading state for voices — same pattern
                         as the avatar grid: replaces the list area with
                         a small spinner so the surrounding form stays
                         visible while voices are still paginating. -->
                    <div x-show="videoModal.voicesLoading && uniqueVoices.length === 0"
                         class="flex items-center justify-center py-8">
                      <svg class="animate-spin w-4 h-4 text-accent" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/></svg>
                      <span class="ml-2 text-xs text-gray-500" x-text="t('vg_loading_voices') || '加载音色中…'"></span>
                    </div>
                    <template x-for="(v, idx) in displayedVoices" :key="v.id || ('idx_' + idx)">
                      <div class="flex items-center gap-3 px-3 py-2 cursor-pointer transition-colors"
                           :class="videoModal.form.voice_id === v.id ? 'bg-accent/5' : 'hover:bg-gray-50'"
                           @click="videoModal.form.voice_id = v.id">
                        <div class="w-4 h-4 rounded-full border-2 shrink-0 flex items-center justify-center"
                             :class="videoModal.form.voice_id === v.id ? 'border-accent' : 'border-gray-300'">
                          <div x-show="videoModal.form.voice_id === v.id" class="w-2 h-2 rounded-full bg-accent"></div>
                        </div>
                        <span x-show="voiceMatchLabel(v)"
                              class="text-sm shrink-0 cursor-help"
                              :title="voiceMatchTooltip(v)"
                              x-text="voiceMatchLabel(v)"></span>
                        <div class="flex-1 min-w-0">
                          <div class="text-sm font-medium text-gray-800 truncate" x-text="v.name"></div>
                          <div class="text-[11px] text-gray-400 flex items-center gap-1.5">
                            <span x-show="v.gender" x-text="v.gender === 'male' ? '♂' : '♀'"></span>
                            <span x-show="v.age" x-text="t('vg_age_' + v.age)"></span>
                            <span x-show="v.language" x-text="voiceLangLabel(v.language)"></span>
                          </div>
                        </div>
                        <button type="button"
                                @click.stop="auditionVoice(v)"
                                :disabled="videoModal.auditionLoadingId === v.id || !auditionCanPlay"
                                :title="!auditionCanPlay ? t('vg_audition_no_text') : ''"
                                class="shrink-0 inline-flex items-center gap-1 text-[11px] font-medium px-2.5 py-1 rounded-lg border transition-colors disabled:opacity-40 disabled:cursor-not-allowed"
                                :class="videoModal.auditionPlayingId === v.id
                                  ? 'border-accent bg-accent/5 text-accent'
                                  : 'border-gray-200 text-gray-600 hover:border-accent hover:text-accent'">
                          <svg x-show="videoModal.auditionLoadingId === v.id" class="w-3 h-3 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/></svg>
                          <svg x-show="videoModal.auditionLoadingId !== v.id && videoModal.auditionPlayingId === v.id" class="w-3 h-3" fill="currentColor" viewBox="0 0 24 24"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg>
                          <svg x-show="videoModal.auditionLoadingId !== v.id && videoModal.auditionPlayingId !== v.id" class="w-3 h-3" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                          <span x-text="t('vg_audition_short')"></span>
                        </button>
                      </div>
                    </template>
                    <div x-show="filteredVoices.length === 0" class="py-6 text-center text-xs text-gray-400">
                      <span x-text="t('vg_voices_no_match')"></span>
                    </div>
                    <div x-show="hasMoreVoices" class="flex items-center justify-center gap-3 py-2 text-[11px] border-t border-gray-100">
                      <button type="button"
                              @click="showMoreVoices()"
                              class="text-accent hover:underline"
                              x-text="t('vg_load_more_voices').replace('{shown}', displayedVoices.length).replace('{total}', filteredVoices.length)"></button>
                      <button type="button"
                              @click="showAllVoices()"
                              class="text-gray-400 hover:text-accent underline"
                              x-text="t('vg_show_all_voices').replace('{n}', filteredVoices.length)"></button>
                    </div>
                  </div>
                  <p class="mt-1 text-[10px] text-gray-400">
                    <span x-show="auditionCanPlay" x-text="t('vg_audition_hint').replace('{n}', auditionPreviewText.length).replace('{text}', auditionPreviewText)"></span>
                    <span x-show="!auditionCanPlay" x-text="t('vg_audition_no_text')"></span>
                  </p>
                  <audio x-ref="auditionAudio" class="hidden" @ended="videoModal.auditionPlayingId = ''"></audio>
                </div>

                <!-- Caption style (shown only when caption enabled above)
                     Preview design notes:
                     * Backend (chanjing + ffmpeg drawtext) renders subtitles
                       as stroked text — no background fills, no rounded
                       boxes. The preview must therefore match that
                       rendering model so what users see is what they get.
                     * Single-tone preview backgrounds (the old bg-gray-800)
                       gave a misleadingly weak impression of stroke styles
                       — a half-light/half-dark gradient simulates the
                       worst-case "video background" range and reveals
                       which styles actually hold up.
                     * ``-webkit-text-stroke`` + ``paint-order`` produces
                       a true outline (versus the old 4-direction
                       text-shadow approximation). Stroke width is
                       proportional to backend px / 48px-base font; at
                       16-18px CSS that's ~2.5-3.5px in the preview. -->
                <div x-show="videoModal.form.caption" x-collapse
                     id="vg-caption-style"
                     style="scroll-margin-top: 12px">
                  <label class="text-[11px] font-semibold uppercase tracking-wider text-gray-400 block mb-2" x-text="t('vg_caption_style')"></label>
                  <div class="flex gap-2">
                    <template x-for="s in [
                      {id:'classic', label:t('vg_subtitle_classic'),  desc:t('vg_subtitle_classic_desc'), color:'#FFFFFF', stroke:'#000000', strokeW:'2.5px', size:'text-base', weight:'700'},
                      {id:'bold',    label:t('vg_subtitle_bold'),     desc:t('vg_subtitle_bold_desc'),    color:'#FFE033', stroke:'#1A1A1A', strokeW:'3.5px', size:'text-lg',  weight:'800'},
                      {id:'minimal', label:t('vg_subtitle_minimal'),  desc:t('vg_subtitle_minimal_desc'), color:'#FFFFFF', stroke:'#000000', strokeW:'1.5px', size:'text-sm',  weight:'600'},
                    ]" :key="s.id">
                      <button type="button"
                              @click="videoModal.form.subtitle_style = s.id; videoModal.form.subtitle_color = ''; videoModal.form.subtitle_stroke = ''"
                              class="flex-1 rounded-xl border-2 p-2.5 transition-all text-center"
                              :class="videoModal.form.subtitle_style === s.id
                                ? 'border-accent bg-accent/5'
                                : 'border-gray-200 hover:border-gray-300'">
                        <!-- Dual-tone preview bg — light→dark gradient
                             approximates a real video frame range; if a
                             style is readable here it'll be readable on
                             actual footage. -->
                        <div class="rounded-md mb-1.5 relative overflow-hidden h-12 bg-gradient-to-r from-stone-200 via-slate-500 to-slate-900 flex items-end justify-center pb-1.5 px-1">
                          <span :class="s.size"
                                :style="`color:${videoModal.form.subtitle_color || s.color}; -webkit-text-stroke:${s.strokeW} ${videoModal.form.subtitle_stroke || s.stroke}; paint-order:stroke fill; font-weight:${s.weight}; letter-spacing:0.01em;`"
                                :title="subtitlePreviewText"
                                x-text="subtitlePreviewText"></span>
                        </div>
                        <div class="text-[11px] font-medium" :class="videoModal.form.subtitle_style === s.id ? 'text-accent' : 'text-gray-600'" x-text="s.label"></div>
                        <div class="text-[10px] text-gray-400" x-text="s.desc"></div>
                      </button>
                    </template>
                  </div>
                  <!-- Customize colors (collapsed by default) -->
                  <details class="mt-3">
                    <summary class="text-[11px] text-gray-400 cursor-pointer hover:text-gray-600 select-none flex items-center gap-1">
                      <svg class="w-3 h-3 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
                      <span x-text="t('vg_customize_colors')"></span>
                    </summary>
                    <div class="mt-2 flex items-center gap-4 px-1">
                      <label class="flex items-center gap-1.5 text-[11px] text-gray-500">
                        <span x-text="t('vg_subtitle_color_text')"></span>
                        <input type="color"
                               :value="videoModal.form.subtitle_color || ({classic:'#FFFFFF',bold:'#FFE033',minimal:'#E8E8E8'}[videoModal.form.subtitle_style] || '#FFFFFF')"
                               @input="videoModal.form.subtitle_color = $event.target.value"
                               class="w-6 h-6 rounded border border-gray-300 cursor-pointer p-0"
                               style="padding:1px;">
                      </label>
                      <label class="flex items-center gap-1.5 text-[11px] text-gray-500">
                        <span x-text="t('vg_subtitle_color_stroke')"></span>
                        <input type="color"
                               :value="videoModal.form.subtitle_stroke || ({classic:'#000000',bold:'#1A1A1A',minimal:'#555555'}[videoModal.form.subtitle_style] || '#000000')"
                               @input="videoModal.form.subtitle_stroke = $event.target.value"
                               class="w-6 h-6 rounded border border-gray-300 cursor-pointer p-0"
                               style="padding:1px;">
                      </label>
                      <button x-show="videoModal.form.subtitle_color || videoModal.form.subtitle_stroke"
                              @click="videoModal.form.subtitle_color = ''; videoModal.form.subtitle_stroke = ''"
                              class="text-[10px] text-gray-400 hover:text-accent transition-colors"
                              x-text="t('vg_subtitle_reset')"></button>
                    </div>
                  </details>
                </div>

              </div>
            </details>

            <!-- Submit error -->
            <div x-show="videoModal.submitError" class="text-xs text-red-600 bg-red-50 px-3 py-2 rounded-xl"
                 x-text="videoModal.submitError"></div>
          </div>
        </div>

      </div>

      <!-- Footer -->
      <div class="px-5 py-4 border-t flex items-center justify-between gap-4 shrink-0">
        <div class="min-w-0 flex-1">
          <!-- Generate summary (highlights what's about to happen) -->
          <div x-show="generateSummary" class="text-[11px] flex items-center gap-1.5 text-gray-600">
            <svg class="w-3 h-3 text-accent shrink-0" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            <span class="truncate" :title="generateSummary">
              <span class="text-gray-400" x-text="t('vg_will_generate')"></span>
              <span class="font-medium text-gray-700" x-text="generateSummary"></span>
            </span>
          </div>
          <!-- Fallback hint when nothing chosen yet -->
          <div x-show="!generateSummary && videoModal.providers.length > 0"
               class="text-[11px] text-gray-400" x-text="t('vg_footer_hint')"></div>
        </div>
        <div class="flex items-center gap-2 shrink-0">
          <button @click="submitVideo()"
                  :disabled="!canSubmitVideo"
                  :title="!canSubmitVideo ? t('vg_disabled_hint') : ''"
                  class="inline-flex items-center gap-1.5 px-5 py-2 text-sm font-medium bg-accent text-white rounded-lg hover:bg-accent-hover disabled:opacity-50 disabled:cursor-not-allowed shadow-sm">
            <svg x-show="videoModal.submitting" class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/></svg>
            <span x-show="videoModal.submitting" x-text="t('vg_submitting')"></span>
            <span x-show="!videoModal.submitting && hasJobs" x-text="t('vg_generate_another')"></span>
            <span x-show="!videoModal.submitting && !hasJobs" x-text="t('vg_generate_btn')"></span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Video Lightbox Player ── -->
  <div x-show="videoPlayer.open" x-cloak
       x-transition:enter="transition ease-out duration-200"
       x-transition:enter-start="opacity-0"
       x-transition:enter-end="opacity-100"
       x-transition:leave="transition ease-in duration-150"
       x-transition:leave-start="opacity-100"
       x-transition:leave-end="opacity-0"
       class="fixed inset-0 z-[200] flex items-center justify-center"
       @keydown.escape.window="closeVideoPlayer()">
    <!-- Backdrop -->
    <div class="absolute inset-0 bg-black/80" @click="closeVideoPlayer()"></div>
    <!-- Player container -->
    <div class="relative z-10 flex flex-col items-center gap-3 max-w-[90vw] max-h-[90vh]"
         @click.stop>
      <!-- Close button -->
      <button @click="closeVideoPlayer()"
              class="absolute -top-2 -right-2 z-20 w-8 h-8 rounded-full bg-white/10 hover:bg-white/20 backdrop-blur flex items-center justify-center text-white transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
      <!-- Video -->
      <!-- :muted reflects the per-preview initial state (default false for
           regular video lightbox use; set to true when previewing a broll
           asset whose card toggle is OFF, so preview matches generation).
           The native HTML5 audio control still lets the user temporarily
           unmute to listen — that override is preview-only and never
           feeds back to the card toggle. -->
      <video x-ref="lightboxVideo"
             :src="videoPlayer.url"
             :poster="videoPlayer.poster"
             :muted="!!videoPlayer.muted"
             class="rounded-xl shadow-2xl max-h-[80vh] max-w-[85vw] bg-black"
             controls autoplay playsinline>
      </video>
      <!-- Download -->
      <a x-show="videoPlayer.downloadUrl"
         :href="videoPlayer.downloadUrl" target="_blank" rel="noopener" download
         class="inline-flex items-center gap-1.5 text-sm text-white/70 hover:text-white transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
        <span x-text="t('vg_download')"></span>
      </a>
    </div>
  </div>

  <script>
    function creationsPage() {
      return {
        items: [],
        total: 0,
        page: 1,
        pageSize: 20,
        loading: true,
        searchQ: '',
        filterSource: '',
        // Filter creations by offer. Default '' = all offers.
        filterOffer: '',
        webuiApps: [],  // populated at init from /api/v1/apps (category=content_creation)
        // {source_app: count} from /api/v1/creations/source-counts.
        // Drives dropdown pruning — only sources with count > 0 render.
        sourceCounts: {},
        // [{offer_id, name, count}] from /api/v1/creations/offer-counts.
        // Drives the offer dropdown + offer-name chips on each card.
        offerCounts: [],
        flashCreationId: '',  // transient highlight when arriving from ?highlight=<id>
        modal: {
          open: false,
          mode: 'new',  // 'new' | 'edit'
          data: {},
          tagsText: '',
          saving: false,
        },

        // ── Generate Video modal ──
        videoModal: {
          open: false,
          creation: null,
          providers: [],          // active media-provider configs
          providersLoading: false,
          brollModelOptions: [],  // video_gen capability options (Veo / Seedance / Kling …)
          selectedProviderId: '',
          jobs: [],
          jobsLoading: false,
          avatars: [],
          voices: [],
          // TagCategory[] — chip dictionary fetched alongside avatars.
          // Each provider returns its real categories merged with the
          // cross-provider synthetic ones (gender/age/aspect/language).
          // Single source of truth for the chip filter UI.
          avatarTags: [],
          // Per-list loading flags — split out so a slow voices fetch
          // (jogg's 2000+ library) can't keep already-loaded avatars
          // hidden behind a single shared spinner.
          avatarsLoading: false,
          voicesLoading: false,
          listsLoading: false,    // legacy union; true while either is loading
          listsError: '',
          form: {
            avatar_id: '',
            voice_id: '',
            aspect_ratio: 'portrait',
            caption: true,
            script: '',
          },
          submitting: false,
          submitError: '',
          pollTimers: {},   // { [jobId]: intervalId }
          // Audition state
          auditionLoadingId: '',  // voice id currently being synthesized
          auditionPlayingId: '',  // voice id currently playing
          auditionCache: {},      // { voice_id: audio_url } — short-circuit repeat clicks
          // Filter / search state
          // Selected chip ids (e.g. "gender:female", "10" for chanjing
          // tag id 10). The chip filter is OR within a category, AND
          // across categories. Aspect chips ("aspect:*") are not
          // rendered — the format toggle above already covers that.
          selectedTagIds: [],
          // chanjing-specific avatar order. Default ``latest`` so the
          // picker surfaces newly added templates instead of the
          // long-tail ID-ascending bottom of the catalog. jogg ignores
          // this param at the adapter layer.
          avatarSort: 'latest',
          // Rendered window over filteredAvatars. Chanjing accounts can
          // expose 720+ avatars and Alpine's x-for re-evaluates ~8
          // bindings per node on every state change — DOM-bound diffs
          // were producing 1-4s click stalls. Cap initial render and
          // expose a "show more" button so users can opt into the
          // larger set on demand.
          visibleAvatarLimit: 60,
          // Same render-window for voices. jogg returns 400+ voices and
          // each row carries ~10 reactive bindings (gender/age/lang
          // labels + audition button states). Capping initial display
          // keeps Alpine's binding cost bounded.
          visibleVoiceLimit: 50,
          voiceFilter: 'all',     // 'all' | 'best' | 'male' | 'female'
          voiceSearch: '',
          pastVideosExpanded: false,
          showAllJobs: false,
          // Submission feedback
          flashJobId: '',         // briefly highlight a newly-submitted job
        },

        // Video lightbox player
        // ``muted`` is the initial mute state for the lightbox <video>.
        // Default false so the existing "play a generated video" callers
        // (job done → click thumbnail → play with sound) still work.
        // Asset previews override this to mirror the per-shot toggle.
        videoPlayer: { open: false, url: '', poster: '', downloadUrl: '', muted: false },

        get activeJobsCount() {
          return this.videoModal.jobs.filter(
            j => j.status === 'pending' || j.status === 'processing'
          ).length;
        },

        get hasJobs() {
          return this.videoModal.jobs.length > 0;
        },

        // Defensive: dedupe + drop empty-id items so x-for never collides on
        // an empty-string fallback key. Some Chanjing accounts return malformed
        // rows, and Alpine's x-for crashes on duplicate/undefined :key, taking
        // the entire grid down.
        get uniqueAvatars() {
          const seen = new Set();
          return (this.videoModal.avatars || []).filter(a => {
            if (!a || !a.id || seen.has(a.id)) return false;
            seen.add(a.id);
            return true;
          });
        },
        get uniqueVoices() {
          const seen = new Set();
          return (this.videoModal.voices || []).filter(v => {
            if (!v || !v.id || seen.has(v.id)) return false;
            seen.add(v.id);
            return true;
          });
        },
        // Cached. Refreshed by $watch on (form.avatar_id, videoModal.avatars).
        // Without this, every getter access ran an O(N) find() on the
        // 720-element avatar Proxy.
        get selectedAvatar() {
          return this.cachedSelectedAvatar;
        },
        get selectedVoice() {
          return this.uniqueVoices.find(v => v.id === this.videoModal.form.voice_id) || null;
        },
        _refreshSelectedAvatar() {
          const id = this.videoModal.form.avatar_id;
          this.cachedSelectedAvatar = id
            ? (this.uniqueAvatars.find(a => a.id === id) || null)
            : null;
        },
        get canSubmitVideo() {
          const m = this.videoModal;
          if (m.submitting || m.listsLoading) return false;
          if (!m.selectedProviderId) return false;
          if (!m.form.avatar_id || !m.form.voice_id) return false;
          if (!m.form.script || m.form.script.length === 0 || m.form.script.length > 4000) return false;
          return true;
        },

        get auditionPreviewText() {
          // First 20 chars of the script (after trim) — used as the TTS prompt
          // for per-voice audition. Empty string if no script yet.
          const s = (this.videoModal.form.script || '').trim();
          return s.slice(0, 20);
        },

        get auditionCanPlay() {
          return this.auditionPreviewText.length > 0;
        },

        // WYSIWYG subtitle preview. When the user has typed a script,
        // render the first chunk of THEIR text in the chosen style —
        // they see exactly how their subtitles will look (matters
        // because Chinese vs Latin glyphs render strokes very
        // differently). Empty script falls back to a locale-pure
        // i18n string ("Sample subtitle" / "示例字幕"). Old design
        // hardcoded mixed "Sample subtitle 示例字幕" which always
        // looked wrong in the locale that wasn't actively chosen.
        get subtitlePreviewText() {
          const s = (this.videoModal.form.script || '').trim();
          if (s) return s.slice(0, 16);
          return t('vg_subtitle_preview_text');
        },

        // Collapse identical broll-warning entries into one row each so the
        // banner shows "Insufficient credits — ..." once with "×4" instead
        // of four lookalike lines. Order is preserved by first occurrence.
        groupBrollWarnings(warnings) {
            if (!Array.isArray(warnings)) return [];
            const groups = [];
            const seen = new Map();  // error string → group index
            for (const w of warnings) {
              const err = (w && w.error) || '';
              if (seen.has(err)) {
                groups[seen.get(err)].shots.push(w.idx);
              } else {
                seen.set(err, groups.length);
                groups.push({ error: err, shots: [w.idx] });
              }
            }
            return groups;
        },

        // Switching format may invalidate the currently-selected avatar
        // (e.g. user picked a portrait Jogg template and then flipped to
        // landscape — the avatar grid will hide it, but the form would
        // still hold its id). Clear the selection in that case so the
        // submit button visibly resets and the user re-picks deliberately.
        setAspectRatio(ratio) {
          this.videoModal.form.aspect_ratio = ratio;
          this.videoModal.visibleAvatarLimit = 60;
          const sel = this.uniqueAvatars.find(a => a.id === this.videoModal.form.avatar_id);
          if (sel && sel.extras && sel.extras.native_aspect_ratio && sel.extras.native_aspect_ratio !== ratio) {
            this.videoModal.form.avatar_id = '';
            this.videoModal.form.voice_id = '';
          }
          // Aspect changed → previous matches are aspect-bound and may
          // no longer fit. Re-fetch suggestions for the new aspect.
          this.loadBrollSuggestions();
        },

        // ── Avatar filter ──
        // ── Cross-provider chip filter ──
        // Selected chips are grouped by category. Match rule:
        //   * AND across categories (every selected category must match)
        //   * OR within a category (any chip in that category satisfies)
        // Each avatar's ``extras.tag_ids`` is a flat array of token
        // strings — chanjing's real ids stringified ("10") plus
        // synthetic tokens ("gender:female"). One algorithm covers
        // both providers. The actual matching runs against the
        // pre-built tag Sets on ``avatarIndex`` (see _matchesChipsIdx);
        // this section just maps a flat token array into the
        // category-grouped form the matcher expects.
        _categoryOfTag(tagId) {
          for (const cat of this.videoModal.avatarTags || []) {
            if ((cat.tags || []).some(t => t.id === tagId)) return cat.id;
          }
          return null;
        },

        // Chip-label localization. Backend ships zh-CN names by default
        // (matches MCP / non-web callers). For the web picker we look
        // up i18n by the stable id; fall back to backend-provided
        // ``cat.name`` / ``tag.name`` so chanjing real-tag categories
        // (whose ids are numeric and have no i18n key) keep their
        // upstream label. The ``chip_v_*`` key swaps the colon in
        // tag.id for an underscore so JS object keys stay clean.
        chipCategoryLabel(cat) {
          const key = 'chip_cat_' + cat.id;
          const v = (typeof t === 'function' ? t(key) : key);
          return v === key ? (cat.name || cat.id) : v;
        },
        chipValueLabel(tag) {
          const key = 'chip_v_' + String(tag.id || '').replace(':', '_');
          const v = (typeof t === 'function' ? t(key) : key);
          return v === key ? (tag.name || tag.id) : v;
        },
        _selectedByCategory() {
          const out = {};
          for (const id of this.videoModal.selectedTagIds) {
            const catId = this._categoryOfTag(id);
            if (!catId) continue;
            (out[catId] ||= []).push(id);
          }
          return out;
        },

        // Cached. Recomputed only when avatars / aspect /
        // selectedTagIds change (see init's $watch chain). Without this
        // memo, every chip click triggered 4-5 redundant 720-iteration
        // filter passes per render.
        get filteredAvatars() {
          return this.cachedFilteredAvatars;
        },

        // The actual list bound to ``x-for``. Capping the rendered
        // count at ``visibleAvatarLimit`` keeps Alpine's binding cost
        // bounded — without it, filter toggles re-diff hundreds of
        // DOM nodes and stall the click handler for 1-4 seconds.
        get displayedAvatars() {
          return this.cachedFilteredAvatars.slice(0, this.videoModal.visibleAvatarLimit);
        },
        get hasMoreAvatars() {
          return this.cachedFilteredAvatars.length > this.videoModal.visibleAvatarLimit;
        },
        showMoreAvatars() {
          this.videoModal.visibleAvatarLimit += 60;
        },
        showAllAvatars() {
          // Last-resort full reveal. Users opt in explicitly — they're
          // accepting the render cost in exchange for see-everything.
          this.videoModal.visibleAvatarLimit = this.filteredAvatars.length;
        },

        // Hide the synthetic "aspect" category from chip rendering — the
        // format toggle above already controls aspect filtering, so
        // showing aspect chips would split the same control across two
        // places. Also drop categories whose every chip is empty (no
        // avatar carries the token), so the bar stays uncluttered.
        get visibleAvatarTagCategories() {
          const cats = this.videoModal.avatarTags || [];
          return cats
            .filter(c => c.id !== 'aspect')
            .map(c => ({
              ...c,
              tags: (c.tags || []).filter(t => this.avatarChipCount(t.id) > 0),
            }))
            .filter(c => c.tags.length > 0);
        },

        // O(1) lookups. Caches are populated by the $watch-driven
        // recompute registered in init() — see comments there for why
        // these aren't getters.
        avatarChipCount(tagId) {
          return this.cachedAvatarChipCounts[tagId] || 0;
        },

        _rebuildAvatarIndex() {
          // Plain-JS snapshot of avatars + pre-built tag_ids Set.
          // Critical for perf: every iteration in the filter/count
          // hot loops would otherwise traverse Alpine's reactive
          // Proxies, which add ~1μs per property access. With
          // 720 avatars × multiple property reads × multiple filter
          // passes per click, the Proxy overhead alone was producing
          // multi-second stalls. Plain JS objects skip all of that.
          const seen = new Set();
          const out = [];
          for (const a of (this.videoModal.avatars || [])) {
            if (!a || !a.id || seen.has(a.id)) continue;
            seen.add(a.id);
            const ex = a.extras || {};
            const tagIds = ex.tag_ids || [];
            out.push({
              id: a.id,
              gender: a.gender,
              tagSet: new Set(tagIds),
              native_aspect_ratio: ex.native_aspect_ratio || null,
              raw: a,  // back-reference for the grid render path
            });
          }
          this.avatarIndex = out;
        },

        _matchesAspectIdx(idx, want) {
          if (!idx.native_aspect_ratio) return true;
          return idx.native_aspect_ratio === want;
        },
        _matchesChipsIdx(idx, byCat) {
          const cats = Object.keys(byCat);
          if (cats.length === 0) return true;
          for (const c of cats) {
            const allowed = byCat[c];
            let any = false;
            for (const id of allowed) {
              if (idx.tagSet.has(id)) { any = true; break; }
            }
            if (!any) return false;
          }
          return true;
        },

        _computeFilteredAvatars() {
          const want = this.videoModal.form.aspect_ratio;
          const sel = this._selectedByCategory();
          const out = [];
          for (const idx of this.avatarIndex) {
            if (!this._matchesAspectIdx(idx, want)) continue;
            if (!this._matchesChipsIdx(idx, sel)) continue;
            out.push(idx.raw);
          }
          return out;
        },

        _computeAvatarChipCounts() {
          // Single-pass build of {tagId → count} for every chip,
          // walking the plain index so no Proxy traps.
          const out = {};
          const want = this.videoModal.form.aspect_ratio;
          const aspectFiltered = this.avatarIndex.filter(idx => this._matchesAspectIdx(idx, want));
          const sel = this._selectedByCategory();
          for (const cat of (this.videoModal.avatarTags || [])) {
            for (const tag of (cat.tags || [])) {
              // Trial: replace this category's selection with just this
              // chip, then count avatars that match the resulting set.
              const trial = { ...sel, [cat.id]: [tag.id] };
              let count = 0;
              for (const idx of aspectFiltered) {
                if (this._matchesChipsIdx(idx, trial)) count++;
              }
              out[tag.id] = count;
            }
          }
          return out;
        },

        toggleTagId(tagId) {
          // Reassign the array (don't mutate via push/splice) so
          // Alpine's $watch fires reliably — array mutations through a
          // Proxy don't always trigger watchers, while a fresh
          // assignment always does. The memo system depends on this.
          const arr = this.videoModal.selectedTagIds;
          this.videoModal.selectedTagIds = arr.includes(tagId)
            ? arr.filter(id => id !== tagId)
            : [...arr, tagId];
          // Reset render window — new filter result may not even need
          // 60 cards.
          this.videoModal.visibleAvatarLimit = 60;
          // If the currently selected avatar no longer satisfies the
          // new filter set, clear it — same UX rule as the format toggle.
          const selId = this.videoModal.form.avatar_id;
          if (selId && !this.cachedFilteredAvatars.some(a => a.id === selId)) {
            this.videoModal.form.avatar_id = '';
            this.videoModal.form.voice_id = '';
          }
        },

        clearTagFilters() {
          this.videoModal.selectedTagIds = [];
          this.videoModal.visibleAvatarLimit = 60;
        },

        // ── Avatar sort (chanjing-only) ──
        // Switch the order chanjing serves avatars in (latest / hottest).
        // Refetches because the param is server-side; the per-(config,
        // sort) cache key keeps both orderings in localStorage so
        // toggling back is instant.
        async setAvatarSort(sort) {
          if (this.videoModal.avatarSort === sort) return;
          this.videoModal.avatarSort = sort;
          this.videoModal.visibleAvatarLimit = 60;
          this.videoModal.selectedTagIds = [];
          this.videoModal.form.avatar_id = '';
          this.videoModal.form.voice_id = '';
          if (this.videoModal.selectedProviderId) {
            await this.onProviderChange(this.videoModal.selectedProviderId);
          }
        },

        // Provider type ('chanjing' | 'jogg' | ...) for the currently
        // selected config — drives provider-specific UI like the sort
        // toggle which only makes sense for chanjing.
        get selectedProviderType() {
          const cfg = this.videoModal.providers.find(p => p.id === this.videoModal.selectedProviderId);
          return cfg ? cfg.provider : '';
        },

        // ── Voice search + filter ──
        get voiceCounts() {
          const all = this.uniqueVoices;
          return {
            all: all.length,
            male: all.filter(v => v.gender === 'male').length,
            female: all.filter(v => v.gender === 'female').length,
          };
        },
        get filteredVoices() {
          const list = this.sortedVoices;
          const f = this.videoModal.voiceFilter;
          const q = (this.videoModal.voiceSearch || '').trim().toLowerCase();
          return list.filter(v => {
            // Search by name (case-insensitive substring)
            if (q && !(v.name || '').toLowerCase().includes(q)) return false;
            // Filter by category
            if (f === 'all') return true;
            if (f === 'best') {
              const av = this.cachedSelectedAvatar;
              if (!av) return false;
              return this.voiceMatchScore(v, av) > 0;
            }
            return v.gender === f;
          });
        },

        // Render-window over voices — same rationale as displayedAvatars.
        // jogg can return 400+ voices and binding all of them was a
        // major contributor to the click-handler stalls.
        get displayedVoices() {
          return this.filteredVoices.slice(0, this.videoModal.visibleVoiceLimit);
        },
        get hasMoreVoices() {
          return this.filteredVoices.length > this.videoModal.visibleVoiceLimit;
        },
        showMoreVoices() {
          this.videoModal.visibleVoiceLimit += 50;
        },
        showAllVoices() {
          this.videoModal.visibleVoiceLimit = this.filteredVoices.length;
        },

        // ── Generate button summary ──
        get generateSummary() {
          // Returns a short string describing what's about to be generated.
          // Empty string if not all required fields filled in.
          if (!this.videoModal.selectedProviderId) return '';
          const av = this.selectedAvatar;
          const vo = this.selectedVoice;
          if (!av || !vo) return '';
          const parts = [av.name, vo.name];
          parts.push(t('vg_aspect_' + this.videoModal.form.aspect_ratio));
          if (this.videoModal.form.caption) parts.push(t('vg_caption_short'));
          return parts.join(' · ');
        },

        voiceMatchTooltip(voice) {
          // Hover-text explanation of the ✨/✓/⚠ badge
          const av = this.selectedAvatar;
          if (!av) return '';
          if (av.extras && av.extras.paired_voice_id === voice.id) return t('vg_match_paired_tooltip');
          if (av.gender && voice.gender && av.gender === voice.gender) return t('vg_match_gender_tooltip');
          if (av.gender && voice.gender && av.gender !== voice.gender) return t('vg_match_mismatch_tooltip');
          return '';
        },

        // ── Voice ↔ Avatar matching ──
        // Voices are re-ranked when an avatar is selected so the best match
        // floats to the top. Signals (highest weight first):
        //   1. paired_voice_id (Chanjing only — the avatar's "official" voice)
        //   2. matching gender (hard signal, both providers expose this)
        //   3. matching age (Jogg structured + Chanjing tag-parsed)
        //   4. script-mood ↔ voice-name keyword match (weak heuristic)

        _detectScriptMood(script) {
          if (!script) return null;
          const t = script.toLowerCase();
          if (/限时|优惠|抢|秒杀|促销|直降|低价|包邮|赠品|甩|sale|deal|discount|buy now|shop now/.test(t)) return 'sales';
          if (/故事|回忆|陪伴|温暖|曾经|那时|童年|成长|story|once|memory|remember/.test(t)) return 'narrative';
          if (/分析|数据|报告|研究|趋势|策略|analysis|research|report|data/.test(t)) return 'professional';
          return null;
        },

        _voiceMoodTag(voiceName) {
          if (!voiceName) return null;
          if (/带货|促销|sale/i.test(voiceName)) return 'sales';
          if (/情感|故事|narrat|story/i.test(voiceName)) return 'narrative';
          if (/商务|主播|news|business/i.test(voiceName)) return 'professional';
          return null;
        },

        voiceMatchScore(voice, avatar) {
          if (!voice || !avatar) return 0;
          let score = 0;
          // Paired voice — overrides everything else
          if (avatar.extras && avatar.extras.paired_voice_id === voice.id) {
            score += 1000;
          }
          // Gender (most jarring when wrong)
          if (avatar.gender && voice.gender && avatar.gender === voice.gender) {
            score += 50;
          } else if (avatar.gender && voice.gender && avatar.gender !== voice.gender) {
            score -= 30;  // explicit penalty for cross-gender
          }
          // Age
          if (avatar.age && voice.age && avatar.age === voice.age) {
            score += 20;
          }
          // Mood (script ↔ voice name) — script side is cached so we
          // don't re-regex on every score call (the sort runs N log N
          // comparisons and would amplify a per-call regex by ~9x).
          const mood = this.cachedScriptMood;
          if (mood) {
            const vMood = this._voiceMoodTag(voice.name);
            if (vMood && mood === vMood) score += 15;
          }
          return score;
        },

        voiceMatchLabel(voice) {
          // Short badge label shown next to voice in the dropdown.
          const av = this.selectedAvatar;
          if (!av) return '';
          if (av.extras && av.extras.paired_voice_id === voice.id) return '✨';
          if (av.gender && voice.gender && av.gender === voice.gender) return '✓';
          if (av.gender && voice.gender && av.gender !== voice.gender) return '⚠';
          return '';
        },

        voiceLangLabel(lang) {
          // Translate provider language strings ("multilingual", "english", "cn"...)
          // to the active locale. Falls back to the raw value if no translation
          // exists for that key.
          if (!lang) return '';
          const lower = String(lang).toLowerCase().trim();
          const key = 'vg_lang_' + lower;
          const translated = t(key);
          return translated === key ? lang : translated;
        },

        // Cached sort. Refresh runs O(N log N) once per dependency
        // change (selected avatar / voice list / script mood) instead
        // of on every binding access. Read-only beyond that.
        get sortedVoices() {
          return this.cachedSortedVoices;
        },
        _refreshSortedVoices() {
          const list = this.uniqueVoices;
          const av = this.cachedSelectedAvatar;
          if (!av || list.length === 0) {
            this.cachedSortedVoices = list;
            return;
          }
          this.cachedSortedVoices = [...list].sort(
            (a, b) => this.voiceMatchScore(b, av) - this.voiceMatchScore(a, av)
          );
        },

        pickBestVoiceFor(avatar) {
          // Top of the cached sort already IS the best match for the
          // currently-selected avatar. When called from selectAvatar
          // (right after avatar_id is set), we still need to do a
          // one-off sort because the cache hasn't refreshed yet — but
          // we use voiceMatchScore which is now cheap (script-mood
          // pre-cached). Bounded N voices, runs once per click.
          if (!avatar) return null;
          let best = null;
          let bestScore = -Infinity;
          for (const v of this.uniqueVoices) {
            const s = this.voiceMatchScore(v, avatar);
            if (s > bestScore) { bestScore = s; best = v; }
          }
          return best;
        },

        // ── Memo caches ──
        // Plain (non-getter) fields avoid Alpine's "getters re-run on
        // every access" trap. Populated by the $watch-driven recompute
        // registered in init(); reads are O(1).
        cachedAvatarChipCounts: {},
        cachedFilteredAvatars: [],
        // Plain JS snapshot of avatars (no reactive Proxy traps in the
        // filter/count hot loops). Each entry carries a pre-built Set
        // of tag_ids so chip matching is O(1) instead of O(L) per
        // chip-token check.
        avatarIndex: [],
        // Voice-side memos. ``sortedVoices`` was a getter doing a full
        // O(N log N) sort + per-pair regex on every access — with
        // jogg's hundreds of voices that produced multi-second stalls
        // when picking an avatar. Now computed once per dependency
        // change (selected avatar / voices / script mood).
        cachedSortedVoices: [],
        cachedSelectedAvatar: null,
        cachedScriptMood: null,

        async init() {
          document.title = t('creations_title') + ' - OpenLucid';

          // ── Real memoization ──
          // Alpine getters re-run on every access. With 720 avatars,
          // ``filteredAvatars`` was being recomputed 4-5 times per
          // render (displayedAvatars + length + hasMoreAvatars + count
          // tooltip), each pass iterating reactive Proxies. Cache both
          // chipCounts AND filteredAvatars; rebuild only when one of
          // the watched inputs changes.
          //
          // ``avatarIndex`` is rebuilt only when the underlying
          // ``videoModal.avatars`` reference changes — this is where we
          // unwrap reactive Proxies into plain objects so the hot
          // filter loop never crosses a Proxy trap.
          const recomputeAll = () => {
            this.cachedFilteredAvatars = this._computeFilteredAvatars();
            this.cachedAvatarChipCounts = this._computeAvatarChipCounts();
          };
          this.$watch('videoModal.avatars', () => {
            this._rebuildAvatarIndex();
            recomputeAll();
            // Avatar list change can invalidate selectedAvatar.
            this._refreshSelectedAvatar();
            this._refreshSortedVoices();
          });
          this.$watch('videoModal.avatarTags', recomputeAll);
          this.$watch('videoModal.selectedTagIds', recomputeAll);
          this.$watch('videoModal.form.aspect_ratio', recomputeAll);

          // ── Voice-side memos ──
          // Picking an avatar (or changing the script) shouldn't re-sort
          // hundreds of voices on every binding access. These watchers
          // refresh the caches once per real dependency change.
          this.$watch('videoModal.form.avatar_id', () => {
            this._refreshSelectedAvatar();
            this._refreshSortedVoices();
          });
          this.$watch('videoModal.voices', () => {
            this._refreshSortedVoices();
          });
          this.$watch('videoModal.form.script', () => {
            this.cachedScriptMood = this._detectScriptMood(this.videoModal.form.script);
            this._refreshSortedVoices();
          });

          // Reset voice render window whenever the filter/search
          // narrows — keeps the list at a sane size during chip
          // navigation rather than carrying a "show all 400" state.
          this.$watch('videoModal.voiceFilter', () => {
            this.videoModal.visibleVoiceLimit = 50;
          });
          this.$watch('videoModal.voiceSearch', () => {
            this.videoModal.visibleVoiceLimit = 50;
          });


          // Populate the Source filter from /api/v1/apps. Only
          // category="content_creation" apps actually write to
          // creations (kb_qa / asset_tagging never do, listing them
          // would be permanent-empty noise). Lang follows the UI
          // locale so an English session sees "Script Writer", not
          // "视频脚本".
          const lang = (typeof getApiLang === 'function' ? getApiLang() : 'zh').slice(0, 2);
          try {
            const r = await fetch(`/api/v1/apps?lang=${lang}`);
            if (r.ok) {
              const all = await r.json();
              this.webuiApps = all.filter(a => a.category === 'content_creation');
            }
          } catch (e) { console.warn('Failed to load apps registry for filter:', e); }

          // Source-counts drive the dropdown — only sources with at
          // least 1 creation are rendered, with their count appended to
          // the label. Dead options (e.g. "选题工坊" when the user has
          // never used it) are hidden so the picker only ever shows
          // useful filters.
          await this.reloadSourceCounts();
          await this.reloadOfferCounts();

          await this.reload();

          const urlParams = new URLSearchParams(location.search);

          // Auto-open video modal when redirected from Script Writer "Generate Video" button
          const openVideoId = urlParams.get('open_video');
          if (openVideoId) {
            history.replaceState(null, '', location.pathname);
            const res = await fetch(`/api/v1/creations/${openVideoId}`).catch(() => null);
            if (res?.ok) {
              const creation = await res.json();
              await this.openVideoModal(creation);
            }
          }

          // Flash-highlight a creation when arriving from an app's "View in Library" link
          const highlightId = urlParams.get('highlight');
          if (highlightId) {
            history.replaceState(null, '', location.pathname);
            this.flashCreationId = highlightId;
            await this.$nextTick();
            const el = document.querySelector(`[data-creation-id="${highlightId}"]`);
            if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            setTimeout(() => { this.flashCreationId = ''; }, 2400);
          }
        },

        async reload() {
          this.loading = true;
          try {
            const params = new URLSearchParams({
              page: this.page,
              page_size: this.pageSize,
            });
            if (this.searchQ) params.set('q', this.searchQ);
            if (this.filterSource) params.set('source_app', this.filterSource);
            if (this.filterOffer) params.set('offer_id', this.filterOffer);
            const res = await fetch(`/api/v1/creations?${params}`);
            if (res.ok) {
              const data = await res.json();
              this.items = data.items || [];
              this.total = data.total || 0;
            }
          } catch (e) { console.error(e); }
          finally { this.loading = false; }
        },

        async reloadSourceCounts() {
          try {
            const res = await fetch('/api/v1/creations/source-counts');
            if (res.ok) this.sourceCounts = await res.json();
          } catch (e) {
            console.warn('Failed to load source counts:', e);
            this.sourceCounts = {};
          }
        },

        async reloadOfferCounts() {
          try {
            const res = await fetch('/api/v1/creations/offer-counts');
            if (res.ok) this.offerCounts = await res.json();
          } catch (e) {
            console.warn('Failed to load offer counts:', e);
            this.offerCounts = [];
          }
        },

        // Lookup offer name by id — used by the chip on each creation
        // card. Returns the raw id when no match (forward-compat for
        // newly created offers not yet reflected in offerCounts).
        offerName(offerId) {
          if (!offerId) return '';
          const m = (this.offerCounts || []).find(o => o.offer_id === offerId);
          return m ? m.name : offerId.slice(0, 8);
        },

        // ── Visible source options ──
        // Builds a list of {value, label, count} from sourceCounts
        // intersected with the known option set. Hides anything with
        // count 0 — the dropdown stays clean. The aggregate "external
        // (MCP)" option sums any source_app starting with "mcp:" so a
        // user with mcp:claude-code creations gets a single entry.
        get visibleSourceOptions() {
          const counts = this.sourceCounts || {};
          const out = [];
          // 1. Known content_creation apps from /api/v1/apps
          for (const app of (this.webuiApps || [])) {
            const n = counts[app.app_id] || 0;
            if (n > 0) out.push({ value: app.app_id, label: app.name, count: n });
          }
          // 2. MCP aggregate — any "mcp:*" key
          let mcpTotal = 0;
          for (const k in counts) {
            if (k && k.startsWith('mcp:')) mcpTotal += counts[k];
          }
          if (mcpTotal > 0) {
            out.push({ value: 'mcp:*', label: t('creations_source_mcp'), count: mcpTotal });
          }
          // 3. Manual
          if ((counts.manual || 0) > 0) {
            out.push({ value: 'manual', label: t('creations_source_manual'), count: counts.manual });
          }
          return out;
        },

        get totalSourceCount() {
          let total = 0;
          for (const k in (this.sourceCounts || {})) total += this.sourceCounts[k] || 0;
          return total;
        },

        openNew() {
          this.modal = {
            open: true,
            mode: 'new',
            data: { title: '', content: '', content_type: 'general', source_note: '' },
            tagsText: '',
            saving: false,
          };
        },

        openDetail(c) {
          this.modal = {
            open: true,
            mode: 'edit',
            data: { ...c },
            tagsText: (c.tags || []).join(', '),
            saving: false,
          };
        },

        closeModal() {
          this.modal.open = false;
        },

        async save() {
          this.modal.saving = true;
          try {
            const tags = this.modal.tagsText
              ? this.modal.tagsText.split(',').map(t => t.trim()).filter(Boolean)
              : null;
            const body = {
              title: this.modal.data.title,
              content: this.modal.data.content,
              content_type: this.modal.data.content_type || 'general',
              tags,
              source_note: this.modal.data.source_note || null,
            };
            let res;
            if (this.modal.mode === 'new') {
              body.source_app = 'manual';
              res = await fetch('/api/v1/creations', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body),
              });
            } else {
              res = await fetch(`/api/v1/creations/${this.modal.data.id}`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body),
              });
            }
            if (res.ok) {
              this.modal.open = false;
              await this.reload();
            } else {
              const err = await res.json().catch(() => ({}));
              toast.error((err.error?.message || err.detail || 'Save failed'));
            }
          } catch (e) {
            toast.error('Save failed: ' + e.message);
          }
          this.modal.saving = false;
        },

        async confirmDelete(c) {
          if (!confirm(t('creations_confirm_delete') + '\n\n' + c.title)) return;
          try {
            const res = await fetch(`/api/v1/creations/${c.id}`, { method: 'DELETE' });
            if (res.ok || res.status === 204) await this.reload();
          } catch (e) { console.error(e); }
        },

        // ── Video generation modal ──

        async openVideoModal(creation, options = {}) {
          this.videoModal.open = true;
          this.videoModal.creation = creation;
          this.videoModal.jobs = [];
          this.videoModal.avatars = [];
          this.videoModal.voices = [];
          this.videoModal.selectedProviderId = '';
          this.videoModal.listsError = '';
          this.videoModal.submitError = '';
          this.videoModal.selectedTagIds = [];
          this.videoModal.voiceFilter = 'all';
          this.videoModal.voiceSearch = '';
          // Open with history pre-expanded if caller (e.g. video badge click) asked
          this.videoModal.pastVideosExpanded = !!options.openHistory;
          this.videoModal.showAllJobs = false;
          // Auto-infer aspect_ratio from platform (douyin/tiktok → portrait, etc.)
          const platformAspect = {
            douyin: 'portrait', wechat_video: 'portrait', tiktok: 'portrait',
            youtube_shorts: 'portrait', xiaohongshu: 'portrait',
          };
          const pid = creation.structured_content?.platform_id;
          const inferredAspect = (pid && platformAspect[pid]) || 'portrait';
          this.videoModal.form = {
            avatar_id: '',
            voice_id: '',
            aspect_ratio: inferredAspect,
            caption: true,
            subtitle_style: 'classic',
            subtitle_color: '',
            subtitle_stroke: '',
            broll: false,
            // Deep-clone the AI director's plan so edits here don't mutate
            // the stored creation.structured_content.broll_plan.
            broll_plan: (() => {
              const plan = creation?.structured_content?.broll_plan;
              return Array.isArray(plan) ? JSON.parse(JSON.stringify(plan)) : [];
            })(),
            // Per-job B-roll model override. Hydrated below from the
            // video_gen capability default; user can change in the toolbar.
            broll_provider_config_id: '',
            broll_model_code: '',
            script: this._extractNarration(creation),
          };
          this.videoModal.brollModelOptions = [];

          // Load providers + existing jobs + capability defaults in parallel
          this.videoModal.providersLoading = true;
          this.videoModal.jobsLoading = true;
          try {
            // Pass UI language so the dropdown labels render localized.
            // Without ?lang= the backend defaults to zh-CN and English-UI
            // users see Chinese labels mixed in (`字节` / `快手` / `推荐`).
            const lang = (typeof getApiLang === 'function' ? getApiLang() : 'zh').slice(0, 2);
            const [pr, jr, cr] = await Promise.all([
              fetch('/api/v1/media-providers'),
              fetch(`/api/v1/creations/${creation.id}/videos`),
              fetch(`/api/v1/settings/media-capabilities?lang=${lang}`),
            ]);
            if (pr.ok) {
              const all = await pr.json();
              // Avatar (talking-head) providers only — Google/Veo doesn't
              // do avatars, it's our B-roll engine and is selected via the
              // video_gen capability default, not from this picker.
              this.videoModal.providers = all.filter(p => p.is_active && p.provider !== 'google');
            }
            if (cr.ok) {
              const caps = await cr.json();
              const videoGen = (caps.capabilities || []).find(c => c.capability === 'video_gen');
              if (videoGen) {
                // Drop options without a model_code (e.g. tts-style placeholders).
                // Keep ghost (available=false) options so users see what
                // exists; they're rendered disabled.
                this.videoModal.brollModelOptions = (videoGen.options || []).filter(o => o.model_code);
                // Pre-select the system default; if absent, fall back to the
                // first AVAILABLE option (never auto-select a disabled ghost).
                if (videoGen.current_provider_config_id && videoGen.current_model_code) {
                  this.videoModal.form.broll_provider_config_id = videoGen.current_provider_config_id;
                  this.videoModal.form.broll_model_code = videoGen.current_model_code;
                } else {
                  const firstReal = this.videoModal.brollModelOptions.find(o => o.available);
                  if (firstReal) {
                    this.videoModal.form.broll_provider_config_id = firstReal.provider_config_id;
                    this.videoModal.form.broll_model_code = firstReal.model_code;
                  }
                }
              }
            }
            if (jr.ok) {
              this.videoModal.jobs = await jr.json();
            }
          } catch (e) {
            console.error(e);
          } finally {
            this.videoModal.providersLoading = false;
            this.videoModal.jobsLoading = false;
          }

          // Pick smart default provider based on script language
          if (this.videoModal.providers.length > 0) {
            const def = this.pickDefaultProvider(this.videoModal.form.script);
            await this.onProviderChange(def.id);
          }

          // Kick off asset suggestions for each broll shot. Fires once
          // we have the broll_plan + aspect_ratio settled. Silent fail —
          // the modal is fully usable without suggestions.
          this.loadBrollSuggestions();

          // If any existing job is non-terminal, start polling it
          for (const job of this.videoModal.jobs) {
            if (job.status === 'pending' || job.status === 'processing') {
              this.startPolling(job.id);
            }
          }

          // If there are completed videos, show history first (more useful than empty form)
          const hasCompleted = this.videoModal.jobs.some(j => j.status === 'completed');
          if (hasCompleted && !options.openHistory) {
            this.videoModal.pastVideosExpanded = true;
          }
        },

        closeVideoModal() {
          // Stop all active polling timers
          for (const [, timerId] of Object.entries(this.videoModal.pollTimers)) {
            clearInterval(timerId);
          }
          this.videoModal.pollTimers = {};
          // Stop any audition playback + clear cache (script may change next session)
          const audio = this.$refs.auditionAudio;
          if (audio) {
            audio.pause();
            audio.currentTime = 0;
          }
          this.videoModal.auditionPlayingId = '';
          this.videoModal.auditionLoadingId = '';
          this.videoModal.auditionCache = {};
          this.videoModal.open = false;
        },

        _isVideoReady(contentType) {
          // Content types that can go directly to video generation
          return contentType === 'script_video' || contentType === 'script_writer';
        },

        _isRecreatable(contentType) {
          // Content types that should offer "Open in Creator" instead of Generate Video
          // Excludes: video-ready (has its own button)
          if (!contentType) return true;
          if (contentType === 'script_video' || contentType === 'script_writer') return false;
          return true;
        },

        _recreatorApp(contentType) {
          // Route text-oriented content back to Content Studio; everything else → Script Writer.
          const textTypes = ['text_post', 'article', 'thread', 'post', 'xhs_post'];
          if (contentType && textTypes.includes(contentType)) return '/content-studio.html';
          return '/script-writer.html';
        },

        goRecreate(creation) {
          const p = new URLSearchParams();
          if (creation.offer_id) p.set('offer_id', creation.offer_id);
          p.set('ref_creation_id', creation.id);
          window.location.href = `${this._recreatorApp(creation.content_type)}?${p}`;
        },

        openVideoPlayer(url, poster, opts = {}) {
          this.videoPlayer = {
            open: true,
            url,
            poster: poster || '',
            downloadUrl: url,
            // muted defaults false (legacy callers expect playback with
            // sound); asset-preview path explicitly passes true/false to
            // mirror the broll card's audio toggle.
            muted: !!opts.muted,
          };
          // Pause any small inline videos
          document.querySelectorAll('.video-modal-body video').forEach(v => v.pause());
        },
        closeVideoPlayer() {
          this.videoPlayer.open = false;
          // Let the <video> unload by clearing URL after transition
          setTimeout(() => { if (!this.videoPlayer.open) this.videoPlayer.url = ''; }, 300);
        },

        // Open the user's asset (matched broll) in the existing video
        // lightbox so they can preview what they're about to splice into
        // their final video. Image assets aren't supported in the lightbox
        // (it expects a <video>) — the thumbnail click is video-only.
        //
        // ``shot`` is the broll_plan entry whose matched_asset is being
        // previewed. We pass its asset_audio flag through as the lightbox's
        // initial mute state so preview mirrors generation: card toggle
        // OFF → preview opens muted; toggle ON → preview opens with sound.
        // The native HTML5 audio control still lets the user temporarily
        // unmute (e.g. to evaluate "should I enable this for the final
        // video?"); that override is preview-only and never feeds back
        // to the card toggle.
        openAssetPreview(shot) {
          const asset = shot && shot.matched_asset;
          if (!asset || !asset.id) return;
          if (asset.asset_type !== 'video') return;
          this.openVideoPlayer(
            `/api/v1/assets/${asset.id}/file`,
            `/api/v1/assets/${asset.id}/thumbnail`,
