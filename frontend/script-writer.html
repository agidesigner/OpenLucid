<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenLucid</title>
  <script>
    document.documentElement.style.display='none';
    fetch('/api/v1/auth/me').then(r=>{
      if(!r.ok) fetch('/api/v1/auth/setup-status').then(r=>r.json()).then(s=>{
        location.href=s.needs_setup?'/install.html':'/signin.html';
      });
      else document.documentElement.style.display='';
    });
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: {
        sidebar: { DEFAULT: '#1C1C28', hover: '#2A2A3C' },
        accent: { DEFAULT: '#155EEF', light: '#EFF4FF', hover: '#1849C6' },
      }}}
    }
  </script>
  <script src="/js/i18n.js"></script>
  <script src="/js/pinned-apps.js"></script>
  <script src="/js/avatar.js"></script>
  <script src="/js/feedback.js"></script>
  <script src="/js/apps-shared.js"></script>
  <script src="/js/header-selectors.js"></script>
  <script src="/js/trend-panel.js"></script>
  <script src="/js/shared.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
  <style>
    [x-cloak]{display:none!important}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',sans-serif}
    .sidebar-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;color:#A0A0B0;font-size:14px;cursor:pointer;transition:all .15s}
    .sidebar-item:hover{background:#2A2A3C;color:#E0E0EE}
    .sidebar-item.active{background:#2D2D40;color:#fff}
    .goal-card{transition:all .15s}
    .goal-card:hover{border-color:#d1d5db}
    .goal-card.selected{border-color:#155EEF;background:rgba(21,94,239,.04)}
    .tone-chip{padding:4px 12px;border-radius:9999px;font-size:12px;border:1px solid #e5e7eb;cursor:pointer;transition:all .12s;white-space:nowrap}
    .tone-chip:hover{border-color:#d1d5db;background:#f9fafb}
    .tone-chip.selected{border-color:#155EEF;background:rgba(21,94,239,.08);color:#155EEF}
    .wc-chip{padding:3px 10px;border-radius:6px;font-size:12px;border:1px solid #e5e7eb;cursor:pointer;transition:all .12s}
    .wc-chip:hover{border-color:#d1d5db}
    .wc-chip.selected{border-color:#155EEF;background:rgba(21,94,239,.08);color:#155EEF}
    .script-output{white-space:pre-wrap;line-height:1.8}
  </style>
</head>
<body class="bg-gray-50 h-screen flex overflow-hidden" x-data="scriptWriter()" x-init="init()">

  <!-- Sidebar -->
  <aside class="w-56 bg-sidebar flex flex-col shrink-0">
    <div class="px-4 py-5 flex items-center gap-2.5">
      <img src="/images/logo.png" alt="OpenLucid" class="w-8 h-8 rounded-lg">
      <span class="text-white font-semibold text-base">OpenLucid</span>
    </div>
    <nav class="flex-1 px-3 space-y-1 mt-2">
      <a href="/" class="sidebar-item">
        <svg class="w-[18px] h-[18px]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
        <span x-text="t('sidebar_offers')"></span>
      </a>
      <a href="/brandkit-list.html" class="sidebar-item">
        <svg class="w-[18px] h-[18px]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.657-1.657a2 2 0 012.828 0l2.829 2.829a2 2 0 010 2.828l-8.486 8.485M7 17h.01"/></svg>
        <span x-text="t('sidebar_brandkit')"></span>
      </a>
      <a href="/creations.html" class="sidebar-item">
        <svg class="w-[18px] h-[18px]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>
        <span x-text="t('sidebar_creations')"></span>
      </a>
      <a href="/video-studio.html" class="sidebar-item">
        <svg class="w-[18px] h-[18px]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
        <span x-text="t('sidebar_videos')"></span>
      </a>
    </nav>
    <div class="px-3 pb-3 mt-auto">
      <div class="text-[10px] text-white/25 text-center">Powered by <a href="https://openlucid.ai/?ref=app" target="_blank" class="hover:text-white/40 transition-colors">OpenLucid</a></div>
    </div>
  </aside>

  <!-- Main -->
  <div class="flex-1 flex flex-col overflow-hidden">
    <!-- Header -->
    <header class="bg-white border-b px-6 shrink-0">
      <div class="h-14 flex items-center gap-2">
        <a href="/" class="text-sm text-gray-400 hover:text-accent" x-text="t('breadcrumb_home')"></a>
        <svg class="w-4 h-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
        <span class="text-sm font-medium text-gray-800" x-text="'🎙️ ' + t('page_title')"></span>
        <div class="flex-1"></div>
        <div class="flex items-center gap-3">
          <a href="/setting.html?section=mcp" class="inline-flex items-center gap-1.5 text-xs font-medium text-gray-500 hover:text-gray-700 border border-gray-200 hover:border-gray-300 px-2.5 py-1.5 rounded-lg transition-colors">
            <span class="w-1.5 h-1.5 bg-green-400 rounded-full"></span>
            MCP
          </a>
          <div id="avatar-mount"></div>
        </div>
      </div>
      <!-- Selectors row -->
      <div class="pb-4 flex items-center gap-4 flex-wrap">
        <!-- Offer -->
        <div class="flex items-center gap-2">
          <label class="text-sm text-gray-500 shrink-0" x-text="t('offer_label')"></label>
          <select x-model="offerId" @change="onOfferChange()"
                  class="border border-gray-200 rounded-lg px-3 py-1.5 text-sm text-gray-700 bg-white focus:outline-none focus:ring-2 focus:ring-accent/20 focus:border-accent min-w-[14rem]">
            <template x-for="o in offers" :key="o.id">
              <option :value="o.id" x-text="o.name"></option>
            </template>
          </select>
        </div>
        <!-- Strategy Unit -->
        <div class="flex items-center gap-2" x-show="offerId && strategyUnits.length > 0" x-cloak>
          <label class="text-sm text-gray-500 shrink-0" x-text="t('strategy_label')"></label>
          <select x-model="strategyUnitId" @change="onStrategyChange()"
                  class="border border-gray-200 rounded-lg px-3 py-1.5 text-sm text-gray-700 bg-white focus:outline-none focus:ring-2 focus:ring-accent/20 focus:border-accent min-w-[10rem]">
            <option value="" x-text="t('strategy_none')"></option>
            <template x-for="su in strategyUnits" :key="su.id">
              <option :value="su.id" x-text="su.name"></option>
            </template>
          </select>
        </div>
        <!-- LLM model — composite (config_id::model_name) keys; expose
             every model the saved endpoints can serve, not just defaults. -->
        <div class="flex items-center gap-2" x-show="modelOptions.length > 0" x-cloak>
          <label class="text-sm text-gray-500 shrink-0" x-text="t('model_label')"></label>
          <select x-model="modelKey" @change="onModelChange()"
                  class="border border-gray-200 rounded-lg px-3 py-1.5 text-sm text-gray-700 bg-white focus:outline-none focus:ring-2 focus:ring-accent/20 focus:border-accent min-w-[10rem]">
            <template x-for="m in modelOptions" :key="m.key">
              <option :value="m.key" x-text="m.label"></option>
            </template>
          </select>
        </div>
      </div>
    </header>

    <main class="flex-1 overflow-y-auto">
      <!-- No offer selected -->
      <div x-show="!offerId" class="flex flex-col items-center justify-center h-full">
        <div class="w-16 h-16 bg-accent/10 rounded-2xl flex items-center justify-center mb-4 text-3xl">🎙️</div>
        <p class="text-gray-600 text-sm mb-1 font-medium" x-text="t('empty_title')"></p>
        <p class="text-gray-400 text-sm" x-text="t('empty_hint')"></p>
      </div>

      <!-- Has offer -->
      <div x-show="offerId" class="p-6">
        <div class="flex gap-5">

          <!-- Left: Context Panel -->
          <div class="w-72 shrink-0 flex flex-col gap-4">
            <div class="bg-white rounded-xl border p-5 sticky top-0">
              <h3 class="font-semibold text-gray-800 mb-4 flex items-center gap-2">
                <span x-text="t('context_title')"></span>
                <span x-show="loadingCtx" class="text-xs text-gray-400 font-normal" x-text="t('loading')"></span>
              </h3>

              <div x-show="contextData" class="space-y-3">
                <div>
                  <div class="text-xs text-gray-400 mb-0.5" x-text="t('offer_name_label')"></div>
                  <div class="text-sm font-medium text-gray-800" x-text="contextData?.offer_name || '-'"></div>
                </div>

                <div x-show="selectedUnit">
                  <div class="text-xs text-gray-400 mb-0.5" x-text="t('strategy_name_label')"></div>
                  <div class="text-sm font-medium text-gray-800" x-text="selectedUnit?.name || '-'"></div>
                  <div x-show="selectedUnit?.audience_segment" class="text-xs text-gray-400 mt-1" x-text="selectedUnit?.audience_segment"></div>
                  <div x-show="selectedUnit?.scenario" class="text-xs text-gray-400" x-text="selectedUnit?.scenario"></div>
                </div>

                <div class="pt-2 border-t border-gray-50">
                  <div class="flex items-center justify-between text-xs">
                    <span class="text-gray-500" x-text="t('kb_count_label')"></span>
                    <span class="text-gray-700 font-medium" x-text="contextData?.knowledge_count ?? 0"></span>
                  </div>
                </div>

                <div class="pt-2 border-t border-gray-50 flex items-center gap-2">
                  <div :class="(contextData?.knowledge_count ?? 0) > 0 ? 'bg-green-500' : 'bg-orange-400'" class="w-2 h-2 rounded-full shrink-0"></div>
                  <span class="text-xs" :class="(contextData?.knowledge_count ?? 0) > 0 ? 'text-green-600' : 'text-orange-500'"
                        x-text="(contextData?.knowledge_count ?? 0) > 0 ? t('kb_ready') : t('kb_empty_hint')"></span>
                </div>
              </div>
            </div>
          </div>

          <!-- Right: Config + Result -->
          <div class="flex-1 min-w-0 flex flex-col gap-5">

            <!-- Generation Config -->
            <div class="bg-white rounded-xl border p-5">
              <div class="flex items-center justify-between mb-4">
                <h3 class="text-sm font-semibold text-gray-700" x-text="t('config_title')"></h3>
                <button @click="showPromptEditor = true"
                        class="inline-flex items-center gap-1 text-[11px] text-gray-400 hover:text-accent transition-colors"
                        :title="t('prompt_title')">
                  <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
                  <span x-text="t('prompt_edit_link')"></span>
                </button>
              </div>

              <!-- Trend-bridge — inherited banner (when arriving via topic_plan_id) -->
              <div x-show="trendInherited" x-cloak
                   class="mb-3 bg-orange-50 border border-orange-200 rounded-lg p-3">
                <div class="text-xs text-orange-700 font-medium flex items-center gap-1.5">
                  <span>🔥</span>
                  <span x-text="t('trend_inherited_banner')"></span>
                  <span class="text-orange-600 font-normal" x-text="trendInherited?.event"></span>
                </div>
                <details class="mt-1.5">
                  <summary class="text-[11px] text-orange-600 cursor-pointer hover:text-orange-800" x-text="t('trend_details')"></summary>
                  <div class="text-[11px] text-orange-700 mt-1 space-y-0.5 pl-1">
                    <div x-show="trendInherited?.keywords?.length">
                      <span class="opacity-70" x-text="t('trend_keywords') + ':'"></span>
                      <span x-text="(trendInherited?.keywords || []).join('、')"></span>
                    </div>
                    <div x-show="trendInherited?.public_attention">
                      <span class="opacity-70" x-text="t('trend_attention') + ':'"></span>
                      <span x-text="trendInherited?.public_attention"></span>
                    </div>
                    <div x-show="trendInherited?.risk_zones?.length">
                      <span class="opacity-70" x-text="t('trend_risks') + ':'"></span>
                      <ul class="list-disc list-inside ml-1">
                        <template x-for="r in (trendInherited?.risk_zones || [])" :key="r"><li x-text="r"></li></template>
                      </ul>
                    </div>
                  </div>
                </details>
              </div>

              <!-- Trend-bridge — direct input panel (collapsible, per-call) -->
              <details class="mb-4 border border-gray-200 rounded-lg overflow-hidden"
                       :open="trendPanelOpen"
                       @toggle="trendPanelOpen = $event.target.open">
                <summary class="px-3 py-2 text-sm font-medium text-gray-700 cursor-pointer select-none hover:bg-gray-50 transition-colors flex items-center gap-2">
                  <span x-text="t('hotspot_panel_label')"></span>
                  <span class="text-xs text-gray-400 font-normal" x-text="t('hotspot_panel_optional')"></span>
                  <span x-show="trendText" x-cloak
                        class="ml-auto text-[11px] bg-orange-50 text-orange-600 px-2 py-0.5 rounded-full font-medium"
                        x-text="(trendText||'').length + ' chars'"></span>
                </summary>
                <div class="px-3 py-3 border-t border-gray-100 space-y-3">
                  <p class="text-xs text-gray-500 leading-relaxed" x-text="t('hotspot_panel_hint')"></p>
                  <div>
                    <label class="block text-xs text-gray-500 mb-1" x-text="t('hotspot_url_label')"></label>
                    <div class="flex gap-2">
                      <input x-model="trendUrl" type="url"
                             :placeholder="t('hotspot_url_placeholder')"
                             class="flex-1 border border-gray-200 rounded-lg px-3 py-1.5 text-sm text-gray-700 focus:outline-none focus:ring-2 focus:ring-accent/20 focus:border-accent">
                      <button type="button"
                              @click="trendExtract()"
                              :disabled="!trendUrl || trendExtracting"
                              class="text-xs font-medium text-accent border border-accent/40 hover:bg-accent/5 disabled:opacity-40 disabled:cursor-not-allowed px-3 py-1.5 rounded-lg transition-colors flex items-center gap-1 shrink-0">
                        <svg x-show="trendExtracting" class="w-3 h-3 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"/></svg>
                        <span x-text="trendExtracting ? t('hotspot_extracting') : t('hotspot_extract_btn')"></span>
                      </button>
                    </div>
                  </div>
                  <div>
                    <div class="flex items-center justify-between mb-1">
                      <label class="block text-xs text-gray-500" x-text="t('hotspot_text_label')"></label>
                      <button type="button" x-show="trendText"
                              @click="trendText=''; trendUrl=''"
                              class="text-[11px] text-gray-400 hover:text-gray-600"
                              x-text="t('hotspot_clear')"></button>
                    </div>
                    <textarea x-model="trendText" rows="6" maxlength="8000"
                              :placeholder="t('hotspot_text_placeholder')"
                              class="w-full border border-gray-200 rounded-lg px-3 py-2 text-xs text-gray-700 font-mono leading-relaxed focus:outline-none focus:ring-2 focus:ring-accent/20 focus:border-accent resize-y"></textarea>
                    <div class="flex items-center justify-between text-[11px] mt-1">
                      <span class="ml-auto text-gray-400 tabular-nums" x-text="(trendText||'').length + ' / 8000'"></span>
                    </div>
                  </div>
                </div>
              </details>

              <!-- Topic -->
              <div class="mb-4">
                <div class="flex items-center justify-between mb-1.5">
                  <label class="text-xs font-medium text-gray-600" x-text="t('topic_label')"></label>
                  <button @click="suggestTopic()"
                          :disabled="!offerId || suggestingTopic"
                          class="text-xs text-accent hover:text-accent-hover disabled:opacity-40 transition flex items-center gap-1">
                    <svg x-show="!suggestingTopic" class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
                    <svg x-show="suggestingTopic" class="w-3 h-3 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"/></svg>
                    <span x-text="t('suggest_topic')"></span>
                  </button>
                </div>
                <textarea x-model="topic"
                          :placeholder="t('topic_placeholder')"
                          rows="2"
                          class="w-full border border-gray-200 rounded-lg px-4 py-2.5 text-sm text-gray-700 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-accent/20 focus:border-accent resize-none"></textarea>
              </div>

              <!-- Composer: Platform × Goal × Persona -->
              <div class="mb-4">
                <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                  <!-- Platform -->
                  <div>
                    <label class="text-[11px] text-gray-400 mb-1 block" x-text="t('platform_label')"></label>
                    <select x-model="platformId"
                            class="w-full border border-gray-200 rounded-lg px-2.5 py-1.5 text-sm text-gray-700 bg-white focus:outline-none focus:ring-2 focus:ring-accent/20 focus:border-accent">
                      <template x-for="p in platforms" :key="p.id">
                        <option :value="p.id" x-text="p.emoji + ' ' + p.name"></option>
                      </template>
                    </select>
                  </div>
                  <!-- Goal -->
                  <div>
                    <label class="text-[11px] text-gray-400 mb-1 block" x-text="t('goal_label')"></label>
                    <!-- Locked from strategy unit -->
                    <div x-show="goalLocked" class="flex items-center gap-1.5 border border-accent/30 bg-accent/5 rounded-lg px-2.5 py-1.5">
                      <span class="text-sm" x-text="goalOptions.find(g=>g.id===goalId)?.emoji || '🎯'"></span>
                      <span class="text-sm text-gray-700 flex-1 truncate" x-text="goalOptions.find(g=>g.id===goalId)?.name || goalId"></span>
                      <span class="text-[10px] text-accent bg-accent/10 px-1.5 py-0.5 rounded-full shrink-0" x-text="t('goal_from_strategy')"></span>
                    </div>
                    <select x-show="!goalLocked" x-model="goalId"
                            class="w-full border border-gray-200 rounded-lg px-2.5 py-1.5 text-sm text-gray-700 bg-white focus:outline-none focus:ring-2 focus:ring-accent/20 focus:border-accent">
                      <template x-for="g in goalOptions" :key="g.id">
                        <option :value="g.id" x-text="g.emoji + ' ' + g.name"></option>
                      </template>
                    </select>
                  </div>
                  <!-- Persona -->
                  <div>
                    <label class="text-[11px] text-gray-400 mb-1 block" x-text="t('persona_label')"></label>
                    <select x-model="personaId"
                            class="w-full border border-gray-200 rounded-lg px-2.5 py-1.5 text-sm text-gray-700 bg-white focus:outline-none focus:ring-2 focus:ring-accent/20 focus:border-accent">
                      <option value="" x-text="t('persona_any')"></option>
                      <template x-for="p in personas" :key="p.id">
                        <option :value="p.id" x-text="p.emoji + ' ' + p.name"></option>
                      </template>
                    </select>
                  </div>
                  <!-- Output Language -->
                  <div>
                    <label class="text-[11px] text-gray-400 mb-1 block" x-text="t('language_label')"></label>
                    <select x-model="outputLang"
                            @change="languageManualOverride = true"
                            class="w-full border border-gray-200 rounded-lg px-2.5 py-1.5 text-sm text-gray-700 bg-white focus:outline-none focus:ring-2 focus:ring-accent/20 focus:border-accent">
                      <option value="zh">🇨🇳 中文</option>
                      <option value="en">🇺🇸 English</option>
                    </select>
                  </div>
                </div>
              </div>

              <!-- Word Count (visible) -->
              <div class="mb-4">
                <label class="text-xs text-gray-500 mb-1.5 block">
                  <span x-text="t('wordcount_label')"></span>
                  <span class="font-normal text-gray-400 ml-1" x-text="t('wordcount_hint')"></span>
                </label>
                <div class="flex items-center gap-2">
                  <template x-for="wc in [100, 150, 200, 300, 500]" :key="wc">
                    <button @click="wordCount = wc"
                            class="wc-chip" :class="wordCount === wc ? 'selected' : ''"
                            x-text="wc"></button>
                  </template>
                  <input type="number" x-model.number="wordCount" min="50" max="2000" step="50"
                         class="w-20 border border-gray-200 rounded-lg px-2.5 py-1 text-sm text-gray-700 text-center focus:outline-none focus:ring-2 focus:ring-accent/20 focus:border-accent">
                </div>
              </div>

              <!-- Reference (visible) -->
              <div class="mb-4">
                <div class="flex items-center justify-between mb-1">
                  <label class="text-xs text-gray-500" x-text="t('reference_label')"></label>
                  <span x-show="refCreationTitle" class="text-[11px] text-accent flex items-center gap-1">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/></svg>

    const DEFAULT_PROMPT_ZH = `你是一位专业的短视频口播文案创作专家。你的任务是根据用户提供的参数，生成可直接用于数字人或真人拍摄的口播文案。

## 核心原则

1. **为嘴巴写字，不为眼睛写字**：文案是念出来的，不是读的。每一句都要适合口播朗读，断句自然，节奏流畅。
2. **禁止书面语**：不用"综上所述""值得一提的是""据了解"等书面表达。用大白话、口语化表达。
3. **3秒定生死**：开头前3秒必须抓住观众，用提问、冲突、悬念或共鸣开场，禁止"大家好，今天给大家分享"这类平淡开头。
4. **一条一个核心信息**：不贪多，一条文案只传递一个关键信息或卖一个点。
5. **适配TTS合成**：避免生僻字、英文缩写、特殊符号。需要停顿的地方用逗号或句号自然断句。不要用省略号、破折号等影响语音合成的标点。

## 生成规则

### 一、按 goal 匹配文案结构

#### goal = 涨粉丝
结构：钩子 → 共鸣/观点 → 深化/转折 → 引导互动
- 开头用提问或反常识观点制造停留："有没有人和我一样…""你以为…其实…"
- 中间输出一个有态度的观点或情感共鸣点，要具体不要空洞
- 结尾引导点赞+关注，用口语化表达
- 禁止硬广、禁止提产品、禁止留联系方式

#### goal = 拿线索
结构：痛点切入 → 专业解法（只说一半）→ 建立信任 → 行动指令
- 开头直击目标人群的具体痛点
- 中间展示专业能力但不给完整方案（留钩子），用案例或数据增强说服力
- 结尾必须有明确的行动指令
- 禁止直接卖货，禁止报价格，重点是"让人来找你"

#### goal = 卖东西
分两种子类型：
**短视频带货版**
结构：场景痛点 → 产品出场 → 卖点展示 → 优惠+逼单
**直播话术版**（word_count ≥ 300 时自动触发）
结构：开场留人 → 产品种草 → 优惠播报 → 逼单话术

#### goal = 传信息
结构：引入 → 知识点分段 → 总结/记忆点
- 开头用一个问题或悬念引入
- 中间按逻辑分 2-3 个小点讲清楚
- 结尾给一个记忆锚点或行动建议

### 二、通用文案质量标准
1. 单句不超过 30 字。超过就拆成两句。
2. 每 3-4 句换一个情绪/话题节点。
3. 口语化检验：禁止"综上所述""据悉""值得注意的是"等书面语。
4. 用阿拉伯数字而非中文数字。
5. 不编造数据，不使用绝对化用语，不涉及违规内容。

### 三、TTS 适配规则
1. 用逗号和句号控制语音节奏。
2. 禁用省略号、破折号、波浪号、括号注释。
3. 大数字用"万""亿"。
4. 尽量用中文替代英文缩写。
5. 适当使用语气词（每100字不超过3个）。

## 输出格式
直接输出文案正文，不加标题、不加引号、不加前缀。

如果 word_count ≥ 300 且 goal = 卖东西，在文案末尾附加结构标注。

如果用户提供了 reference，优先保持参考文案的口吻、节奏和结构。
如果用户的 extra_req 与以上规则冲突，以用户的 extra_req 为准。

## 语言
输出语言必须与知识库内容和选题的语言保持一致。如果知识库是中文，就输出中文文案；如果是英文，就输出英文文案。不要翻译。`;

    const DEFAULT_PROMPT_EN = `You are an expert short-video scriptwriter. Your task is to generate spoken-word scripts that can be directly used for digital human (AI avatar) or live presenter recordings.

## Core Principles

1. **Write for the mouth, not the eye.** Every line must sound natural when spoken aloud — smooth pacing, conversational rhythm, natural pauses.
2. **No formal or written language.** Ban phrases like "In conclusion," "It is worth noting," or "According to reports." Write the way people actually talk — "So here's the thing," "Look," "You know what?"
3. **The first 3 seconds decide everything.** Open with a question, a surprising fact, a relatable pain point, or a bold claim. Never start with "Hi everyone, today I want to share…" or "Welcome back to my channel."
4. **One core message per script.** Don't overload. Each script delivers exactly one key point or sells one angle.
5. **Optimized for TTS.** Avoid jargon, uncommon abbreviations, and special symbols. Use commas and periods for natural pauses. No ellipses, em dashes, or parenthetical asides — they break text-to-speech flow.

## Generation Rules

### Part 1: Structure by Goal

#### goal = Grow Audience

Structure: Hook → Emotional resonance / Bold take → Deepen or pivot → Engagement prompt

- Open with a relatable question or counterintuitive take: "Am I the only one who…" "You think X? Actually…"
- Middle section delivers one clear, opinionated perspective with concrete details — not vague inspiration
- End with a conversational engagement prompt: "If this hits home, drop a follow" "Agree? Let me know in the comments"
- No product mentions, no hard sell, no contact info — pure value and personality
- Best for: personal brand, lifestyle, thought leadership

#### goal = Get Leads

Structure: Pain point → Partial solution (leave a hook) → Build trust → Call to action

- Open by calling out a specific pain point your audience has: "Still struggling with X?" "If you've been dealing with X, stop what you're doing"
- Show expertise with a real example or data point, but don't give the complete solution — leave a reason to reach out
- Close with one clear action: "DM me" "Drop your question in the comments" "Link in bio"
- No direct selling, no pricing — the goal is to get them to come to you
- Best for: consulting, services, coaching, B2B

#### goal = Drive Sales

Two sub-types:

**Short-video version**
Structure: Scenario pain → Product intro → Key selling point → Offer + urgency

- Open with a relatable everyday scenario: "Ever had one of those days where…" "Raise your hand if you've tried X and it didn't work"
- Introduce the product by focusing on 1-2 key benefits — use contrast, numbers, and sensory language instead of listing specs
- Close with a clear offer and urgency: limited time, limited stock, exclusive deal
- Keep it enthusiastic but grounded — no "best ever" or "guaranteed results"

**Livestream version** (auto-triggered when word_count >= 300)
Structure: Retention hook → Product seeding → Deal announcement → Closing pressure

- Pace it like a conversation, with an emotional beat every 50-80 words
- Use interactive language: "Who wants this?" "Type YES if you need this" "Are you seeing this price?"
- Product section should feel like a chat, not a pitch — weave in use cases
- Closing: emphasize scarcity — "Only X left" "This price ends in 5 minutes" "Going, going…"

#### goal = Share Knowledge

Structure: Introduction → 2-3 organized points → Summary / memory anchor

- Open with a question or surprising hook: "Did you know that…" "Here's something 90% of people get wrong about X"
- Middle section breaks down 2-3 sub-points with clear logic, each wrapped up in one line
- Close with a memorable takeaway or action step: "Remember these 3 words" "Save this for later"
- Sound like a great teacher, not a textbook — conversational authority
- Best for: tutorials, explainers, product education, industry insights

### Part 2: Universal Quality Standards

1. **Sentence length**: Keep sentences under 20 words. If it feels long, split it.
2. **Pacing**: Shift tone, angle, or energy every 3-4 sentences to hold attention.
3. **Spoken-word check**: Read every line out loud. If it sounds stiff, rewrite it. Ban: "Furthermore," "Thus," "In addition," "It should be noted." Use: "So," "Here's the thing," "And honestly," "But wait."
4. **Numbers**: Use digits, not words (say "3 reasons" not "three reasons") for punchier delivery.
5. **No fabrication**: Don't invent statistics, case studies, or research findings. No absolute claims ("the best," "number one," "guaranteed").

### Part 3: TTS Optimization

1. **Punctuation for pacing**: Use commas for short pauses, periods for full stops. A short sentence after a long one creates rhythm.
2. **Banned symbols**: No ellipses (...), em dashes (—), tildes (~), or parenthetical notes. These confuse TTS engines.
3. **Numbers**: Write "30 thousand" not "30,000." Write "50 percent" not "50%."
4. **Abbreviations**: Spell them out. Say "direct message" not "DM." Say "call to action" not "CTA." Common brand names are fine as-is.
5. **Contractions**: Use them freely — "don't," "it's," "you're" sound more natural than the full forms.
6. **Filler words**: Sprinkle in natural conversational fillers sparingly (max 3 per 100 words) — "honestly," "look," "right," "you know" — to avoid a robotic feel.

## Output Format

Output the script text directly — no title, no quotation marks, no preamble like "Here is the script."

If word_count >= 300 and goal = Drive Sales, append a structure annotation after a separator line:
---
[Retention Hook] Lines 1-3
[Product Seeding] Lines 4-8
[Deal Announcement] Lines 9-11
[Closing Pressure] Lines 12-14

If the user provides a reference script, prioritize matching its tone, rhythm, and structure.
If the user's extra_req conflicts with these rules, the user's extra_req takes precedence.

## Language
Output language MUST match the language of the knowledge base content and topic. If the knowledge base is in Chinese, output Chinese. If in English, output English. Do not translate.`;

    // ── Alpine Component ──────────────────────────────────────────
    const API = '/api/v1';

    function scriptWriter() {
      const params = new URLSearchParams(location.search);
      return {
        // Trend-bridge panel — see frontend/js/trend-panel.js. Adds
        // trendUrl / trendText / trendPanelOpen / trendExtracting /
        // trendInherited fields. Keep this spread first so app fields
        // can intentionally override (currently nothing overrides).
        ...window.odTrendPanel.makeState(),

        offers: [],
        // Start empty — assign after offers load + $nextTick so <option>s exist first
        offerId: '',
        strategyUnits: [],
        strategyUnitId: '',
        _urlOfferId: params.get('offer_id') || '',
        _urlStrategyUnitId: params.get('strategy_unit_id') || '',
        selectedUnit: null,
        modelOptions: [],
        modelKey: '',
        contextData: null,
        loadingCtx: false,

        // System prompt
        systemPrompt: '',
        showPromptEditor: false,

        // Config
        topic: params.get('topic') || '',
        // When arriving from Topic Studio, this carries the full plan
        // record's UUID so the backend can enrich the prompt with the
        // plan's angle + key_points (URL-string can't fit them).
        topicPlanId: params.get('topic_plan_id') || '',
        goalLocked: false,
        tone: '',
        manualTone: false,
        wordCount: 200,
        cta: '',
        industry: '',
        reference: '',
        extraReq: '',

        // Composer dimensions
        platforms: [],
        platformId: 'douyin',
        outputLang: window._odLang === 'zh' ? 'zh' : 'en',
        detectedLang: '',
        languageManualOverride: false,
        personas: [],
        personaId: '',
        structures: [],
        structureId: 'hook_body_cta',
        structureManualOverride: false,
        goalOptions: [],
        goalId: 'seeding',

        // Tone definitions (kept for non-persona legacy mode)
        tones: [],

        // State
        refCreationTitle: '',
        suggestingTopic: false,
        loading: false,
        scriptResult: null,
        structuredContent: null,
        creationId: null,
        thinking: null,
        thinkingActive: false,
        copied: false,

        async init() {
          document.title = t('page_title') + ' - OpenLucid';

          // Build tone options from i18n (used in legacy/no-persona mode)
          this.tones = [
            { key: 'professional', label: t('tone_professional') },
            { key: 'friendly', label: t('tone_friendly') },
            { key: 'sincere', label: t('tone_sincere') },
            { key: 'gentle', label: t('tone_gentle') },
            { key: 'warm', label: t('tone_warm') },
            { key: 'energetic', label: t('tone_energetic') },
            { key: 'humorous', label: t('tone_humorous') },
            { key: 'casual', label: t('tone_casual') },
          ];

          // Load default system prompt
          this.systemPrompt = this._loadPrompt();

          const lang = getApiLang().slice(0, 2);  // zh-CN → zh, en → en

          // Load all data in parallel
          const [offersRes, llmRes, platformsRes, personasRes, structuresRes, goalsRes] = await Promise.all([
            fetch(`${API}/offers?page_size=100`).catch(() => null),
            // /apps/llm-options: sanitized model picker list (no
            // api_key) — guest-accessible.
            fetch(`${API}/apps/llm-options`).catch(() => null),
            fetch(`${API}/apps/script-writer/platforms?lang=${lang}`).catch(() => null),
            fetch(`${API}/apps/script-writer/personas?lang=${lang}`).catch(() => null),
            fetch(`${API}/apps/script-writer/structures?lang=${lang}`).catch(() => null),
            fetch(`${API}/apps/script-writer/goals?lang=${lang}`).catch(() => null),
          ]);

          if (offersRes?.ok) this.offers = (await offersRes.json()).items || [];
          // Model expansion runs in the background — see topic-studio.html
          // for the full rationale (don't block offerId on /v1/models).
          const llmConfigs = (llmRes?.ok ? await llmRes.json() : []) || [];
          if (platformsRes?.ok) {
            // Script Writer is for VIDEO scripts only — filter out text platforms
            const all = await platformsRes.json();
            this.platforms = all.filter(p => p.content_type === 'video');
            if (this.platforms.length && !this.platforms.find(p => p.id === this.platformId)) {
              this.platformId = this.platforms[0].id;
            }
          }
          if (personasRes?.ok) this.personas = await personasRes.json();
          if (structuresRes?.ok) {
            this.structures = await structuresRes.json();
            if (this.structures.length && !this.structures.find(s => s.id === this.structureId)) {
              this.structureId = this.structures[0].id;
            }
          }
          if (goalsRes?.ok) {
            this.goalOptions = await goalsRes.json();
            if (this.goalOptions.length && !this.goalOptions.find(g => g.id === this.goalId)) {
              this.goalId = this.goalOptions[0].id;
            }
            // Apply initial Goal→Structure inference (watch only fires on changes, not on load)
            if (!this.structureManualOverride) {
              this.structureId = this._goalToStructure(this.goalId);
            }
          }

          // Standardised header-selector behaviour (v1.2.x).
          // Offer:  URL > localStorage > newest. Model: localStorage > active > first.
          // No more "Select an offer / Default model" empty-state — the page
          // is always wired to a real offer + a real model on load.
          await this.$nextTick();
          this.offerId = window.odHeaderSelectors.pickInitialOffer(this.offers, "sw", this._urlOfferId);
          window.odHeaderSelectors.rememberOffer("sw", this.offerId);

          window.odHeaderSelectors.expandConfigsToModels(llmConfigs, API).then(opts => {
            this.modelOptions = opts;
            this.modelKey = window.odHeaderSelectors.pickInitialModelKey(opts, "sw");
            window.odHeaderSelectors.rememberModelKey("sw", this.modelKey);
          }).catch(e => console.error('Model expansion failed', e));

          // Inherited trend context — when arriving via topic_plan_id
          // from topic-studio, fetch the plan's persisted hotspot and
          // surface as a banner so the user knows the script is being
          // generated WITH a trend bridge. Background; doesn't block.
          if (this.topicPlanId) {
            this.trendLoadInherited(this.topicPlanId);
          }

          if (this.offerId) {
            this.strategyUnitId = this._urlStrategyUnitId || '';
            await this.fetchContext();
            await this.detectPrimaryLang();
          }

          // Auto-infer structure when goal changes (unless user manually overrode it)
          this.$watch('goalId', (val) => {
            if (!this.structureManualOverride) {
              this.structureId = this._goalToStructure(val);
            }
          });

          // Auto-set word count when platform changes
          this.$watch('platformId', (val) => {
            const p = this.platforms.find(p => p.id === val);
            if (p?.max_script_chars) {
              // ~40% of max gives a comfortable default (200 for 600-char platforms, 400 for 1000-char)
              this.wordCount = Math.round(p.max_script_chars * 0.4 / 50) * 50;
            }
          });

          // Pre-fill reference from a referred creation (e.g., "Recreate" button in Creations)
          const refCreationId = params.get('ref_creation_id');
          if (refCreationId) {
            const refRes = await fetch(`/api/v1/creations/${refCreationId}`).catch(() => null);
            if (refRes?.ok) {
              const refCreation = await refRes.json();
              this.reference = refCreation.content || '';
              if (!this.topic) this.topic = refCreation.title || '';
              this.refCreationTitle = refCreation.title || '';
            }
          }
        },

        _getDefaultPrompt() {
          return window._odLang === 'zh' ? DEFAULT_PROMPT_ZH : DEFAULT_PROMPT_EN;
        },

        _loadPrompt() {
          const stored = localStorage.getItem('od_sw_prompt_' + window._odLang);
          return stored || this._getDefaultPrompt();
        },

        resetPrompt() {
          if (!confirm(t('prompt_reset_confirm'))) return;
          this.systemPrompt = this._getDefaultPrompt();
          localStorage.removeItem('od_sw_prompt_' + window._odLang);
        },

        _savePrompt() {
          const def = this._getDefaultPrompt();
          if (this.systemPrompt === def) {
            localStorage.removeItem('od_sw_prompt_' + window._odLang);
          } else {
            localStorage.setItem('od_sw_prompt_' + window._odLang, this.systemPrompt);
          }
        },

        _goalToStructure(goalId) {
          const map = {
            seeding:           'hook_body_cta',
            reach_growth:      'hook_body_cta',
            conversion:        'pas',
            lead_generation:   'pas',
            knowledge_sharing: 'story_lesson_cta',
            brand_awareness:   'before_after_bridge',
          };
          return map[goalId] || 'hook_body_cta';
        },

        _isVideoResult() {
          if (this.structuredContent?.content_type) {
            return this.structuredContent.content_type === 'video';
          }
          return (this.platforms.find(p => p.id === this.platformId)?.content_type || '') === 'video';
        },

        _sectionLabel(sid) {
          const map = {
            hook: window._odLang === 'zh' ? '开场钩子' : 'Hook',
            body: window._odLang === 'zh' ? '正文' : 'Body',
            cta: 'CTA',
            problem: window._odLang === 'zh' ? '痛点' : 'Problem',
            agitate: window._odLang === 'zh' ? '放大痛点' : 'Agitate',
            solve: window._odLang === 'zh' ? '解决方案' : 'Solution',
            before: window._odLang === 'zh' ? '转变前' : 'Before',
            after: window._odLang === 'zh' ? '转变后' : 'After',
            bridge: window._odLang === 'zh' ? '桥接' : 'Bridge',
            story: window._odLang === 'zh' ? '故事' : 'Story',
            lesson: window._odLang === 'zh' ? '结论' : 'Lesson',
          };
          return map[sid] || (sid.charAt(0).toUpperCase() + sid.slice(1));
        },

        onModelChange() {
          window.odHeaderSelectors.rememberModelKey("sw", this.modelKey);
        },

        async onOfferChange() {
          window.odHeaderSelectors.rememberOffer("sw", this.offerId);
          this.scriptResult = null;
          this.structuredContent = null;
          this.creationId = null;
          this.thinking = null;
          this.thinkingActive = false;
          this.contextData = null;
          this.strategyUnits = [];
          this.strategyUnitId = '';
          this.selectedUnit = null;
          this.goalLocked = false;
          this.structureManualOverride = false;
          this.languageManualOverride = false;

          if (this.offerId) {
            history.replaceState(null, '', `?offer_id=${this.offerId}`);
            const name = this.offers.find(o => o.id === this.offerId)?.name || '';
            document.title = `${t('title_with_offer')} · ${name} - OpenLucid`;
            await this.fetchContext();
            await this.detectPrimaryLang();
          } else {
            history.replaceState(null, '', location.pathname);
            document.title = t('page_title') + ' - OpenLucid';
          }
        },

        async onStrategyChange() {
          this.selectedUnit = this.strategyUnits.find(su => su.id === this.strategyUnitId) || null;
          const obj = this.selectedUnit?.marketing_objective;
          if (obj) {
            // Map legacy marketing_objective to new goal_id
            const moToGoalId = {
              reach_growth: 'reach_growth',
              lead_generation: 'lead_generation',
              conversion: 'conversion',
              education: 'knowledge_sharing',
              traffic_redirect: 'reach_growth',
              other: 'seeding',
            };
            this.goalId = moToGoalId[obj] || obj;
            this.goalLocked = true;
          } else {
            this.goalLocked = false;
          }
        },

        async detectPrimaryLang() {
          // Guess KB language and set Composer default (unless user already overrode)
          if (!this.offerId) return;
          try {
            const r = await fetch(`${API}/offers/${this.offerId}/primary_lang`);
            if (!r.ok) return;
            const d = await r.json();
            this.detectedLang = d.language || '';
            if (!this.languageManualOverride && this.detectedLang) {
              this.outputLang = this.detectedLang;
              // Pick a platform matching the detected language if current choice mismatches region
              const current = this.platforms.find(p => p.id === this.platformId);
              const wantZh = this.detectedLang === 'zh';
              if (current && ((current.region === 'zh') !== wantZh)) {
                const match = this.platforms.find(p => (p.region === 'zh') === wantZh);
                if (match) this.platformId = match.id;
              }
            }
          } catch (e) { /* silent */ }
        },

        async fetchContext() {
          if (!this.offerId) return;
          this.loadingCtx = true;
          try {
            const res = await fetch(`${API}/apps/topic-studio/context-preview?offer_id=${this.offerId}`);
            if (res.ok) this.contextData = await res.json();

            // Load strategy units
            const suRes = await fetch(`${API}/strategy-units?offer_id=${this.offerId}&page_size=50`);
            if (suRes.ok) {
              const suData = await suRes.json();
              this.strategyUnits = suData.items || [];
            }

            // Restore strategy unit from URL and apply goal lock
            if (this.strategyUnitId && this.strategyUnits.find(su => su.id === this.strategyUnitId)) {
              await this.onStrategyChange();
            }
          } catch(e) { console.error(e); }
          finally { this.loadingCtx = false; }
        },

        async suggestTopic() {
          if (!this.offerId || this.suggestingTopic) return;
          this.suggestingTopic = true;
          try {
            const sel = window.odHeaderSelectors.splitModelKey(this.modelKey);
            this.topic = await window.odSuggestTopic({
              offer_id: this.offerId,
              goal: this.goalId,
              strategy_unit_id: this.strategyUnitId || undefined,
              config_id: sel.config_id || undefined,
              model_override: sel.model_name || undefined,
              // Only send language when the user manually picked in the
              // composer; otherwise let the backend follow KB detection.
              language: this.languageManualOverride
                ? (this.outputLang === 'zh' ? 'zh-CN' : 'en')
                : undefined,
            });
          } catch(e) { console.error(e); toast.error(e.message); }
          this.suggestingTopic = false;
        },

        async doGenerate() {
          if (!this.offerId) return;
          this.loading = true;
          this.scriptResult = null;
          this.structuredContent = null;
          this.creationId = null;
          this.thinking = null;
          this.thinkingActive = false;
          this.copied = false;

          // Save prompt if edited
          this._savePrompt();

          try {
            const res = await fetch(`${API}/apps/script-writer/generate/stream`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                offer_id: this.offerId,
                strategy_unit_id: this.strategyUnitId || undefined,
                topic_plan_id: this.topicPlanId || undefined,
                // Trend-bridge inputs (panel state) — empty when the
                // user didn't paste anything, in which case the spread
                // produces no keys and backend defaults apply.
                ...window.odTrendPanel.toBody(this),
                system_prompt: this.systemPrompt,
                topic: this.topic.trim(),
                goal: this.goalId,
                tone: (!this.personaId && this.tone) ? this.tone : undefined,
                word_count: this.wordCount,
                cta: this.cta || undefined,
                industry: this.industry || undefined,
                reference: this.reference || undefined,
                extra_req: this.extraReq || undefined,
                // Only send language when the user manually picked in the
                // composer; otherwise let the backend follow KB detection.
                ...(this.languageManualOverride
                  ? { language: this.outputLang === 'zh' ? 'zh-CN' : 'en' }
                  : {}),
                ...((() => { const _s = window.odHeaderSelectors.splitModelKey(this.modelKey); return _s.config_id ? { config_id: _s.config_id, model_override: _s.model_name || undefined } : {}; })()),
                // Composer dimensions
                platform_id: this.platformId || undefined,
                persona_id: this.personaId || undefined,
                goal_id: this.goalId,
                structure_id: this.structureId || undefined,
              }),
            });

            if (!res.ok) {
              const err = await res.json().catch(() => ({}));
              toast.error(t('generate_failed') + (err.detail || ''));
              this.loading = false;
              return;
            }

            const reader = res.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';
            let scriptContent = '';
            let sawTerminal = false;  // saw a clean done OR error event

            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              buffer += decoder.decode(value, { stream: true });

              const parts = buffer.split('\n\n');
              buffer = parts.pop();

              for (const part of parts) {
                if (!part.trim()) continue;
                const lines = part.trim().split('\n');
                let eventType = 'message', data = '';
                for (const line of lines) {
                  if (line.startsWith('event: ')) eventType = line.slice(7);
                  else if (line.startsWith('data: ')) data = line.slice(6);
                }

                if (eventType === 'thinking') {
                  if (!this.thinkingActive) {
                    this.thinkingActive = true;
                    this.thinking = '';
                  }
                  this.thinking += JSON.parse(data);
                  this.$nextTick(() => {
                    const el = this.$refs.thinkingContent;
                    if (el) el.scrollTop = el.scrollHeight;
                  });
                } else if (eventType === 'thinking_done') {
                  this.thinkingActive = false;
                  this.$nextTick(() => {
                    const el = this.$refs.thinkingDetails;
                    if (el) el.open = false;
                  });
                } else if (eventType === 'token') {
                  scriptContent += JSON.parse(data);
                  this.scriptResult = scriptContent;
                } else if (eventType === 'done') {
                  sawTerminal = true;
                  const result = JSON.parse(data);
                  // Backend converts structured JSON to plain text in result.script
                  if (result.script) {
                    this.scriptResult = result.script;
                  }
                  if (result.structured_content) {
                    this.structuredContent = result.structured_content;
                  }
                  if (result.creation_id) {
                    this.creationId = result.creation_id;
                  }
                } else if (eventType === 'error') {
                  // Backend signaled an LLM failure (timeout / proxy /
                  // rate limit). Surface the detail — otherwise the
                  // spinner stops silently.
                  sawTerminal = true;
                  try {
                    const errData = JSON.parse(data);
                    toast.error(t('generate_failed') + (errData.message || ''));
                  } catch {
                    toast.error(t('generate_failed'));
                  }
                }
              }
            }
            // Connection closed with no terminal event = abrupt drop.
            if (!sawTerminal && !scriptContent) {
              toast.error(t('generate_failed_retry'));
            }
          } catch(e) {
            console.error(e);
            toast.error(t('generate_failed_retry'));
          }

          this.thinkingActive = false;
          this.loading = false;
        },

        async copyScript() {
          if (!this.scriptResult) return;
          const ok = await window.odCopyText(this.scriptResult);
          if (ok) {
            this.copied = true;
            setTimeout(() => this.copied = false, 2000);
          }
        },
      };
    }
  </script>
